<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upco InsurGest — Portal de promotoría</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="../icon-192.png"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#F4F7FB;color:#0a1c35}

  /* ── Pantalla de bienvenida ──
     "Insurance" y "Gestión" caen desde arriba y se les colapsa la terminación hasta formar
     "InsurGest". Mismo mecanismo que el splash de Homey ("Home"+"money" → "Homey"), en vertical. */
  #splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#10284A,#0a1c35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .6s ease;padding:24px}
  #splash.oculto{opacity:0;pointer-events:none}
  #splash .mono{border-radius:24px;box-shadow:0 16px 44px rgba(0,0,0,.45);line-height:0;opacity:0;transform:scale(.82) translateY(8px);animation:sLogo .9s cubic-bezier(.2,.7,.3,1) .1s forwards}
  #splash .marca{font-size:28px;font-weight:800;color:#fff;margin-top:8px;display:flex;align-items:baseline;gap:8px;white-space:nowrap}
  #splash .upco{opacity:0;animation:sFade .5s ease .4s forwards}
  #splash .ig{display:inline-flex;color:#F59E0B;animation:sGrow .5s ease 2.5s forwards}
  #splash .insur{display:inline-flex;opacity:0;transform:translateY(-28px);animation:sBaja .6s cubic-bezier(.2,.7,.3,1) 1s forwards}
  #splash .gest{display:inline-flex;opacity:0;transform:translateY(-28px);animation:sBaja .6s cubic-bezier(.2,.7,.3,1) 1.7s forwards}
  #splash .cae{display:inline-block;overflow:hidden;max-width:110px;animation:sColapsa .5s ease 2.5s forwards}
  #splash .esp{max-width:9px}
  #splash .sub{font-size:15px;font-weight:500;color:#8FA0B4;opacity:0;animation:sFade .5s ease 3.1s forwards;text-align:center}
  #splash .barra{width:120px;height:4px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden;opacity:0;animation:sFade .4s ease .3s forwards}
  #splash .barra i{display:block;height:100%;width:40%;border-radius:99px;background:#F59E0B;animation:sCarga 1.1s ease-in-out .3s infinite}
  @keyframes sLogo{to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes sFade{to{opacity:1}}
  @keyframes sCarga{0%{margin-left:-40%}100%{margin-left:120%}}
  @keyframes sBaja{to{opacity:1;transform:translateY(0)}}
  @keyframes sColapsa{to{max-width:0;opacity:0}}
  @keyframes sGrow{0%{transform:scale(1)}60%{transform:scale(1.15)}100%{transform:scale(1.05)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../shared.js"></script>
</head>
<body>
<div id="splash">
  <div class="mono"><svg width="84" height="84" viewBox="0 0 38 38"><rect width="38" height="38" rx="11" fill="#10284A"/><text x="19" y="25" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-weight="800" font-size="14" fill="#F59E0B">IG</text></svg></div>
  <div class="marca">
    <span class="upco">Upco</span>
    <span class="ig"><span class="insur">Insur<span class="cae">ance</span></span><span class="cae esp">&nbsp;</span><span class="gest">Gest<span class="cae">ión</span></span></span>
  </div>
  <div class="sub">Portal de promotoría</div>
  <div class="barra"><i></i></div>
</div>
<script>
// Va aquí, junto al splash y no al final del archivo, para que corra mientras el navegador
// todavía está armando la página: si esperara al final, quien ya lo vio alcanzaría a ver un
// parpadeo antes de que lo quitemos.
(function(){
  var s=document.getElementById("splash");
  if(!s)return;
  var quieto=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  // Una sola vez por sesión: quien entra a trabajar varias veces al día no necesita esperar
  // la animación cada vez.
  if(quieto||sessionStorage.getItem("upco_ig_splash")){s.remove();return;}
  try{sessionStorage.setItem("upco_ig_splash","1");}catch(e){}
  setTimeout(function(){s.classList.add("oculto");setTimeout(function(){s.remove();},700);},3800);
})();
</script>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

const VERSION_TERMINOS="2026-07-10";

const est={
  input:{width:"100%",padding:"12px 14px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:15,marginBottom:10,fontFamily:"inherit"},
  label:{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"},
  card:{background:"#fff",borderRadius:14,padding:18,border:"1px solid #DDE4EE"},
  fila:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderBottom:"1px solid #f1f5f9"},
  linkBtn:{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer",padding:"4px 8px"},
  badge:(color)=>({display:"inline-block",fontSize:11,fontWeight:700,color,background:color+"1a",borderRadius:6,padding:"3px 8px"})
};

const colorEstatusAgente={pendiente:"#F59E0B",aprobado:"#16a34a",rechazado:"#dc2626"};

const ALTO_HEADER=54;
function HeaderBar(){
  return <div style={{background:"#10284A",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"center",gap:10,height:ALTO_HEADER}}>
    <span style={{color:"#fff",fontWeight:800,fontSize:16}}>Upco <span style={{color:"#F59E0B"}}>InsurGest</span></span>
    <span style={{color:"#fff",fontSize:12,fontWeight:600,background:"rgba(255,255,255,.15)",borderRadius:20,padding:"3px 10px"}}>Portal de Promotoría</span>
  </div>;
}

function Boton({children,onClick,disabled,color="#10284A",type="button"}){
  return <button type={type} onClick={onClick} disabled={disabled}
    style={{background:disabled?"#DDE4EE":color,color:disabled?"#9ca3af":"#fff",border:"none",borderRadius:10,padding:"12px 18px",fontSize:15,fontWeight:700,cursor:disabled?"not-allowed":"pointer"}}>
    {children}
  </button>;
}

function Login(){
  const[modo,setModo]=useState(new URLSearchParams(location.search).get("registro")?"registro":"entrar"); // entrar | registro
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[nombre,setNombre]=useState("");
  const[nombreNegocio,setNombreNegocio]=useState("");
  const[rfc,setRfc]=useState("");
  const[aceptoTerminos,setAceptoTerminos]=useState(false);
  const[error,setError]=useState("");
  const[cargando,setCargando]=useState(false);
  const[registroListo,setRegistroListo]=useState(false);

  const entrar=async(e)=>{
    e.preventDefault();
    if(!email||!email.includes("@")){setError("Escribe un correo válido.");return;}
    if(!password){setError("Escribe tu contraseña.");return;}
    setError("");setCargando(true);
    const{error}=await sb.auth.signInWithPassword({email:email.trim(),password});
    setCargando(false);
    if(error){setError(`Correo o contraseña incorrectos. (${error.message||"sin detalle"})`);return;}
  };

  const registrar=async(e)=>{
    e.preventDefault();
    if(!email||!email.includes("@")){setError("Escribe un correo válido.");return;}
    if(!nombreNegocio.trim()){setError("Escribe el nombre de tu promotoría.");return;}
    if(!password||password.length<6){setError("La contraseña debe tener al menos 6 caracteres.");return;}
    if(!aceptoTerminos){setError("Debes aceptar los Términos y Condiciones y el Aviso de Privacidad para registrarte.");return;}
    setError("");setCargando(true);
    const{data,error}=await sb.auth.signUp({
      email:email.trim(),
      password,
      options:{data:{
        nombre:nombre.trim()||null,
        nombre_negocio:nombreNegocio.trim(),
        rfc:rfc.trim()||null,
        acepto_terminos:true,
        acepto_terminos_version:VERSION_TERMINOS,
        acepto_terminos_fecha:new Date().toISOString()
      }}
    });
    setCargando(false);
    if(error){setError(error.message);return;}
    if(!data.session)setRegistroListo(true);
  };

  if(registroListo)return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:380,boxShadow:"0 8px 30px rgba(0,0,0,.08)",textAlign:"center"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:12,color:"#10284A"}}>¡Cuenta creada!</div>
      <div style={{fontSize:14,color:"#374151",lineHeight:1.6}}>Revisa tu correo para confirmar tu cuenta. Tu acceso quedará pendiente de aprobación hasta que lo revisemos.</div>
    </div>
  </div>;

  return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <form onSubmit={modo==="entrar"?entrar:registrar} style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:380,boxShadow:"0 8px 30px rgba(0,0,0,.08)"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:20,color:"#10284A"}}>{modo==="entrar"?"Iniciar sesión":"Registrar mi promotoría"}</div>

      {modo==="registro"&&<>
        <input value={nombreNegocio} onChange={e=>setNombreNegocio(e.target.value)} placeholder="nombre de tu promotoría" style={est.input}/>
        <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="nombre de contacto (opcional)" style={est.input}/>
        <input value={rfc} onChange={e=>setRfc(e.target.value.toUpperCase())} placeholder="RFC (opcional)" style={est.input}/>
      </>}
      <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu correo" type="email" autoComplete="username" style={est.input}/>
      <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="tu contraseña" type="password" autoComplete={modo==="entrar"?"current-password":"new-password"} style={{...est.input,marginBottom:12}}/>

      {modo==="registro"&&<label style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:13,color:"#374151",marginBottom:12,cursor:"pointer"}}>
        <input type="checkbox" checked={aceptoTerminos} onChange={e=>setAceptoTerminos(e.target.checked)} style={{marginTop:2}}/>
        <span>Acepto los <a href="../terminos/" target="_blank" rel="noopener" style={{color:"#10284A"}}>Términos y Condiciones y el Aviso de Privacidad</a>.</span>
      </label>}

      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <div style={{width:"100%"}}><Boton type="submit" disabled={cargando}>
        {cargando?(modo==="entrar"?"Entrando...":"Registrando..."):(modo==="entrar"?"Iniciar sesión":"Registrar mi promotoría")}
      </Boton></div>
      <button type="button" onClick={()=>{setModo(modo==="entrar"?"registro":"entrar");setError("");}} style={{...est.linkBtn,marginTop:12,padding:0}}>
        {modo==="entrar"?"¿Administras una red de agentes? Regístrate":"¿Ya tienes cuenta? Inicia sesión"}
      </button>
    </form>
  </div>;
}

function TarjetaKPI({label,valor,color,grande}){
  return <div style={{...est.card,textAlign:"center"}}>
    <div style={{fontSize:grande?30:22,fontWeight:700,color:color||"#10284A"}}>{valor}</div>
    <div style={{fontSize:12,color:"#8FA0B4",marginTop:4}}>{label}</div>
  </div>;
}

function CodigoInvitacion({codigo}){
  const[copiado,setCopiado]=useState(false);
  const copiar=async()=>{
    try{await navigator.clipboard.writeText(codigo);setCopiado(true);setTimeout(()=>setCopiado(false),2000);}
    catch(e){}
  };
  return <div style={{...est.card,marginBottom:24,background:"#F4F7FB"}}>
    <div style={{fontSize:13,fontWeight:700,color:"#8FA0B4",marginBottom:8}}>TU CÓDIGO DE INVITACIÓN</div>
    <div style={{fontSize:13,color:"#374151",marginBottom:10,lineHeight:1.5}}>
      Comparte este código con tus agentes — al registrarse en Upco InsurGest lo escriben en "Código de promotoría" y quedan ligados a tu red.
    </div>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <div style={{background:"#fff",border:"1px solid #DDE4EE",borderRadius:10,padding:"10px 16px",fontSize:20,fontWeight:800,letterSpacing:2,color:"#10284A"}}>{codigo}</div>
      <Boton color="#53647D" onClick={copiar}>{copiado?"¡Copiado!":"Copiar"}</Boton>
    </div>
  </div>;
}

function Resumen({codigo}){
  const[r,setR]=useState(null);
  const[error,setError]=useState("");

  useEffect(()=>{
    sb.rpc("promotoria_resumen").then(({data,error})=>{
      if(error){setError(error.message);return;}
      setR(data);
    });
  },[]);

  return <div>
    <CodigoInvitacion codigo={codigo}/>
    {error&&<div style={{color:"#dc2626",fontSize:13}}>{error}</div>}
    {!error&&!r&&<div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>}
    {r&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
      <TarjetaKPI label="Agentes en tu red" valor={r.agentes_totales} grande/>
      <TarjetaKPI label="Agentes aprobados" valor={r.agentes_aprobados} color="#16a34a"/>
      <TarjetaKPI label="Agentes pendientes" valor={r.agentes_pendientes} color="#F59E0B"/>
      <TarjetaKPI label="Clientes gestionados" valor={r.clientes_totales}/>
      <TarjetaKPI label="Pólizas gestionadas" valor={r.polizas_totales} grande/>
    </div>}
  </div>;
}

function Agentes(){
  const[agentes,setAgentes]=useState(null);
  const[error,setError]=useState("");
  const[filtro,setFiltro]=useState("pendiente");

  const cargar=async()=>{
    const{data,error}=await sb.rpc("promotoria_agentes");
    if(error){setError(error.message);return;}
    setAgentes(data||[]);
  };
  useEffect(()=>{cargar()},[]);

  const aprobar=async(a)=>{
    const{error}=await sb.rpc("promotoria_aprobar_agente",{p_agente_id:a.id});
    if(error){setError(error.message);return;}
    cargar();
  };
  const rechazar=async(a)=>{
    if(!window.confirm(`¿Rechazar el registro de ${a.correo}?`))return;
    const{error}=await sb.rpc("promotoria_rechazar_agente",{p_agente_id:a.id});
    if(error){setError(error.message);return;}
    cargar();
  };

  if(error)return <div style={{color:"#dc2626",fontSize:13}}>{error}</div>;
  if(!agentes)return <div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>;

  const lista=filtro==="pendiente"?agentes.filter(a=>a.estatus_aprobacion==="pendiente"):agentes;

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:700}}>Agentes de tu red {lista?`(${lista.length})`:""}</div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setFiltro("pendiente")} style={{...est.linkBtn,fontWeight:filtro==="pendiente"?700:500,color:filtro==="pendiente"?"#10284A":"#8FA0B4"}}>Pendientes</button>
        <button onClick={()=>setFiltro("todos")} style={{...est.linkBtn,fontWeight:filtro==="todos"?700:500,color:filtro==="todos"?"#10284A":"#8FA0B4"}}>Todos</button>
      </div>
    </div>

    {lista.length===0&&<div style={{...est.card,textAlign:"center",color:"#6B7280"}}>
      {filtro==="pendiente"?"No hay registros pendientes de aprobación.":"Todavía no tienes agentes en tu red — comparte tu código de invitación."}
    </div>}

    {lista.length>0&&<div style={{...est.card,padding:0,overflow:"hidden"}}>
      {lista.map(a=><div key={a.id} style={est.fila}>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{a.nombre||a.correo}</div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>
            {a.correo}{a.nombre_negocio?` · ${a.nombre_negocio}`:""}{a.telefono?` · ${a.telefono}`:""}
          </div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>{a.clientes} clientes · {a.polizas} pólizas</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={est.badge(colorEstatusAgente[a.estatus_aprobacion]||"#6b7280")}>{a.estatus_aprobacion}</span>
          {a.estatus_aprobacion!=="aprobado"&&<button onClick={()=>aprobar(a)} style={{...est.linkBtn,color:"#16a34a"}}>Aprobar</button>}
          {a.estatus_aprobacion!=="rechazado"&&<button onClick={()=>rechazar(a)} style={{...est.linkBtn,color:"#dc2626"}}>Rechazar</button>}
        </div>
      </div>)}
    </div>}
  </div>;
}

function AvisosPromotoria(){
  const[agentes,setAgentes]=useState(null);
  const[clientes,setClientes]=useState(null);
  const[selAgentes,setSelAgentes]=useState({});
  const[selClientes,setSelClientes]=useState({});
  const[asunto,setAsunto]=useState("");
  const[mensaje,setMensaje]=useState("");
  const[viaCorreo,setViaCorreo]=useState(true);
  const[viaPush,setViaPush]=useState(true);
  const[enviando,setEnviando]=useState(false);
  const[resultado,setResultado]=useState(null);
  const[error,setError]=useState("");

  useEffect(()=>{
    sb.rpc("promotoria_agentes").then(({data,error})=>{if(error){setError(error.message);return;}setAgentes(data||[]);});
    sb.rpc("promotoria_clientes").then(({data,error})=>{if(error){setError(error.message);return;}setClientes(data||[]);});
  },[]);

  const toggleAgente=(id)=>setSelAgentes(prev=>({...prev,[id]:!prev[id]}));
  const toggleCliente=(id)=>setSelClientes(prev=>({...prev,[id]:!prev[id]}));

  const enviar=async(e)=>{
    e.preventDefault();
    const agenteIds=Object.keys(selAgentes).filter(id=>selAgentes[id]);
    const clienteIds=Object.keys(selClientes).filter(id=>selClientes[id]);
    if(agenteIds.length===0&&clienteIds.length===0){setError("Selecciona al menos un destinatario.");return;}
    if(!asunto.trim()||!mensaje.trim()){setError("Escribe un asunto y un mensaje.");return;}
    setError("");setEnviando(true);setResultado(null);
    const{data,error:errRpc}=await sb.rpc("promotoria_notificar",{
      p_agente_ids:agenteIds,p_cliente_ids:clienteIds,p_asunto:asunto.trim(),p_mensaje:mensaje.trim(),
      p_via_correo:viaCorreo,p_via_push:viaPush
    });
    setEnviando(false);
    if(errRpc){setError(errRpc.message);return;}
    setResultado(data);setAsunto("");setMensaje("");setSelAgentes({});setSelClientes({});
  };

  if(!agentes||!clientes)return <div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>;
  const totalSel=Object.values(selAgentes).filter(Boolean).length+Object.values(selClientes).filter(Boolean).length;

  return <div>
    <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Avisos a tu red</div>
    <div style={{fontSize:13,color:"#8FA0B4",marginBottom:16}}>Manda un correo y/o notificación push a los agentes de tu red, o directo a sus clientes.</div>

    <form onSubmit={enviar} style={est.card}>
      <label style={est.label}>Agentes de tu red</label>
      <div style={{maxHeight:150,overflowY:"auto",border:"1px solid #DDE4EE",borderRadius:10,padding:"6px 12px",marginBottom:14}}>
        {agentes.length===0&&<div style={{fontSize:13,color:"#8FA0B4",padding:"8px 0"}}>Todavía no tienes agentes en tu red.</div>}
        {agentes.map(a=><label key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",fontSize:13,color:"#374151",cursor:"pointer"}}>
          <input type="checkbox" checked={!!selAgentes[a.id]} onChange={()=>toggleAgente(a.id)}/>
          {a.nombre||a.correo}
        </label>)}
      </div>

      <label style={est.label}>Clientes directos de tus agentes</label>
      <div style={{maxHeight:150,overflowY:"auto",border:"1px solid #DDE4EE",borderRadius:10,padding:"6px 12px",marginBottom:14}}>
        {clientes.length===0&&<div style={{fontSize:13,color:"#8FA0B4",padding:"8px 0"}}>Todavía no hay clientes en tu red.</div>}
        {clientes.map(c=><label key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",fontSize:13,color:c.correo?"#374151":"#C4CDD9",cursor:c.correo?"pointer":"not-allowed"}}>
          <input type="checkbox" checked={!!selClientes[c.id]} disabled={!c.correo} onChange={()=>toggleCliente(c.id)}/>
          {c.nombre} <span style={{color:"#8FA0B4"}}>— {c.agente_nombre}</span>{!c.correo&&" (sin correo)"}
        </label>)}
      </div>

      <div style={{fontSize:12,color:"#8FA0B4",marginBottom:10}}>{totalSel} destinatarios seleccionados</div>

      <input value={asunto} onChange={e=>setAsunto(e.target.value)} placeholder="Asunto" style={est.input}/>
      <textarea value={mensaje} onChange={e=>setMensaje(e.target.value)} placeholder="Mensaje" rows={4} style={est.input}/>

      <div style={{display:"flex",gap:16,marginBottom:14}}>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#374151",cursor:"pointer"}}>
          <input type="checkbox" checked={viaCorreo} onChange={e=>setViaCorreo(e.target.checked)}/> Por correo
        </label>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#374151",cursor:"pointer"}}>
          <input type="checkbox" checked={viaPush} onChange={e=>setViaPush(e.target.checked)}/> Por notificación push
        </label>
      </div>

      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      {resultado&&<div style={{color:"#16a34a",fontSize:13,marginBottom:10}}>Enviado: {resultado.correos_enviados} correos, {resultado.push_disparados} avisos push.</div>}
      <Boton type="submit" disabled={enviando||(!viaCorreo&&!viaPush)}>{enviando?"Enviando...":"Enviar aviso"}</Boton>
    </form>
  </div>;
}

const PLANES_PROMOTORIA=[
  {periodo:"mensual",label:"Mensual",monto:"$999 MXN/mes"},
  {periodo:"trimestral",label:"Trimestral",monto:"$2,890 MXN cada 3 meses"},
  {periodo:"semestral",label:"Semestral",monto:"$5,570 MXN cada 6 meses"},
  {periodo:"anual",label:"Anual",monto:"$9,990 MXN/año"}
];

function PantallaSuscripcionPromotoria({cuenta,bloqueado}){
  const[cargando,setCargando]=useState(null);
  const[error,setError]=useState("");

  const suscribirse=async(periodo)=>{
    setError("");setCargando(periodo);
    const{data,error:errFn}=await sb.functions.invoke("create-checkout-session",{body:{tipo:"promotoria_base",periodo}});
    setCargando(null);
    if(errFn||!data?.url){
      let detalle=(data&&data.error)||"";
      // supabase-js guarda la respuesta HTTP real en errFn.context — de ahí sacamos el motivo.
      if(!detalle&&errFn&&errFn.context&&typeof errFn.context.json==="function"){
        try{const cuerpo=await errFn.context.json();detalle=cuerpo&&cuerpo.error;}catch(e){}
      }
      setError(detalle?`No se pudo iniciar el pago: ${detalle}`:"No se pudo iniciar el pago. Intenta de nuevo.");
      return;
    }
    window.location.href=data.url;
  };

  // Manda al Portal de Cliente de Stripe: ahí cancela, cambia tarjeta y baja sus facturas.
  const administrar=async()=>{
    setError("");setCargando("portal");
    const{data,error:errFn}=await sb.functions.invoke("create-portal-session",{body:{tipo:"promotoria_base"}});
    setCargando(null);
    if(errFn||!data?.url){
      let detalle=(data&&data.error)||"";
      if(!detalle&&errFn&&errFn.context&&typeof errFn.context.json==="function"){
        try{const cuerpo=await errFn.context.json();detalle=cuerpo&&cuerpo.error;}catch(e){}
      }
      setError(detalle?`No se pudo abrir tu suscripción: ${detalle}`:"No se pudo abrir tu suscripción. Intenta de nuevo.");
      return;
    }
    window.location.href=data.url;
  };

  const suscripcionActiva=cuenta.estatus_suscripcion==="active"||cuenta.estatus_suscripcion==="trialing";
  const ahora=new Date();
  const finPrueba=cuenta.aprobado_en?new Date(new Date(cuenta.aprobado_en).getTime()+30*86400000):null;
  const accesoExtendido=cuenta.acceso_extendido_hasta?new Date(cuenta.acceso_extendido_hasta):null;
  const diasPrueba=finPrueba?Math.ceil((finPrueba-ahora)/86400000):null;
  const diasExtendido=accesoExtendido?Math.ceil((accesoExtendido-ahora)/86400000):null;

  const contenido=<div style={{width:"100%",maxWidth:520}}>
    {bloqueado&&<div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:8}}>Tu prueba gratuita terminó</div>
      <div style={{fontSize:14,color:"#374151"}}>Elige un plan para seguir usando tu portal de promotoría.</div>
    </div>}
    {!bloqueado&&<div style={{marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Mi suscripción</div>
      {suscripcionActiva&&<div style={{fontSize:13,color:"#16a34a"}}>Plan activo: {cuenta.plan_periodo||"—"} · estatus {cuenta.estatus_suscripcion}</div>}
      {!suscripcionActiva&&diasExtendido>0&&<div style={{fontSize:13,color:"#F59E0B"}}>Acceso extendido — quedan {diasExtendido} días</div>}
      {!suscripcionActiva&&!(diasExtendido>0)&&diasPrueba!=null&&<div style={{fontSize:13,color:diasPrueba<=5?"#F59E0B":"#8FA0B4"}}>Prueba gratuita — quedan {Math.max(diasPrueba,0)} días</div>}
    </div>}

    {!suscripcionActiva&&<div style={{fontSize:12,color:"#8FA0B4",marginBottom:10}}>Cuota base — incluye 5 agentes en tu red.</div>}
    {!suscripcionActiva&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
      {PLANES_PROMOTORIA.map(p=><div key={p.periodo} style={est.card}>
        <div style={{fontSize:11,fontWeight:700,color:"#8FA0B4",marginBottom:4}}>{p.label.toUpperCase()}</div>
        <div style={{fontSize:14,fontWeight:700,color:"#10284A",marginBottom:12}}>{p.monto}</div>
        <Boton onClick={()=>suscribirse(p.periodo)} disabled={cargando!==null}>{cargando===p.periodo?"Redirigiendo...":"Elegir"}</Boton>
      </div>)}
    </div>}

    {suscripcionActiva&&<div style={est.card}>
      <div style={{fontSize:13,color:"#374151",marginBottom:12}}>Desde Stripe puedes cambiar tu tarjeta, descargar tus facturas o cancelar tu suscripción.</div>
      <Boton onClick={administrar} disabled={cargando!==null}>{cargando==="portal"?"Abriendo...":"Administrar mi suscripción"}</Boton>
    </div>}

    {error&&<div style={{color:"#dc2626",fontSize:13,marginTop:14,textAlign:"center"}}>{error}</div>}
    {!suscripcionActiva&&<div style={{fontSize:11,color:"#8FA0B4",marginTop:14,textAlign:"center"}}>Precios +IVA. Agentes adicionales a los 5 incluidos se facturan aparte por ahora — escríbenos. Se cobra por Stripe, cancela cuando quieras.</div>}
  </div>;

  if(!bloqueado)return contenido;
  return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>{contenido}</div>;
}

const tabStyle=(activo)=>({
  background:"none",border:"none",borderBottom:activo?"2px solid #10284A":"2px solid transparent",
  padding:"8px 4px",marginBottom:-1,fontSize:14,fontWeight:activo?700:500,
  color:activo?"#10284A":"#8FA0B4",cursor:"pointer"
});

function PanelPromotoria({session,onSalir}){
  const[promotoria,setPromotoria]=useState(null);
  const[vista,setVista]=useState("resumen");
  const[error,setError]=useState("");

  useEffect(()=>{
    (async()=>{
      const{data,error:errSel}=await sb.from("promotorias").select("*").eq("id",session.user.id).maybeSingle();
      if(errSel){setError(errSel.message);return;}
      if(data){setPromotoria(data);return;}
      const meta=session.user.user_metadata||{};
      const{data:nueva,error:errIns}=await sb.from("promotorias")
        .insert({
          id:session.user.id,correo:session.user.email,
          nombre:meta.nombre||null,nombre_negocio:meta.nombre_negocio||null,rfc:meta.rfc||null,
          acepto_terminos:meta.acepto_terminos||false,acepto_terminos_version:meta.acepto_terminos_version||null,acepto_terminos_fecha:meta.acepto_terminos_fecha||null
        })
        .select().single();
      if(errIns){
        if(errIns.code==="23505"){
          const{data:existente,error:errSel2}=await sb.from("promotorias").select("*").eq("id",session.user.id).maybeSingle();
          if(errSel2){setError(errSel2.message);return;}
          if(existente){setPromotoria(existente);return;}
        }
        setError(errIns.message);return;
      }
      setPromotoria(nueva);
    })();
  },[]);

  if(error)return <div style={{padding:40,textAlign:"center",color:"#dc2626"}}>Ocurrió un error: {error}</div>;
  if(!promotoria)return <div style={{padding:40,textAlign:"center",color:"#6B7280"}}>Cargando tu panel...</div>;

  if(promotoria.estatus_aprobacion==="pendiente")return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:420,boxShadow:"0 8px 30px rgba(0,0,0,.08)",textAlign:"center"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:12,color:"#10284A"}}>Cuenta pendiente de aprobación</div>
      <div style={{fontSize:14,color:"#374151",lineHeight:1.6,marginBottom:20}}>Te avisaremos por correo en cuanto podamos activar tu portal de promotoría.</div>
      <button onClick={onSalir} style={est.linkBtn}>Salir</button>
    </div>
  </div>;

  if(promotoria.estatus_aprobacion==="rechazado")return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:420,boxShadow:"0 8px 30px rgba(0,0,0,.08)",textAlign:"center"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:12,color:"#10284A"}}>Solicitud no aprobada</div>
      <div style={{fontSize:14,color:"#374151",lineHeight:1.6,marginBottom:20}}>Tu solicitud de registro no fue aprobada. Si crees que es un error, contáctanos.</div>
      <button onClick={onSalir} style={est.linkBtn}>Salir</button>
    </div>
  </div>;

  if(!accesoVigente(promotoria))return <div>
    <div style={{maxWidth:760,margin:"0 auto",padding:"16px 16px 0",display:"flex",justifyContent:"flex-end"}}>
      <button onClick={onSalir} style={{background:"none",border:"none",color:"#6B7280",fontSize:14,cursor:"pointer"}}>Salir ({promotoria.correo})</button>
    </div>
    <PantallaSuscripcionPromotoria cuenta={promotoria} bloqueado={true}/>
  </div>;

  return <div style={{maxWidth:760,margin:"0 auto",padding:"24px 16px 60px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div style={{fontSize:16,fontWeight:700,color:"#10284A"}}>Hola, {promotoria.nombre_negocio||promotoria.correo}</div>
      <button onClick={onSalir} style={{background:"none",border:"none",color:"#6B7280",fontSize:14,cursor:"pointer"}}>Salir ({promotoria.correo})</button>
    </div>

    <div style={{display:"flex",gap:16,marginBottom:24,borderBottom:"1px solid #DDE4EE",flexWrap:"wrap"}}>
      <button onClick={()=>setVista("resumen")} style={tabStyle(vista==="resumen")}>Resumen</button>
      <button onClick={()=>setVista("agentes")} style={tabStyle(vista==="agentes")}>Agentes</button>
      <button onClick={()=>setVista("avisos")} style={tabStyle(vista==="avisos")}>Avisos</button>
      <button onClick={()=>setVista("suscripcion")} style={tabStyle(vista==="suscripcion")}>Suscripción</button>
    </div>

    {vista==="resumen"?<Resumen codigo={promotoria.codigo_invitacion}/>
      :vista==="avisos"?<AvisosPromotoria/>
      :vista==="suscripcion"?<PantallaSuscripcionPromotoria cuenta={promotoria} bloqueado={false}/>
      :<Agentes/>}
  </div>;
}

// La sesión se comparte entre /app y /promotor (mismo dominio), así que quien active el segundo
// factor desde su panel de agente también llega aquí en aal1. Sin esta pantalla, la política
// restrictiva de la base le negaría su propia fila y el portal no cargaría nunca.
function PedirSegundoFactor({onOk,onSalir}){
  const[codigo,setCodigo]=useState("");
  const[respaldo,setRespaldo]=useState("");
  const[modo,setModo]=useState("totp");
  const[error,setError]=useState("");
  const[verificando,setVerificando]=useState(false);

  const verificar=async(e)=>{
    e.preventDefault();setError("");
    if(!/^[0-9]{6}$/.test(codigo)){setError("Escribe los 6 dígitos de tu app.");return;}
    setVerificando(true);
    const{data:f}=await sb.auth.mfa.listFactors();
    const factor=(f&&f.totp&&f.totp[0])||null;
    if(!factor){setVerificando(false);setError("No encontramos tu método de verificación.");return;}
    const{error:err}=await sb.auth.mfa.challengeAndVerify({factorId:factor.id,code:codigo});
    setVerificando(false);
    if(err){setError("Ese código no es válido. Revisa que tu reloj esté en hora e inténtalo otra vez.");return;}
    onOk();
  };

  const usarRespaldo=async(e)=>{
    e.preventDefault();setError("");
    if(respaldo.trim().length<8){setError("Escribe uno de tus códigos de respaldo completo.");return;}
    setVerificando(true);
    const{error:err}=await sb.rpc("usar_codigo_respaldo",{p_codigo:respaldo});
    setVerificando(false);
    if(err){setError(err.message);return;}
    alert("Listo. Te desactivamos la verificación en dos pasos para que puedas entrar. Vuelve a activarla desde tu panel de agente con tu teléfono nuevo.");
    location.reload();
  };

  const caja=(contenido)=><div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,padding:26,width:"100%",maxWidth:380,boxShadow:"0 8px 30px rgba(0,0,0,.08)"}}>{contenido}</div>
  </div>;

  if(modo==="respaldo")return caja(<>
    <form onSubmit={usarRespaldo}>
      <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:6}}>¿Perdiste tu teléfono?</div>
      <div style={{fontSize:13.5,color:"#374151",lineHeight:1.5,marginBottom:16}}>
        Escribe uno de tus códigos de respaldo. Vamos a <strong>desactivarte la verificación en dos pasos</strong> para que puedas entrar, y la vuelves a activar con tu teléfono nuevo.
      </div>
      <input value={respaldo} onChange={e=>setRespaldo(e.target.value.toUpperCase())} placeholder="XXXXX-XXXXX" name="respaldo" autoFocus
        style={{width:"100%",padding:"14px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:18,letterSpacing:2,textAlign:"center",fontFamily:"ui-monospace,Consolas,monospace",marginBottom:10}}/>
      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <Boton type="submit" disabled={verificando}>{verificando?"Verificando...":"Usar este código"}</Boton>
    </form>
    <button onClick={()=>{setModo("totp");setError("");}} style={{background:"none",border:"none",color:"#53647D",fontSize:12.5,cursor:"pointer",marginTop:14,padding:0}}>Sí tengo mi teléfono</button>
  </>);

  return caja(<>
    <form onSubmit={verificar}>
      <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:6}}>Verificación en dos pasos</div>
      <div style={{fontSize:13.5,color:"#374151",lineHeight:1.5,marginBottom:16}}>Abre tu app de autenticación y escribe el código de 6 dígitos.</div>
      <input value={codigo} onChange={e=>setCodigo(e.target.value.replace(/\D/g,"").slice(0,6))}
        type="tel" inputMode="numeric" placeholder="••••••" name="codigo" autoFocus
        style={{width:"100%",padding:"14px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:26,letterSpacing:"12px",textAlign:"center",fontFamily:"inherit",marginBottom:10}}/>
      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <Boton type="submit" disabled={verificando}>{verificando?"Verificando...":"Entrar"}</Boton>
    </form>
    <div style={{fontSize:12.5,color:"#374151",lineHeight:1.5,marginTop:16,paddingTop:14,borderTop:"1px solid #DDE4EE"}}>
      <strong>¿Perdiste o cambiaste de teléfono?</strong> Escríbenos a <a href="mailto:hola@upco.app?subject=Perdí mi teléfono — verificación en dos pasos" style={{color:"#10284A",fontWeight:700}}>hola@upco.app</a> y te lo quitamos para que puedas entrar.
      <div style={{marginTop:8}}>
        <button onClick={()=>{setModo("respaldo");setError("");}} style={{background:"none",border:"none",color:"#53647D",fontSize:12.5,cursor:"pointer",padding:0,textDecoration:"underline"}}>
          Tengo un código de respaldo
        </button>
      </div>
    </div>
    <div><button onClick={onSalir} style={{background:"none",border:"none",color:"#53647D",fontSize:12.5,cursor:"pointer",marginTop:14,padding:0}}>Cerrar sesión</button></div>
  </>);
}

function App(){
  const[sesion,setSesion]=useState(undefined);
  const[mfa,setMfa]=useState("revisando");
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSesion(data.session||null));
    const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSesion(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!sesion){setMfa("revisando");return;}
    sb.auth.mfa.getAuthenticatorAssuranceLevel().then(({data})=>{
      if(data&&data.nextLevel==="aal2"&&data.currentLevel!=="aal2")setMfa("pedir");
      else setMfa("ok");
    }).catch(()=>setMfa("ok"));
  },[sesion]);

  const salir=()=>sb.auth.signOut();
  const cargando=<div style={{padding:40,textAlign:"center",color:"#6B7280"}}>Cargando...</div>;

  return <>
    <HeaderBar/>
    {sesion===undefined
      ?cargando
      :!sesion
        ?<Login/>
        :mfa==="revisando"
          ?cargando
          :mfa==="pedir"
            ?<PedirSegundoFactor onOk={()=>setMfa("ok")} onSalir={salir}/>
            :<PanelPromotoria session={sesion} onSalir={salir}/>}
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
