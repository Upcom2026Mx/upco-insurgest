<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upco InsurGest — Panel del fundador</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="../icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../estilos.css"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(180deg,#F8FAFC 0%,#F0F4F9 380px);color:#0a1c35;min-height:100vh}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../shared.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

const est={
  input:{width:"100%",padding:"13px 15px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:15,marginBottom:10,fontFamily:"inherit"},
  card:{background:"#fff",borderRadius:16,padding:22,border:"1px solid rgba(16,40,74,.08)",boxShadow:"0 3px 12px rgba(16,28,53,.07), 0 1px 3px rgba(16,28,53,.05)"},
  fila:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderBottom:"1px solid #f1f5f9"},
  linkBtn:{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer",padding:"4px 8px"},
  badge:(color)=>({display:"inline-block",fontSize:11,fontWeight:700,color,background:color+"1a",borderRadius:7,padding:"3px 9px"})
};

const colorEstatusAgente={pendiente:"#F59E0B",aprobado:"#16a34a",rechazado:"#dc2626"};

function textoEstatusPago(cuenta){
  if(cuenta.estatus_suscripcion==="active"||cuenta.estatus_suscripcion==="trialing"){
    const proximo=cuenta.suscripcion_vigente_hasta?` · próximo cobro ${fecha(cuenta.suscripcion_vigente_hasta.slice(0,10))}`:"";
    return`Suscripción activa (${cuenta.plan_periodo||"—"})${proximo}`;
  }
  // El orden de aquí en adelante tiene que ser el mismo que el de accesoVigente() en shared.js,
  // o el panel diría una cosa y el candado haría otra.
  const ahora=new Date();
  if(cuenta.acceso_extendido_hasta&&ahora<=new Date(cuenta.acceso_extendido_hasta))
    return`Acceso extendido hasta ${fecha(cuenta.acceso_extendido_hasta.slice(0,10))}`;
  if(cuenta.aprobado_en){
    const finPrueba=new Date(new Date(cuenta.aprobado_en).getTime()+30*86400000);
    if(ahora<=finPrueba)return`En prueba — vence ${fecha(finPrueba.toISOString().slice(0,10))}`;
  }
  // past_due / unpaid / canceled son estados reales de Stripe: ya pagó alguna vez pero hoy
  // no está al corriente — no es lo mismo que nunca haber pagado.
  if(cuenta.estatus_suscripcion)
    return`Suscripción ${cuenta.estatus_suscripcion} — sin acceso, revisar en Stripe`;
  return"Sin acceso vigente (sin pagar)";
}

const VARIANTE_BOTON={"#10284A":"btn-navy","#F59E0B":"btn-amber","#53647D":"btn-neutral","#16a34a":"btn-good"};
function Boton({children,onClick,disabled,color="#10284A",type="button"}){
  return <button type={type} onClick={onClick} disabled={disabled} className={`btn ${VARIANTE_BOTON[color]||"btn-navy"}`}>
    {children}
  </button>;
}

const ALTO_HEADER=54;
function HeaderBar(){
  return <div style={{background:"linear-gradient(135deg,#173863,#0a1c35)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"center",gap:10,height:ALTO_HEADER,boxShadow:"0 2px 14px rgba(10,28,53,.25)"}}>
    <span style={{color:"#fff",fontWeight:700,fontSize:18,fontFamily:"var(--font-display)",display:"inline-flex",alignItems:"center",gap:8}}><span className="brand-logo"></span> <span style={{color:"#F59E0B"}}>InsurGest</span></span>
    <span style={{color:"#fff",fontSize:12,fontWeight:600,background:"rgba(255,255,255,.15)",borderRadius:20,padding:"3px 10px"}}>Portal del Fundador</span>
  </div>;
}

function Login(){
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[error,setError]=useState("");
  const[cargando,setCargando]=useState(false);

  const entrar=async(e)=>{
    e.preventDefault();
    if(!email||!email.includes("@")){setError("Escribe un correo válido.");return;}
    if(!password){setError("Escribe tu contraseña.");return;}
    setError("");setCargando(true);
    const{error}=await sb.auth.signInWithPassword({email:email.trim(),password});
    setCargando(false);
    if(error){
      if(error.message&&error.message.toLowerCase().includes("email not confirmed")){
        setError("Tu correo todavía no está confirmado. Revisa tu bandeja de entrada.");
      }else{
        setError(`Correo o contraseña incorrectos. (${error.message||"sin detalle"})`);
      }
      return;
    }
  };

  return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <form onSubmit={entrar} style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:380,boxShadow:"0 8px 30px rgba(0,0,0,.08)"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:20,color:"#10284A"}}>Iniciar sesión</div>
      <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu correo" type="email" autoComplete="username" style={est.input}/>
      <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="tu contraseña" type="password" autoComplete="current-password" style={{...est.input,marginBottom:12}}/>
      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <div style={{width:"100%"}}><Boton type="submit" disabled={cargando}>{cargando?"Entrando...":"Iniciar sesión"}</Boton></div>
    </form>
  </div>;
}

function TarjetaKPI({label,valor,color,grande}){
  return <div style={{...est.card,textAlign:"center"}}>
    <div style={{fontSize:grande?30:22,fontWeight:700,color:color||"#10284A"}}>{valor}</div>
    <div style={{fontSize:12,color:"#8FA0B4",marginTop:4}}>{label}</div>
  </div>;
}

function Resumen(){
  const[r,setR]=useState(null);
  const[error,setError]=useState("");

  useEffect(()=>{
    sb.rpc("admin_resumen").then(({data,error})=>{
      if(error){setError(error.message);return;}
      setR(data);
    });
  },[]);

  if(error)return <div style={{color:"#dc2626",fontSize:13}}>{error}</div>;
  if(!r)return <div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>;

  return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:24}}>
    <TarjetaKPI label="Agentes totales" valor={r.agentes_totales} grande/>
    <TarjetaKPI label="Agentes aprobados" valor={r.agentes_aprobados} color="#16a34a"/>
    <TarjetaKPI label="Afiliaciones de red sin confirmar" valor={r.agentes_red_pendiente} color="#F59E0B"/>
    <TarjetaKPI label="Promotorías" valor={r.promotorias_totales}/>
    <TarjetaKPI label="Promotorías pendientes" valor={r.promotorias_pendientes} color="#F59E0B"/>
    <TarjetaKPI label="Clientes gestionados" valor={r.clientes_totales}/>
    <TarjetaKPI label="Pólizas gestionadas" valor={r.polizas_totales} grande/>
    <TarjetaKPI label="Prima total vigente" valor={pesos(r.prima_total_vigente)}/>
  </div>;
}

function Promotorias(){
  const[promotorias,setPromotorias]=useState(null);
  const[error,setError]=useState("");
  const[filtro,setFiltro]=useState("pendiente");

  const cargar=async()=>{
    const{data,error}=await sb.rpc("admin_promotorias");
    if(error){setError(error.message);return;}
    setPromotorias(data||[]);
  };
  useEffect(()=>{cargar()},[]);

  const aprobar=async(p)=>{
    const{error}=await sb.rpc("admin_aprobar_promotoria",{p_promotoria_id:p.id});
    if(error){setError(error.message);return;}
    cargar();
  };
  const rechazar=async(p)=>{
    if(!window.confirm(`¿Rechazar el registro de ${p.correo}?`))return;
    const{error}=await sb.rpc("admin_rechazar_promotoria",{p_promotoria_id:p.id});
    if(error){setError(error.message);return;}
    cargar();
  };
  const extender=async(p)=>{
    const{error}=await sb.rpc("admin_extender_acceso_promotoria",{p_promotoria_id:p.id,p_dias:30});
    if(error){setError(error.message);return;}
    cargar();
  };

  const resetear2fa=async(p)=>{
    if(!window.confirm(`¿Quitarle la verificación en dos pasos a ${p.nombre_negocio||p.correo}?\n\nVa a poder entrar solo con su contraseña. Dile que la vuelva a activar desde su panel con su teléfono nuevo.`))return;
    const{error}=await sb.rpc("admin_resetear_2fa",{p_user_id:p.id});
    if(error){setError(error.message);return;}
    cargar();
  };

  if(error)return <div style={{color:"#dc2626",fontSize:13}}>{error}</div>;
  if(!promotorias)return <div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>;

  const lista=filtro==="pendiente"?promotorias.filter(p=>p.estatus_aprobacion==="pendiente"):promotorias;

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:700}}>Promotorías {lista?`(${lista.length})`:""}</div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setFiltro("pendiente")} style={{...est.linkBtn,fontWeight:filtro==="pendiente"?700:500,color:filtro==="pendiente"?"#10284A":"#8FA0B4"}}>Pendientes</button>
        <button onClick={()=>setFiltro("todos")} style={{...est.linkBtn,fontWeight:filtro==="todos"?700:500,color:filtro==="todos"?"#10284A":"#8FA0B4"}}>Todos</button>
      </div>
    </div>

    {lista.length===0&&<div style={{...est.card,textAlign:"center",color:"#6B7280"}}>
      {filtro==="pendiente"?"No hay registros pendientes de aprobación.":"No hay promotorías registradas."}
    </div>}

    {lista.length>0&&<div style={{...est.card,padding:0,overflow:"hidden"}}>
      {lista.map(p=><div key={p.id} style={est.fila}>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{p.nombre_negocio||p.correo}</div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>
            {p.correo}{p.nombre?` · ${p.nombre}`:""}{p.rfc?` · RFC ${p.rfc}`:""}
          </div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>Código {p.codigo_invitacion} · {p.agentes} agentes en su red</div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>{textoEstatusPago(p)}{p.tiene_2fa?" · 🔒 2FA activado":""}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={est.badge(colorEstatusAgente[p.estatus_aprobacion]||"#6b7280")}>{p.estatus_aprobacion}</span>
          {p.estatus_aprobacion!=="aprobado"&&<button onClick={()=>aprobar(p)} style={{...est.linkBtn,color:"#16a34a"}}>Aprobar</button>}
          {p.estatus_aprobacion!=="rechazado"&&<button onClick={()=>rechazar(p)} style={{...est.linkBtn,color:"#dc2626"}}>Rechazar</button>}
          {p.estatus_aprobacion==="aprobado"&&<button onClick={()=>extender(p)} style={est.linkBtn}>+30 días</button>}
          {p.tiene_2fa&&<button onClick={()=>resetear2fa(p)} style={est.linkBtn}>Perdió su teléfono</button>}
        </div>
      </div>)}
    </div>}
  </div>;
}

function Agentes(){
  const[agentes,setAgentes]=useState(null);
  const[error,setError]=useState("");
  const[filtro,setFiltro]=useState("red_pendiente"); // red_pendiente | todos

  const cargar=async()=>{
    const{data,error}=await sb.rpc("admin_agentes");
    if(error){setError(error.message);return;}
    setAgentes(data||[]);
  };
  useEffect(()=>{cargar()},[]);

  const aprobarRed=async(a)=>{
    const{error}=await sb.rpc("admin_aprobar_red",{p_agente_id:a.id});
    if(error){setError(error.message);return;}
    cargar();
  };
  // Ya casi nadie debería quedar "rechazado" — esto es para revertir esa decisión puntual, no
  // para el flujo normal de alta (que ahora se aprueba solo, ver Sesión 17).
  const reactivarCuenta=async(a)=>{
    const{error}=await sb.rpc("admin_aprobar_agente",{p_agente_id:a.id});
    if(error){setError(error.message);return;}
    cargar();
  };
  const rechazar=async(a)=>{
    if(!window.confirm(`¿Rechazar el registro de ${a.correo}?`))return;
    const{error}=await sb.rpc("admin_rechazar_agente",{p_agente_id:a.id});
    if(error){setError(error.message);return;}
    cargar();
  };
  const extender=async(a)=>{
    const{error}=await sb.rpc("admin_extender_acceso_agente",{p_agente_id:a.id,p_dias:30});
    if(error){setError(error.message);return;}
    cargar();
  };

  const resetear2fa=async(a)=>{
    if(!window.confirm(`¿Quitarle la verificación en dos pasos a ${a.nombre||a.correo}?\n\nVa a poder entrar solo con su contraseña. Dile que la vuelva a activar desde Mi perfil con su teléfono nuevo.`))return;
    const{error}=await sb.rpc("admin_resetear_2fa",{p_user_id:a.id});
    if(error){setError(error.message);return;}
    cargar();
  };

  if(error)return <div style={{color:"#dc2626",fontSize:13}}>{error}</div>;
  if(!agentes)return <div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>;

  const lista=filtro==="red_pendiente"?agentes.filter(a=>a.promotoria_nombre&&!a.red_aprobada_en):agentes;

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:700}}>Agentes {lista?`(${lista.length})`:""}</div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setFiltro("red_pendiente")} style={{...est.linkBtn,fontWeight:filtro==="red_pendiente"?700:500,color:filtro==="red_pendiente"?"#10284A":"#8FA0B4"}}>Red por confirmar</button>
        <button onClick={()=>setFiltro("todos")} style={{...est.linkBtn,fontWeight:filtro==="todos"?700:500,color:filtro==="todos"?"#10284A":"#8FA0B4"}}>Todos</button>
      </div>
    </div>

    {lista.length===0&&<div style={{...est.card,textAlign:"center",color:"#6B7280"}}>
      {filtro==="red_pendiente"?"No hay afiliaciones a una red esperando confirmación.":"No hay agentes registrados."}
    </div>}

    {lista.length>0&&<div style={{...est.card,padding:0,overflow:"hidden"}}>
      {lista.map(a=><div key={a.id} style={est.fila}>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{a.nombre||a.correo}</div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>
            {a.correo}{a.nombre_negocio?` · ${a.nombre_negocio}`:""}{a.telefono?` · ${a.telefono}`:""}
          </div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>
            {a.rfc?`RFC ${a.rfc}`:"Sin RFC"}
            {" · "}
            {a.tiene_cedula?`Cédula ${(a.tipos_cedula||[]).join(", ")||"—"}${a.numero_cedula?` (No. ${a.numero_cedula})`:""}`:"Sin cédula registrada"}
          </div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>{a.clientes} clientes · {a.polizas} pólizas{a.acepto_terminos?" · Aceptó términos":" · No ha aceptado términos"}</div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>{textoEstatusPago(a)}{a.tiene_2fa?" · 🔒 2FA activado":""}</div>
          {a.promotoria_nombre&&!a.red_aprobada_en&&<div style={{fontSize:12,marginTop:2,color:"#B45309"}}>
            Red: {a.promotoria_nombre} — afiliación sin confirmar
          </div>}
          {a.promotoria_nombre&&a.red_aprobada_en&&<div style={{fontSize:12,marginTop:2,color:a.posicion_red<=5?"#16a34a":"#B45309"}}>
            Red: {a.promotoria_nombre} — {a.posicion_red<=5?`incluido (posición ${a.posicion_red})`:`agente adicional $249/mes (posición ${a.posicion_red})`}
          </div>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={est.badge(colorEstatusAgente[a.estatus_aprobacion]||"#6b7280")}>{a.estatus_aprobacion}</span>
          {a.promotoria_nombre&&!a.red_aprobada_en&&<button onClick={()=>aprobarRed(a)} style={{...est.linkBtn,color:"#16a34a"}}>Confirmar red</button>}
          {a.estatus_aprobacion==="rechazado"&&<button onClick={()=>reactivarCuenta(a)} style={{...est.linkBtn,color:"#16a34a"}}>Reactivar cuenta</button>}
          {a.estatus_aprobacion!=="rechazado"&&<button onClick={()=>rechazar(a)} style={{...est.linkBtn,color:"#dc2626"}}>Rechazar</button>}
          {a.estatus_aprobacion==="aprobado"&&<button onClick={()=>extender(a)} style={est.linkBtn}>+30 días</button>}
          {a.tiene_2fa&&<button onClick={()=>resetear2fa(a)} style={est.linkBtn}>Perdió su teléfono</button>}
        </div>
      </div>)}
    </div>}
  </div>;
}

const tabStyle=(activo)=>({
  background:"none",border:"none",borderBottom:activo?"2px solid #10284A":"2px solid transparent",
  padding:"8px 4px",marginBottom:-1,fontSize:14,fontWeight:activo?700:500,
  color:activo?"#10284A":"#8FA0B4",cursor:"pointer"
});

const ETIQUETA_SERVICIO={sitio_web:"Sitio web",correo:"Correo con dominio",ambos:"Sitio web y correo"};

function SolicitudesServicio(){
  const[filas,setFilas]=useState(null);
  const[error,setError]=useState("");

  const cargar=async()=>{
    const{data,error}=await sb.rpc("admin_solicitudes_servicio");
    if(error){setError(error.message);return;}
    setFilas(data||[]);
  };
  useEffect(()=>{cargar()},[]);

  const marcar=async(s,estatus)=>{
    const{error}=await sb.rpc("admin_marcar_servicio",{p_id:s.id,p_estatus:estatus});
    if(error){setError(error.message);return;}
    cargar();
  };

  if(error)return <div style={{color:"#dc2626",fontSize:13}}>{error}</div>;
  if(!filas)return <div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>;
  if(filas.length===0)return <div style={{...est.card,textAlign:"center",color:"#6B7280"}}>Todavía nadie ha pedido sitio web o correo.</div>;

  return <div>
    {filas.map(s=><div key={s.id} style={{...est.card,marginBottom:10,opacity:s.estatus==="atendida"?0.6:1}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{ETIQUETA_SERVICIO[s.servicio]||s.servicio} — {s.solicitante_nombre||"—"}</div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>
            {s.solicitante_tipo}{s.solicitante_negocio?` · ${s.solicitante_negocio}`:""}{" · "}
            {new Date(s.created_at).toLocaleString("es-MX",{day:"numeric",month:"short",hour:"numeric",minute:"2-digit"})}
          </div>
          <div style={{fontSize:13,color:"#374151",marginTop:4}}>
            {s.solicitante_correo}{s.solicitante_telefono?` · ${s.solicitante_telefono}`:""}
          </div>
          {s.notas&&<div style={{fontSize:13,color:"#374151",marginTop:6}}>{s.notas}</div>}
        </div>
        <span style={est.badge(s.estatus==="nueva"?"#F59E0B":"#6b7280")}>{s.estatus}</span>
      </div>
      <div style={{marginTop:10}}>
        <button onClick={()=>marcar(s,s.estatus==="nueva"?"atendida":"nueva")} style={est.linkBtn}>
          {s.estatus==="nueva"?"Marcar atendida":"Reabrir"}
        </button>
      </div>
    </div>)}
  </div>;
}

function PanelAdmin({session,onSalir}){
  const[vista,setVista]=useState("resumen"); // resumen | agentes | promotorias | servicios
  const[noAutorizado,setNoAutorizado]=useState(false);

  useEffect(()=>{
    sb.rpc("es_admin").then(({data,error})=>{
      if(error||!data)setNoAutorizado(true);
    });
  },[]);

  if(noAutorizado)return <div style={{padding:40,textAlign:"center",color:"#dc2626"}}>
    Esta cuenta no tiene permiso para ver el panel de administración.
    <div style={{marginTop:16}}><button onClick={onSalir} style={est.linkBtn}>Salir</button></div>
  </div>;

  return <div style={{maxWidth:760,margin:"0 auto",padding:"24px 16px 60px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div style={{fontSize:16,fontWeight:700,color:"#10284A"}}>Hola, fundador</div>
      <button onClick={onSalir} style={{background:"none",border:"none",color:"#6B7280",fontSize:14,cursor:"pointer"}}>Salir ({session.user.email})</button>
    </div>

    <div style={{display:"flex",gap:16,marginBottom:24,borderBottom:"1px solid #DDE4EE"}}>
      <button onClick={()=>setVista("resumen")} style={tabStyle(vista==="resumen")}>Resumen</button>
      <button onClick={()=>setVista("agentes")} style={tabStyle(vista==="agentes")}>Agentes</button>
      <button onClick={()=>setVista("promotorias")} style={tabStyle(vista==="promotorias")}>Promotorías</button>
      <button onClick={()=>setVista("servicios")} style={tabStyle(vista==="servicios")}>Servicios</button>
    </div>

    {vista==="resumen"?<Resumen/>:vista==="promotorias"?<Promotorias/>:vista==="servicios"?<SolicitudesServicio/>:<Agentes/>}
  </div>;
}

function App(){
  const[sesion,setSesion]=useState(undefined);
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSesion(data.session||null));
    const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSesion(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  return <>
    <HeaderBar/>
    {sesion===undefined
      ?<div style={{padding:40,textAlign:"center",color:"#6B7280"}}>Cargando...</div>
      :!sesion
        ?<Login/>
        :<PanelAdmin session={sesion} onSalir={()=>sb.auth.signOut()}/>}
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
