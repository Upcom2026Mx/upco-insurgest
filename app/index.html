<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upco InsurGest — Panel del agente</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="manifest" href="../manifest.webmanifest"/>
<link rel="icon" href="../icon-192.png"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#F4F7FB;color:#0a1c35}

  /* ── Pantalla de bienvenida ──
     "Insurance" y "Gestión" caen desde arriba y se les colapsa la terminación hasta formar
     "InsurGest". Mismo mecanismo que el splash de Homey ("Home"+"money" → "Homey"), en vertical. */
  #splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#10284A,#0a1c35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .6s ease;padding:24px}
  #splash.oculto{opacity:0;pointer-events:none}
  #splash .mono{border-radius:24px;box-shadow:0 16px 44px rgba(0,0,0,.45);line-height:0;opacity:0;transform:scale(.82) translateY(8px);animation:sLogo .9s cubic-bezier(.2,.7,.3,1) .1s forwards}
  #splash .marca{font-size:28px;font-weight:800;color:#fff;margin-top:8px;display:flex;align-items:baseline;gap:8px;white-space:nowrap}
  #splash .upco{opacity:0;animation:sFade .5s ease .4s forwards}
  #splash .ig{display:inline-flex;color:#F59E0B;animation:sGrow .5s ease 2.5s forwards}
  #splash .insur{display:inline-flex;opacity:0;transform:translateY(-28px);animation:sBaja .6s cubic-bezier(.2,.7,.3,1) 1s forwards}
  #splash .gest{display:inline-flex;opacity:0;transform:translateY(-28px);animation:sBaja .6s cubic-bezier(.2,.7,.3,1) 1.7s forwards}
  #splash .cae{display:inline-block;overflow:hidden;max-width:110px;animation:sColapsa .5s ease 2.5s forwards}
  #splash .esp{max-width:9px}
  #splash .sub{font-size:15px;font-weight:500;color:#8FA0B4;opacity:0;animation:sFade .5s ease 3.1s forwards;text-align:center}
  #splash .barra{width:120px;height:4px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden;opacity:0;animation:sFade .4s ease .3s forwards}
  #splash .barra i{display:block;height:100%;width:40%;border-radius:99px;background:#F59E0B;animation:sCarga 1.1s ease-in-out .3s infinite}
  @keyframes sLogo{to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes sFade{to{opacity:1}}
  @keyframes sCarga{0%{margin-left:-40%}100%{margin-left:120%}}
  @keyframes sBaja{to{opacity:1;transform:translateY(0)}}
  @keyframes sColapsa{to{max-width:0;opacity:0}}
  @keyframes sGrow{0%{transform:scale(1)}60%{transform:scale(1.15)}100%{transform:scale(1.05)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../shared.js"></script>
</head>
<body>
<div id="splash">
  <div class="mono"><svg width="84" height="84" viewBox="0 0 38 38"><rect width="38" height="38" rx="11" fill="#10284A"/><text x="19" y="25" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-weight="800" font-size="14" fill="#F59E0B">IG</text></svg></div>
  <div class="marca">
    <span class="upco">Upco</span>
    <span class="ig"><span class="insur">Insur<span class="cae">ance</span></span><span class="cae esp">&nbsp;</span><span class="gest">Gest<span class="cae">ión</span></span></span>
  </div>
  <div class="sub">Portal del agente</div>
  <div class="barra"><i></i></div>
</div>
<script>
// Va aquí, junto al splash y no al final del archivo, para que corra mientras el navegador
// todavía está armando la página: si esperara al final, quien ya lo vio alcanzaría a ver un
// parpadeo antes de que lo quitemos.
(function(){
  var s=document.getElementById("splash");
  if(!s)return;
  var quieto=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  // Una sola vez por sesión. Homey lo muestra en cada carga porque es una app instalada que
  // abres y cierras; aquí el agente entra a trabajar varias veces al día y hacerlo esperar
  // 4 segundos cada vez sería cobrarle la animación a su tiempo.
  if(quieto||sessionStorage.getItem("upco_ig_splash")){s.remove();return;}
  try{sessionStorage.setItem("upco_ig_splash","1");}catch(e){}
  setTimeout(function(){s.classList.add("oculto");setTimeout(function(){s.remove();},700);},3800);
})();
</script>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

const FORMAS_PAGO=["anual","semestral","trimestral","mensual"];
const ESTATUS_POLIZA=["vigente","vencida","renovada","cancelada"];
const DURACIONES=[{value:"1",label:"1 año"},{value:"2",label:"2 años"},{value:"custom",label:"Personalizada"}];
const TIPOS_VEHICULO=["familiar","comercial","carga"];
const TIPOS_CARGA=["A","B","C"];
const UN_ANIO_SEGUNDOS=60*60*24*365;
const TIPOS_CEDULA=["A","B","C","D","F","Otra"];
const VERSION_TERMINOS="2026-07-10";
const LIMITE_STORAGE_BYTES=5*1024*1024*1024; // 5 GB por agente, para PDFs de pólizas

function sumarAnios(fechaISO,anios){
  const d=new Date(fechaISO+"T00:00:00");
  d.setFullYear(d.getFullYear()+anios);
  return d.toISOString().slice(0,10);
}

const est={
  input:{width:"100%",padding:"12px 14px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:15,marginBottom:10,fontFamily:"inherit"},
  label:{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"},
  card:{background:"#fff",borderRadius:14,padding:18,border:"1px solid #DDE4EE"},
  fila:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderBottom:"1px solid #f1f5f9",cursor:"pointer"},
  linkBtn:{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer",padding:"4px 8px"},
  badge:(color)=>({display:"inline-block",fontSize:11,fontWeight:700,color,background:color+"1a",borderRadius:6,padding:"3px 8px"})
};

function Boton({children,onClick,disabled,color="#10284A",type="button"}){
  return <button type={type} onClick={onClick} disabled={disabled}
    style={{background:disabled?"#DDE4EE":color,color:disabled?"#9ca3af":"#fff",border:"none",borderRadius:10,padding:"12px 18px",fontSize:15,fontWeight:700,cursor:disabled?"not-allowed":"pointer"}}>
    {children}
  </button>;
}

function Campo({label,children}){
  return <div>{label&&<label style={est.label}>{label}</label>}{children}</div>;
}

const ALTO_HEADER=54;
function HeaderBar(){
  return <div style={{background:"#10284A",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"center",gap:10,height:ALTO_HEADER}}>
    <span style={{color:"#fff",fontWeight:800,fontSize:16}}>Upco <span style={{color:"#F59E0B"}}>InsurGest</span></span>
    <span style={{color:"#fff",fontSize:12,fontWeight:600,background:"rgba(255,255,255,.15)",borderRadius:20,padding:"3px 10px"}}>Portal Agente</span>
  </div>;
}

function Login(){
  const[modo,setModo]=useState(new URLSearchParams(location.search).get("registro")?"registro":"entrar"); // entrar | registro
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[nombre,setNombre]=useState("");
  const[nombreNegocio,setNombreNegocio]=useState("");
  const[telefono,setTelefono]=useState("");
  const[rfc,setRfc]=useState("");
  const[tieneCedula,setTieneCedula]=useState(false);
  const[tiposCedula,setTiposCedula]=useState([]);
  const[numeroCedula,setNumeroCedula]=useState("");
  const[codigoPromotoria,setCodigoPromotoria]=useState("");
  const[aceptoTerminos,setAceptoTerminos]=useState(false);
  const[error,setError]=useState("");
  const[cargando,setCargando]=useState(false);
  const[registroListo,setRegistroListo]=useState(false);

  const toggleCedula=(t)=>{
    setTiposCedula(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t]);
  };

  const entrar=async(e)=>{
    e.preventDefault();
    if(!email||!email.includes("@")){setError("Escribe un correo válido.");return;}
    if(!password){setError("Escribe tu contraseña.");return;}
    setError("");setCargando(true);
    const{error}=await sb.auth.signInWithPassword({email:email.trim(),password});
    setCargando(false);
    if(error){
      if(error.message&&error.message.toLowerCase().includes("email not confirmed")){
        setError("Tu correo todavía no está confirmado. Revisa tu bandeja de entrada.");
      }else{
        setError(`Correo o contraseña incorrectos. (${error.message||"sin detalle"})`);
      }
      return;
    }
  };

  const registrar=async(e)=>{
    e.preventDefault();
    if(!email||!email.includes("@")){setError("Escribe un correo válido.");return;}
    if(!nombre.trim()){setError("Escribe tu nombre.");return;}
    if(!password||password.length<6){setError("La contraseña debe tener al menos 6 caracteres.");return;}
    if(!aceptoTerminos){setError("Debes aceptar los Términos y Condiciones y el Aviso de Privacidad para registrarte.");return;}
    setError("");setCargando(true);
    const{data,error}=await sb.auth.signUp({
      email:email.trim(),
      password,
      options:{data:{
        nombre:nombre.trim(),
        nombre_negocio:nombreNegocio.trim()||null,
        telefono:telefono.trim()||null,
        rfc:rfc.trim()||null,
        tiene_cedula:tieneCedula,
        tipos_cedula:tieneCedula&&tiposCedula.length>0?tiposCedula:null,
        numero_cedula:tieneCedula?(numeroCedula.trim()||null):null,
        acepto_terminos:true,
        acepto_terminos_version:VERSION_TERMINOS,
        acepto_terminos_fecha:new Date().toISOString(),
        codigo_promotoria:codigoPromotoria.trim()||null
      }}
    });
    setCargando(false);
    if(error){setError(error.message);return;}
    // sin confirmación de correo, signUp ya deja una sesión activa — App() la detecta sola
    // (onAuthStateChange) y navega al panel, que muestra "pendiente de aprobación".
    if(!data.session)setRegistroListo(true);
  };

  if(registroListo)return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:380,boxShadow:"0 8px 30px rgba(0,0,0,.08)",textAlign:"center"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:12,color:"#10284A"}}>¡Cuenta creada!</div>
      <div style={{fontSize:14,color:"#374151",lineHeight:1.6}}>Revisa tu correo para confirmar tu cuenta. Una vez confirmada, podrás iniciar sesión — tu acceso quedará pendiente de aprobación hasta que lo revisemos.</div>
    </div>
  </div>;

  return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <form onSubmit={modo==="entrar"?entrar:registrar} style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:380,boxShadow:"0 8px 30px rgba(0,0,0,.08)"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:20,color:"#10284A"}}>{modo==="entrar"?"Iniciar sesión":"Crear cuenta de agente"}</div>

      {modo==="registro"&&<>
        <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="tu nombre" style={est.input}/>
        <input value={nombreNegocio} onChange={e=>setNombreNegocio(e.target.value)} placeholder="nombre de tu negocio (opcional)" style={est.input}/>
        <input value={telefono} onChange={e=>setTelefono(e.target.value)} placeholder="teléfono (opcional)" style={est.input}/>
        <input value={rfc} onChange={e=>setRfc(e.target.value.toUpperCase())} placeholder="RFC (opcional)" style={est.input}/>

        <label style={{display:"flex",alignItems:"center",gap:8,fontSize:14,color:"#374151",cursor:"pointer",marginBottom:10}}>
          <input type="checkbox" checked={tieneCedula} onChange={e=>setTieneCedula(e.target.checked)}/>
          Tengo cédula de agente
        </label>

        {tieneCedula&&<div style={{marginBottom:10}}>
          <label style={est.label}>Tipo de cédula</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:8}}>
            {TIPOS_CEDULA.map(t=><label key={t} style={{display:"flex",alignItems:"center",gap:4,fontSize:13,color:"#374151",cursor:"pointer"}}>
              <input type="checkbox" checked={tiposCedula.includes(t)} onChange={()=>toggleCedula(t)}/>{t}
            </label>)}
          </div>
          <input value={numeroCedula} onChange={e=>setNumeroCedula(e.target.value)} placeholder="Número de cédula" style={est.input}/>
        </div>}

        <input value={codigoPromotoria} onChange={e=>setCodigoPromotoria(e.target.value.toUpperCase())} placeholder="Código de promotoría (opcional)" style={est.input}/>
      </>}
      <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu correo" type="email" autoComplete="username" style={est.input}/>
      <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="tu contraseña" type="password" autoComplete={modo==="entrar"?"current-password":"new-password"} style={{...est.input,marginBottom:12}}/>

      {modo==="registro"&&<label style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:13,color:"#374151",marginBottom:12,cursor:"pointer"}}>
        <input type="checkbox" checked={aceptoTerminos} onChange={e=>setAceptoTerminos(e.target.checked)} style={{marginTop:2}}/>
        <span>Acepto los <a href="../terminos/" target="_blank" rel="noopener" style={{color:"#10284A"}}>Términos y Condiciones y el Aviso de Privacidad</a>.</span>
      </label>}

      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <div style={{width:"100%"}}><Boton type="submit" disabled={cargando}>
        {cargando?(modo==="entrar"?"Entrando...":"Creando cuenta..."):(modo==="entrar"?"Iniciar sesión":"Crear cuenta")}
      </Boton></div>
      <button type="button" onClick={()=>{setModo(modo==="entrar"?"registro":"entrar");setError("");}} style={{...est.linkBtn,marginTop:12,padding:0}}>
        {modo==="entrar"?"¿Eres nuevo? Crea tu cuenta de agente":"¿Ya tienes cuenta? Inicia sesión"}
      </button>
      <div style={{marginTop:10}}><a href="../precios/" style={{fontSize:13,color:"#8FA0B4"}}>Ver precios</a></div>
    </form>
  </div>;
}

// ============ CLIENTE ============

function ClienteForm({agenteId,clienteExistente,onGuardado,onCancelar}){
  const c=clienteExistente;
  const[tipoPersona,setTipoPersona]=useState(c?c.tipo_persona:"fisica");
  const[nombre,setNombre]=useState(c?c.nombre:"");
  const[rfc,setRfc]=useState(c?c.rfc||"":"");
  const[curp,setCurp]=useState(c?c.curp||"":"");
  const[correo,setCorreo]=useState(c?c.correo||"":"");
  const[telefono,setTelefono]=useState(c?c.telefono||"":"");
  const[notas,setNotas]=useState(c?c.notas||"":"");
  const[guardando,setGuardando]=useState(false);
  const[error,setError]=useState("");

  const guardar=async(e)=>{
    e.preventDefault();
    if(!nombre.trim()){setError("El nombre es obligatorio.");return;}
    setError("");setGuardando(true);
    const payload={
      tipo_persona:tipoPersona,
      nombre:nombre.trim(),
      rfc:rfc.trim()||null,
      curp:tipoPersona==="fisica"?(curp.trim()||null):null,
      correo:correo.trim()||null,
      telefono:telefono.trim()||null,
      notas:notas.trim()||null,
    };
    let resultado;
    if(c){
      resultado=await sb.from("clientes").update(payload).eq("id",c.id).select().single();
    }else{
      resultado=await sb.from("clientes").insert({...payload,agente_id:agenteId}).select().single();
    }
    setGuardando(false);
    if(resultado.error){setError(resultado.error.message);return;}
    onGuardado(resultado.data);
  };

  return <form onSubmit={guardar} style={{...est.card,marginBottom:24}}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>{c?"Editar cliente":"Nuevo cliente"}</div>

    <Campo label="Tipo de persona">
      <select name="tipo_persona" value={tipoPersona} onChange={e=>setTipoPersona(e.target.value)} style={est.input}>
        <option value="fisica">Persona física</option>
        <option value="moral">Persona moral</option>
      </select>
    </Campo>

    <Campo label={tipoPersona==="moral"?"Razón social":"Nombre completo"}>
      <input name="nombre" value={nombre} onChange={e=>setNombre(e.target.value)} style={est.input}/>
    </Campo>

    <div style={{display:"grid",gridTemplateColumns:tipoPersona==="fisica"?"1fr 1fr":"1fr",gap:10}}>
      <Campo label="RFC">
        <input name="rfc" value={rfc} onChange={e=>setRfc(e.target.value.toUpperCase())} style={est.input}/>
      </Campo>
      {tipoPersona==="fisica"&&<Campo label="CURP">
        <input name="curp" value={curp} onChange={e=>setCurp(e.target.value.toUpperCase())} style={est.input}/>
      </Campo>}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo label="Correo electrónico">
        <input name="correo" value={correo} onChange={e=>setCorreo(e.target.value)} type="email" style={est.input}/>
      </Campo>
      <Campo label="Teléfono">
        <input name="telefono" value={telefono} onChange={e=>setTelefono(e.target.value)} style={est.input}/>
      </Campo>
    </div>

    <Campo label="Notas">
      <textarea name="notas" value={notas} onChange={e=>setNotas(e.target.value)} rows={2} style={est.input}/>
    </Campo>

    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <div style={{display:"flex",gap:10}}>
      <Boton type="submit" disabled={guardando}>{guardando?"Guardando...":"Guardar"}</Boton>
      <button type="button" onClick={onCancelar} style={est.linkBtn}>Cancelar</button>
    </div>
  </form>;
}

function ClientesList({agenteId,onAbrirCliente}){
  const[clientes,setClientes]=useState(null);
  const[formAbierto,setFormAbierto]=useState(false);
  const[formPolizaAbierto,setFormPolizaAbierto]=useState(false);
  const[error,setError]=useState("");

  const cargar=async()=>{
    const{data,error}=await sb.from("clientes").select("*").eq("agente_id",agenteId).order("nombre");
    if(error){setError(error.message);return;}
    setClientes(data);
  };
  useEffect(()=>{cargar()},[]);

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:700}}>Mis clientes {clientes?`(${clientes.length})`:""}</div>
      {!formAbierto&&!formPolizaAbierto&&<div style={{display:"flex",gap:8}}>
        {clientes&&clientes.length>0&&<Boton color="#F59E0B" onClick={()=>setFormPolizaAbierto(true)}>+ Nueva póliza</Boton>}
        <Boton onClick={()=>setFormAbierto(true)}>+ Nuevo cliente</Boton>
      </div>}
    </div>

    {formAbierto&&<ClienteForm agenteId={agenteId}
      onGuardado={()=>{setFormAbierto(false);cargar();}}
      onCancelar={()=>setFormAbierto(false)}/>}

    {formPolizaAbierto&&<PolizaForm agenteId={agenteId} clientesDisponibles={clientes}
      onGuardado={(poliza)=>{
        setFormPolizaAbierto(false);
        const cliente=(clientes||[]).find(c=>c.id===poliza.cliente_id);
        if(cliente)onAbrirCliente(cliente);
      }}
      onCancelar={()=>setFormPolizaAbierto(false)}/>}

    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    {!clientes&&<div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>}
    {clientes&&clientes.length===0&&!formAbierto&&<div style={{...est.card,textAlign:"center",color:"#6B7280"}}>
      Todavía no tienes clientes registrados.
    </div>}
    {clientes&&clientes.length>0&&<div style={{...est.card,padding:0,overflow:"hidden"}}>
      {clientes.map(c=><div key={c.id} style={est.fila} onClick={()=>onAbrirCliente(c)}>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{c.nombre}</div>
          <div style={{fontSize:12,color:"#8FA0B4"}}>{c.tipo_persona==="moral"?"Persona moral":"Persona física"}{c.correo?` · ${c.correo}`:""}</div>
        </div>
        <div style={{color:"#8FA0B4",fontSize:18}}>›</div>
      </div>)}
    </div>}
  </div>;
}

// ============ VEHÍCULO ============

function VehiculoForm({clienteId,vehiculoExistente,onGuardado,onCancelar}){
  const v=vehiculoExistente;
  const[placas,setPlacas]=useState(v?v.placas||"":"");
  const[estado,setEstado]=useState(v?v.estado||"":"");
  const[marca,setMarca]=useState(v?v.marca||"":"");
  const[modelo,setModelo]=useState(v?v.modelo||"":"");
  const[anio,setAnio]=useState(v&&v.anio!=null?String(v.anio):"");
  const[tipoVehiculo,setTipoVehiculo]=useState(v?v.tipo_vehiculo:"familiar");
  const[tipoCarga,setTipoCarga]=useState(v?v.tipo_carga||"A":"A");
  const[fechaVerificacion,setFechaVerificacion]=useState(v?v.fecha_verificacion||"":"");
  const[guardando,setGuardando]=useState(false);
  const[error,setError]=useState("");

  const guardar=async(e)=>{
    e.preventDefault();
    setError("");setGuardando(true);
    const payload={
      placas:placas.trim()||null,
      estado:estado||null,
      marca:marca.trim()||null,
      modelo:modelo.trim()||null,
      anio:anio?parseInt(anio,10):null,
      tipo_vehiculo:tipoVehiculo,
      tipo_carga:tipoVehiculo==="carga"?tipoCarga:null,
      fecha_verificacion:fechaVerificacion||null,
    };
    let resultado;
    if(v){
      resultado=await sb.from("vehiculos").update(payload).eq("id",v.id).select().single();
    }else{
      resultado=await sb.from("vehiculos").insert({...payload,cliente_id:clienteId}).select().single();
    }
    setGuardando(false);
    if(resultado.error){setError(resultado.error.message);return;}
    onGuardado(resultado.data);
  };

  return <form onSubmit={guardar} style={{...est.card,marginBottom:24}}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>{v?"Editar vehículo":"Nuevo vehículo"}</div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo label="Placas">
        <input name="placas" value={placas} onChange={e=>setPlacas(e.target.value.toUpperCase())} style={est.input}/>
      </Campo>
      <Campo label="Estado (placas)">
        <select name="estado" value={estado} onChange={e=>setEstado(e.target.value)} style={est.input}>
          <option value="">— Selecciona —</option>
          {ESTADOS_MX.map(e=><option key={e} value={e}>{e}</option>)}
        </select>
      </Campo>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo label="Marca">
        <input name="marca" value={marca} onChange={e=>setMarca(e.target.value)} style={est.input}/>
      </Campo>
      <Campo label="Modelo">
        <input name="modelo" value={modelo} onChange={e=>setModelo(e.target.value)} style={est.input}/>
      </Campo>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo label="Año">
        <input name="anio" value={anio} onChange={e=>setAnio(e.target.value)} type="number" min="1980" max="2100" style={est.input}/>
      </Campo>
      <Campo label="Fecha de verificación vehicular">
        <input name="fecha_verificacion" value={fechaVerificacion} onChange={e=>setFechaVerificacion(e.target.value)} type="date" style={est.input}/>
      </Campo>
    </div>

    <div style={{display:"grid",gridTemplateColumns:tipoVehiculo==="carga"?"1fr 1fr":"1fr",gap:10}}>
      <Campo label="Tipo de vehículo">
        <select name="tipo_vehiculo" value={tipoVehiculo} onChange={e=>setTipoVehiculo(e.target.value)} style={est.input}>
          {TIPOS_VEHICULO.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </Campo>
      {tipoVehiculo==="carga"&&<Campo label="Tipo de carga">
        <select name="tipo_carga" value={tipoCarga} onChange={e=>setTipoCarga(e.target.value)} style={est.input}>
          {TIPOS_CARGA.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </Campo>}
    </div>

    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <div style={{display:"flex",gap:10}}>
      <Boton type="submit" disabled={guardando}>{guardando?"Guardando...":"Guardar"}</Boton>
      <button type="button" onClick={onCancelar} style={est.linkBtn}>Cancelar</button>
    </div>
  </form>;
}

function VehiculosList({clienteId}){
  const[vehiculos,setVehiculos]=useState(null);
  const[polizasPorVehiculo,setPolizasPorVehiculo]=useState({});
  const[formAbierto,setFormAbierto]=useState(false);
  const[editando,setEditando]=useState(null);
  const[error,setError]=useState("");

  const cargar=async()=>{
    const{data,error}=await sb.from("vehiculos").select("*").eq("cliente_id",clienteId).order("created_at");
    if(error){setError(error.message);return;}
    setVehiculos(data);
    const{data:polizas}=await sb.from("polizas").select("*").eq("cliente_id",clienteId).not("vehiculo_id","is",null);
    const mapa={};
    (polizas||[]).forEach(p=>{
      const actual=mapa[p.vehiculo_id];
      if(!actual||(p.fecha_fin||"")>(actual.fecha_fin||""))mapa[p.vehiculo_id]=p;
    });
    setPolizasPorVehiculo(mapa);
  };
  useEffect(()=>{cargar()},[]);

  const eliminar=async(vehiculo)=>{
    if(!window.confirm(`¿Eliminar el vehículo ${vehiculo.placas||""}?`.trim()))return;
    const{error}=await sb.from("vehiculos").delete().eq("id",vehiculo.id);
    if(error){setError(error.message);return;}
    cargar();
  };

  const limite=vehiculos&&vehiculos.length>=5;

  return <div style={{marginBottom:32}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:700}}>Vehículos {vehiculos?`(${vehiculos.length}/5)`:""}</div>
      {!formAbierto&&!editando&&!limite&&<Boton color="#53647D" onClick={()=>setFormAbierto(true)}>+ Nuevo vehículo</Boton>}
    </div>

    {limite&&!formAbierto&&<div style={{fontSize:12,color:"#8FA0B4",marginBottom:10}}>Este cliente ya tiene el máximo de 5 vehículos.</div>}

    {formAbierto&&<VehiculoForm clienteId={clienteId}
      onGuardado={()=>{setFormAbierto(false);cargar();}}
      onCancelar={()=>setFormAbierto(false)}/>}

    {editando&&<VehiculoForm clienteId={clienteId} vehiculoExistente={editando}
      onGuardado={()=>{setEditando(null);cargar();}}
      onCancelar={()=>setEditando(null)}/>}

    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    {!vehiculos&&<div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>}
    {vehiculos&&vehiculos.length===0&&!formAbierto&&<div style={{...est.card,textAlign:"center",color:"#6B7280"}}>
      Este cliente todavía no tiene vehículos registrados.
    </div>}
    {vehiculos&&vehiculos.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10}}>
      {vehiculos.map(veh=>{
        const poliza=polizasPorVehiculo[veh.id];
        const vig=poliza?vigenciaCalculada(poliza):null;
        return <div key={veh.id} style={est.card}>
          <div style={{fontWeight:700,fontSize:14}}>{veh.marca||"—"} {veh.modelo||""} {veh.anio||""}</div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>{veh.placas||"Sin placas"}{veh.estado?` · ${veh.estado}`:""}</div>
          <div style={{fontSize:12,color:"#374151",marginTop:6}}>
            {veh.tipo_vehiculo}{veh.tipo_vehiculo==="carga"&&veh.tipo_carga?` (tipo ${veh.tipo_carga})`:""}
          </div>
          {veh.fecha_verificacion&&<div style={{fontSize:12,color:"#374151",marginTop:2}}>Verificación: {fecha(veh.fecha_verificacion)}</div>}
          <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #f1f5f9"}}>
            {poliza
              ?<div>
                <span style={est.badge(colorEstatus[vig.label]||"#6b7280")}>{vig.label}</span>
                {vig.dias!=null&&<div style={{fontSize:12,color:vig.dias<0?"#dc2626":vig.dias<=15?"#F59E0B":"#8FA0B4",marginTop:4,fontWeight:600}}>{textoDias(vig.dias)}</div>}
              </div>
              :<div style={{fontSize:12,color:"#8FA0B4"}}>Sin póliza de auto vinculada</div>}
          </div>
          <div style={{display:"flex",gap:4,marginTop:10}}>
            <button onClick={()=>setEditando(veh)} style={est.linkBtn}>Editar</button>
            <button onClick={()=>eliminar(veh)} style={{...est.linkBtn,color:"#dc2626"}}>Eliminar</button>
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

function LigaMagica({cliente,onClienteCambiado}){
  const[copiado,setCopiado]=useState(false);
  const[regenerando,setRegenerando]=useState(false);
  const[reseteando,setReseteando]=useState(false);
  const[codigo,setCodigo]=useState(null);
  const[pidiendo,setPidiendo]=useState(false);
  const[error,setError]=useState("");
  const url=`${location.origin}/p/${cliente.token_publico}`;

  const verCodigo=async()=>{
    setPidiendo(true);setError("");
    const{data,error:err}=await sb.rpc("agente_codigo_activacion",{p_cliente_id:cliente.id});
    setPidiendo(false);
    if(err){setError(err.message);return;}
    setCodigo(data.codigo);
  };

  // "Olvidé mi NIP" del cliente: lo borramos y él crea uno nuevo la próxima vez que entre.
  // También se le caen los dispositivos recordados, por si el olvido fue por perder el teléfono.
  const resetearNip=async()=>{
    if(!window.confirm(`¿Restablecer el NIP de ${cliente.nombre.split(" ")[0]}? Va a crear uno nuevo la próxima vez que entre, y los dispositivos donde estaba recordado van a pedirlo otra vez.`))return;
    setReseteando(true);setError("");
    const{error:err}=await sb.rpc("agente_resetear_nip",{p_cliente_id:cliente.id});
    if(err){setReseteando(false);setError(err.message);return;}
    const{data}=await sb.from("clientes").select("*").eq("id",cliente.id).single();
    setReseteando(false);
    if(data)onClienteCambiado(data);
  };

  const copiar=async()=>{
    try{await navigator.clipboard.writeText(url);setCopiado(true);setTimeout(()=>setCopiado(false),2000);}
    catch(e){setError("No se pudo copiar. Selecciona el link a mano.");}
  };

  const regenerar=async()=>{
    if(!window.confirm("¿Regenerar la liga? La liga anterior deja de funcionar de inmediato."))return;
    setRegenerando(true);setError("");
    const{data,error}=await sb.from("clientes").update({token_publico:crypto.randomUUID()}).eq("id",cliente.id).select().single();
    setRegenerando(false);
    if(error){setError(error.message);return;}
    onClienteCambiado(data);
  };

  return <div style={{...est.card,marginBottom:24,background:"#F4F7FB"}}>
    <div style={{fontSize:13,fontWeight:700,color:"#8FA0B4",marginBottom:8}}>LIGA MÁGICA DEL CLIENTE</div>
    <div style={{fontSize:13,color:"#374151",marginBottom:10,lineHeight:1.5}}>
      Compártele esta liga a {cliente.nombre.split(" ")[0]} — ahí ve sus pólizas, PDFs y vehículos sin necesidad de registrarse.
    </div>
    <div style={{background:"#fff",border:"1px solid #DDE4EE",borderRadius:10,padding:"10px 12px",fontSize:13,wordBreak:"break-all",marginBottom:10}}>{url}</div>

    <div style={{fontSize:12.5,color:"#374151",marginBottom:10}}>
      {cliente.nip_definido_en
        ? <span>🔒 Protegida con el NIP que {cliente.nombre.split(" ")[0]} creó el {fecha(cliente.nip_definido_en.slice(0,10))}.</span>
        : cliente.correo
          ? <span style={{color:"#B45309"}}>Todavía sin NIP. Al abrir la liga le mandamos un código a {cliente.correo} para que cree el suyo.</span>
          : <span style={{color:"#B45309"}}>Todavía sin NIP. Como no tiene correo cargado, vas a tener que dictarle tú el código.</span>}
    </div>

    {/* Solo para los clientes sin correo: el código les llega por el agente. Si tiene correo,
        el código va directo a su bandeja y el agente no necesita —ni debe— andarlo viendo. */}
    {!cliente.nip_definido_en&&!cliente.correo&&<div style={{marginBottom:10}}>
      {codigo
        ? <div style={{background:"#fff",border:"1.5px solid #F59E0B",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#8FA0B4"}}>CÓDIGO PARA {cliente.nombre.split(" ")[0].toUpperCase()}</div>
            <div style={{fontSize:26,fontWeight:800,letterSpacing:6,color:"#10284A"}}>{codigo}</div>
            <div style={{fontSize:11.5,color:"#6B7280"}}>Dícteselo por teléfono. Vence en 24 horas y solo sirve una vez.</div>
          </div>
        : <button onClick={verCodigo} disabled={pidiendo} style={est.linkBtn}>{pidiendo?"Generando...":"Ver código de activación"}</button>}
    </div>}

    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
      <Boton color="#53647D" onClick={copiar}>{copiado?"¡Copiada!":"Copiar liga"}</Boton>
      {cliente.nip_definido_en&&<button onClick={resetearNip} disabled={reseteando} style={est.linkBtn}>{reseteando?"Restableciendo...":"Olvidó su NIP"}</button>}
      <button onClick={regenerar} disabled={regenerando} style={est.linkBtn}>{regenerando?"Regenerando...":"Regenerar liga"}</button>
    </div>
  </div>;
}

function ClienteDetalle({cliente,agenteId,onVolver,onClienteCambiado}){
  const[editando,setEditando]=useState(false);
  const[borrando,setBorrando]=useState(false);
  const[error,setError]=useState("");
  const[versionVehiculos,setVersionVehiculos]=useState(0);

  const eliminar=async()=>{
    if(!window.confirm(`¿Eliminar a ${cliente.nombre}? Esto también borra sus vehículos, pólizas y solicitudes registradas.`))return;
    setBorrando(true);
    const{data:polizas}=await sb.from("polizas").select("pdf_path").eq("cliente_id",cliente.id).not("pdf_path","is",null);
    if(polizas&&polizas.length>0){
      await sb.storage.from("polizas").remove(polizas.map(p=>p.pdf_path));
    }
    const{data:solicitudes}=await sb.from("solicitudes").select("foto_path").eq("cliente_id",cliente.id).not("foto_path","is",null);
    if(solicitudes&&solicitudes.length>0){
      await sb.storage.from("solicitudes").remove(solicitudes.map(s=>s.foto_path));
    }
    const{error}=await sb.from("clientes").delete().eq("id",cliente.id);
    setBorrando(false);
    if(error){setError(error.message);return;}
    onClienteCambiado(null);
  };

  return <div>
    <button onClick={onVolver} style={{...est.linkBtn,padding:0,marginBottom:16}}>‹ Todos mis clientes</button>

    {editando
      ?<ClienteForm agenteId={agenteId} clienteExistente={cliente}
          onGuardado={(actualizado)=>{setEditando(false);onClienteCambiado(actualizado);}}
          onCancelar={()=>setEditando(false)}/>
      :<div style={{...est.card,marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:18,fontWeight:700}}>{cliente.nombre}</div>
            <div style={{fontSize:13,color:"#8FA0B4",marginTop:2}}>{cliente.tipo_persona==="moral"?"Persona moral":"Persona física"}</div>
          </div>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>setEditando(true)} style={est.linkBtn}>Editar</button>
            <button onClick={eliminar} disabled={borrando} style={{...est.linkBtn,color:"#dc2626"}}>{borrando?"Borrando...":"Eliminar"}</button>
          </div>
        </div>
        <div style={{marginTop:14,fontSize:13,color:"#374151",lineHeight:1.8}}>
          {cliente.rfc&&<div>RFC: {cliente.rfc}</div>}
          {cliente.curp&&<div>CURP: {cliente.curp}</div>}
          {cliente.correo&&<div>Correo: {cliente.correo}</div>}
          {cliente.telefono&&<div>Teléfono: {cliente.telefono}</div>}
          {cliente.notas&&<div>Notas: {cliente.notas}</div>}
        </div>
        {error&&<div style={{color:"#dc2626",fontSize:13,marginTop:10}}>{error}</div>}
      </div>}

    <LigaMagica cliente={cliente} onClienteCambiado={onClienteCambiado}/>

    <VehiculosList key={versionVehiculos} clienteId={cliente.id}/>
    <PolizasList clienteId={cliente.id} agenteId={agenteId} onPolizaCambiada={()=>setVersionVehiculos(v=>v+1)}/>
  </div>;
}

function PolizaForm({clienteId,clientesDisponibles,agenteId,polizaExistente,onGuardado,onCancelar}){
  const p=polizaExistente;
  const ramoInicial=p&&!RAMOS_SUGERIDOS.includes(p.ramo)?"Otro":(p?p.ramo:"Auto");
  const[clienteSel,setClienteSel]=useState(clienteId||(p?p.cliente_id:"")||"");
  const[ramo,setRamo]=useState(ramoInicial);
  const[ramoOtro,setRamoOtro]=useState(ramoInicial==="Otro"?p.ramo:"");
  const[aseguradora,setAseguradora]=useState(p?p.aseguradora||"":"");
  const[numeroPoliza,setNumeroPoliza]=useState(p?p.numero_poliza||"":"");
  const[vehiculoId,setVehiculoId]=useState(p?p.vehiculo_id||"":"");
  const[vehiculos,setVehiculos]=useState(null);
  const[duracion,setDuracion]=useState(p?"custom":"1");

  useEffect(()=>{
    if(!clienteSel){setVehiculos([]);return;}
    sb.from("vehiculos").select("id,placas,marca,modelo").eq("cliente_id",clienteSel).order("created_at")
      .then(({data})=>setVehiculos(data||[]));
  },[clienteSel]);
  const[fechaInicio,setFechaInicio]=useState(p?p.fecha_inicio||"":"");
  const[fechaFin,setFechaFin]=useState(p?p.fecha_fin||"":"");

  useEffect(()=>{
    if(duracion==="custom"||!fechaInicio)return;
    setFechaFin(sumarAnios(fechaInicio,parseInt(duracion,10)));
  },[duracion,fechaInicio]);
  const[prima,setPrima]=useState(p&&p.prima!=null?String(p.prima):"");
  const[formaPago,setFormaPago]=useState(p?p.forma_pago||"anual":"anual");
  const[estatus,setEstatus]=useState(p?p.estatus:"vigente");
  const[notas,setNotas]=useState(p?p.notas||"":"");
  const[archivo,setArchivo]=useState(null);
  const[guardando,setGuardando]=useState(false);
  const[error,setError]=useState("");

  const guardar=async(e)=>{
    e.preventDefault();
    if(!clienteSel){setError("Selecciona a qué cliente pertenece esta póliza.");return;}
    const ramoFinal=ramo==="Otro"?(ramoOtro.trim()||"Otro"):ramo;
    setError("");setGuardando(true);
    const payload={
      aseguradora:aseguradora.trim()||null,
      numero_poliza:numeroPoliza.trim()||null,
      vehiculo_id:ramo==="Auto"?(vehiculoId||null):null,
      ramo:ramoFinal,
      fecha_inicio:fechaInicio||null,
      fecha_fin:fechaFin||null,
      prima:prima?parseFloat(prima):null,
      forma_pago:formaPago||null,
      estatus,
      notas:notas.trim()||null,
    };
    let resultado;
    if(p){
      resultado=await sb.from("polizas").update(payload).eq("id",p.id).select().single();
    }else{
      resultado=await sb.from("polizas").insert({...payload,cliente_id:clienteSel}).select().single();
    }
    if(resultado.error){setGuardando(false);setError(resultado.error.message);return;}
    let polizaFinal=resultado.data;

    if(archivo){
      const{data:usoActual}=await sb.rpc("mi_uso_almacenamiento");
      if((usoActual||0)+archivo.size>LIMITE_STORAGE_BYTES){
        setGuardando(false);
        setError(`La póliza se guardó, pero el PDF no cabe: ya usas ${formatBytes(usoActual||0)} de tu límite de 5 GB. Elimina PDFs viejos o contáctanos para más espacio.`);
        return;
      }
      const ruta=`${agenteId}/${polizaFinal.id}.pdf`;
      const{error:errSubida}=await sb.storage.from("polizas").upload(ruta,archivo,{upsert:true,contentType:"application/pdf"});
      if(errSubida){setGuardando(false);setError("La póliza se guardó pero el PDF no se pudo subir: "+errSubida.message);return;}
      // Se firma por 1 año: la liga mágica del cliente (sin login) usa este link directo,
      // no puede generar uno propio porque el storage está protegido por agente.
      const{data:firmado,error:errFirma}=await sb.storage.from("polizas").createSignedUrl(ruta,UN_ANIO_SEGUNDOS);
      if(errFirma){setGuardando(false);setError("El PDF se subió pero no se pudo generar el link: "+errFirma.message);return;}
      const{data:conPdf,error:errUpd}=await sb.from("polizas").update({pdf_path:ruta,pdf_url:firmado.signedUrl}).eq("id",polizaFinal.id).select().single();
      if(!errUpd)polizaFinal=conPdf;
    }
    setGuardando(false);
    onGuardado(polizaFinal);
  };

  return <form onSubmit={guardar} style={{...est.card,marginBottom:24}}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>{p?"Editar póliza":"Nueva póliza"}</div>

    {!clienteId&&<Campo label="Cliente">
      <select name="cliente_id" value={clienteSel} onChange={e=>setClienteSel(e.target.value)} style={est.input}>
        <option value="">— Selecciona un cliente —</option>
        {(clientesDisponibles||[]).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
      </select>
    </Campo>}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo label="Ramo">
        <select name="ramo" value={ramo} onChange={e=>setRamo(e.target.value)} style={est.input}>
          {RAMOS_SUGERIDOS.map(r=><option key={r} value={r}>{r}</option>)}
          <option value="Otro">Otro</option>
        </select>
      </Campo>
      {ramo==="Otro"&&<Campo label="¿Cuál ramo?">
        <input name="ramo_otro" value={ramoOtro} onChange={e=>setRamoOtro(e.target.value)} style={est.input}/>
      </Campo>}
    </div>

    {ramo==="Auto"&&clienteSel&&<Campo label="Vehículo asociado">
      <select name="vehiculo_id" value={vehiculoId} onChange={e=>setVehiculoId(e.target.value)} style={est.input}>
        <option value="">Sin vehículo asociado</option>
        {(vehiculos||[]).map(veh=><option key={veh.id} value={veh.id}>{veh.placas||"Sin placas"} — {veh.marca||""} {veh.modelo||""}</option>)}
      </select>
      {vehiculos&&vehiculos.length===0&&<div style={{fontSize:12,color:"#8FA0B4",marginTop:-6,marginBottom:10}}>Este cliente todavía no tiene vehículos registrados.</div>}
    </Campo>}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo label="Aseguradora">
        <input name="aseguradora" value={aseguradora} onChange={e=>setAseguradora(e.target.value)} style={est.input}/>
      </Campo>
      <Campo label="Número de póliza">

function PolizasList({clienteId,agenteId,onPolizaCambiada}){
  const[polizas,setPolizas]=useState(null);
  const[vehiculosPorId,setVehiculosPorId]=useState({});
  const[formAbierto,setFormAbierto]=useState(false);
  const[editando,setEditando]=useState(null);
  const[error,setError]=useState("");

  const cargar=async()=>{
    const{data,error}=await sb.from("polizas").select("*").eq("cliente_id",clienteId).order("fecha_fin",{ascending:false});
    if(error){setError(error.message);return;}
    setPolizas(data);
    const{data:vehiculos}=await sb.from("vehiculos").select("id,placas,marca,modelo").eq("cliente_id",clienteId);
    const mapa={};
    (vehiculos||[]).forEach(v=>mapa[v.id]=v);
    setVehiculosPorId(mapa);
  };
  useEffect(()=>{cargar()},[]);

  const eliminar=async(poliza)=>{
    if(!window.confirm(`¿Eliminar la póliza ${poliza.numero_poliza||""}?`.trim()))return;
    if(poliza.pdf_path)await sb.storage.from("polizas").remove([poliza.pdf_path]);
    const{error}=await sb.from("polizas").delete().eq("id",poliza.id);
    if(error){setError(error.message);return;}
    cargar();
    if(onPolizaCambiada)onPolizaCambiada();
  };

  const descargar=(poliza)=>{
    window.open(poliza.pdf_url,"_blank");
  };

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:700}}>Pólizas {polizas?`(${polizas.length})`:""}</div>
      {!formAbierto&&!editando&&<Boton color="#F59E0B" onClick={()=>setFormAbierto(true)}>+ Nueva póliza</Boton>}
    </div>

    {formAbierto&&<PolizaForm clienteId={clienteId} agenteId={agenteId}
      onGuardado={()=>{setFormAbierto(false);cargar();if(onPolizaCambiada)onPolizaCambiada();}}
      onCancelar={()=>setFormAbierto(false)}/>}

    {editando&&<PolizaForm clienteId={clienteId} agenteId={agenteId} polizaExistente={editando}
      onGuardado={()=>{setEditando(null);cargar();if(onPolizaCambiada)onPolizaCambiada();}}
      onCancelar={()=>setEditando(null)}/>}

    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    {!polizas&&<div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>}
    {polizas&&polizas.length===0&&!formAbierto&&<div style={{...est.card,textAlign:"center",color:"#6B7280"}}>
      Este cliente todavía no tiene pólizas registradas.
    </div>}
    {polizas&&polizas.map(p=>{
      const vig=vigenciaCalculada(p);
      const veh=p.vehiculo_id?vehiculosPorId[p.vehiculo_id]:null;
      return <div key={p.id} style={{...est.card,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{p.ramo} — {p.aseguradora||"Sin aseguradora"}</div>
          <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>Póliza {p.numero_poliza||"—"} · {fecha(p.fecha_inicio)} a {fecha(p.fecha_fin)}</div>
          {veh&&<div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>Vehículo: {veh.placas||"Sin placas"}{veh.marca?` — ${veh.marca} ${veh.modelo||""}`:""}</div>}
          {vig.dias!=null&&<div style={{fontSize:12,color:vig.dias<0?"#dc2626":vig.dias<=15?"#F59E0B":"#8FA0B4",marginTop:2,fontWeight:600}}>{textoDias(vig.dias)}</div>}
        </div>
        <span style={est.badge(colorEstatus[vig.label]||"#6b7280")}>{vig.label}</span>
      </div>
      <div style={{marginTop:10,fontSize:13,color:"#374151",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>{pesos(p.prima)} {p.forma_pago?`· ${p.forma_pago}`:""}</span>
        <div style={{display:"flex",gap:4}}>
          {p.pdf_url&&<button onClick={()=>descargar(p)} style={est.linkBtn}>Descargar PDF</button>}
          <button onClick={()=>setEditando(p)} style={est.linkBtn}>Editar</button>
          <button onClick={()=>eliminar(p)} style={{...est.linkBtn,color:"#dc2626"}}>Eliminar</button>
        </div>
      </div>
    </div>;
    })}
  </div>;
}

function DashboardAgente(){
  const[polizas,setPolizas]=useState(null);
  const[error,setError]=useState("");

  useEffect(()=>{
    sb.from("polizas").select("*,clientes(nombre)").order("created_at",{ascending:false})
      .then(({data,error})=>{if(error){setError(error.message);return;}setPolizas(data);});
  },[]);

  if(error)return <div style={{color:"#dc2626",fontSize:13}}>{error}</div>;
  if(!polizas)return <div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>;
  if(polizas.length===0)return <div style={{...est.card,textAlign:"center",color:"#6B7280"}}>Todavía no tienes pólizas registradas.</div>;

  let vigentes=0,porVencer=0,vencidas=0,renovadas=0,canceladas=0,primaVigente=0;
  polizas.forEach(p=>{
    const vig=vigenciaCalculada(p);
    if(vig.label==="renovada")renovadas++;
    else if(vig.label==="cancelada")canceladas++;
    else if(vig.label==="vencida")vencidas++;
    else{
      if(vig.dias!=null&&vig.dias<=15)porVencer++;else vigentes++;
      primaVigente+=Number(p.prima)||0;
    }
  });

  const porCampo=(campo)=>{
    const mapa={};
    polizas.forEach(p=>{const clave=p[campo]||"Sin dato";mapa[clave]=(mapa[clave]||0)+1;});
    const total=polizas.length;
    let filas=Object.entries(mapa).map(([etiqueta,valor])=>({etiqueta,valor,pct:Math.round(valor/total*100)}))
      .sort((a,b)=>b.valor-a.valor);
    if(filas.length>7){
      const top=filas.slice(0,6);
      const resto=filas.slice(6);
      const sumaResto=resto.reduce((s,f)=>s+f.valor,0);
      top.push({etiqueta:"Otras",valor:sumaResto,pct:Math.round(sumaResto/total*100)});
      filas=top;
    }
    return filas;
  };

  return <div>
    <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Resumen ({polizas.length} pólizas)</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:canceladas>0?6:24}}>
      <TarjetaKPI label="Prima total vigente" valor={pesos(primaVigente)} grande/>
      <TarjetaKPI label="Vigentes" valor={vigentes} color={colorEstatus.vigente}/>
      <TarjetaKPI label="Por vencer (≤15 días)" valor={porVencer} color="#F59E0B"/>
      <TarjetaKPI label="Vencidas" valor={vencidas} color={colorEstatus.vencida}/>
      <TarjetaKPI label="Renovadas" valor={renovadas} color={colorEstatus.renovada}/>
    </div>
    {canceladas>0&&<div style={{fontSize:12,color:"#8FA0B4",marginBottom:24}}>+ {canceladas} canceladas</div>}

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:16}}>
      <GraficaBarras titulo="PÓLIZAS POR ASEGURADORA" datos={porCampo("aseguradora")}/>
      <GraficaBarras titulo="PÓLIZAS POR RAMO" datos={porCampo("ramo")}/>
    </div>
  </div>;
}

function MedidorAlmacenamiento(){

// Para un agente que ya tenía cuenta antes de que existiera su promotoría, o que no metió el
// código al registrarse. Una vez afiliado no se puede cambiar solo — evita que un agente ande
// saltando de red para acomodarse en el mejor lugar de la fila de "primeros 5".
function AfiliarRed({agente,onAgenteCambiado}){
  const[codigo,setCodigo]=useState("");
  const[guardando,setGuardando]=useState(false);
  const[error,setError]=useState("");
  const[ok,setOk]=useState(false);

  if(agente.promotoria_id)return null; // ya afiliado, nada que mostrar aquí

  const afiliar=async(e)=>{
    e.preventDefault();
    setError("");
    if(!codigo.trim()){setError("Escribe el código que te dio tu promotoría.");return;}
    setGuardando(true);
    const{error:err}=await sb.rpc("agente_afiliar_promotoria",{p_codigo:codigo.trim()});
    setGuardando(false);
    if(err){setError(err.message);return;}
    setOk(true);
    const{data:fresco}=await sb.from("agentes").select("*").eq("id",agente.id).single();
    if(fresco)onAgenteCambiado(fresco);
  };

  return <form onSubmit={afiliar} style={{...est.card,maxWidth:420,marginTop:14}}>
    <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>¿Perteneces a una promotoría?</div>
    <div style={{fontSize:12.5,color:"#6B7280",lineHeight:1.5,marginBottom:12}}>
      Si tu promotoría te dio un código de invitación, ponlo aquí para unirte a su red — si eres de los primeros 5 agentes, tu acceso queda cubierto por su cuota, sin costo para ti.
    </div>
    <input name="codigo" value={codigo} onChange={e=>setCodigo(e.target.value.toUpperCase())}
      placeholder="Código de la promotoría" style={{...est.input,marginBottom:10}}/>
    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    {ok&&<div style={{color:"#16a34a",fontSize:13,marginBottom:10}}>¡Listo! Ya perteneces a esa red.</div>}
    <Boton type="submit" disabled={guardando}>{guardando?"Uniéndote...":"Unirme a la red"}</Boton>
  </form>;
}

// Alta/baja del TOTP. Ojo con el orden al desactivarlo: primero se quita el factor y luego se
// avisa, nunca al revés — si no, la pantalla diría "desactivado" con el factor todavía vivo y el
// agente se quedaría fuera en su siguiente entrada sin saber por qué.
function SegundoFactor(){
  const[factor,setFactor]=useState(undefined); // undefined=cargando, null=sin 2FA, {}=activo
  const[alta,setAlta]=useState(null);          // {id,qr,secret} mientras lo está dando de alta
  const[codigo,setCodigo]=useState("");
  const[respaldo,setRespaldo]=useState(null);  // códigos en claro, solo se ven una vez
  const[restantes,setRestantes]=useState(null);
  const[error,setError]=useState("");
  const[ocupado,setOcupado]=useState(false);

  const cargar=async()=>{
    const{data}=await sb.auth.mfa.listFactors();
    const t=(data&&data.totp&&data.totp[0])||null;
    setFactor(t);
    if(t){
      const{data:n}=await sb.rpc("codigos_respaldo_restantes");
      setRestantes(n);
    }
  };
  useEffect(()=>{cargar();},[]);

  const generarRespaldo=async()=>{
    setOcupado(true);setError("");
    const{data,error:err}=await sb.rpc("generar_codigos_respaldo");
    setOcupado(false);
    if(err){setError(err.message);return;}
    setRespaldo(data);
    setRestantes(data.length);
  };

  const empezar=async()=>{
    setError("");setOcupado(true);
    // Un intento anterior a medias deja un factor "unverified" que estorba al siguiente alta.
    const{data:previos}=await sb.auth.mfa.listFactors();
    const sinVerificar=((previos&&previos.all)||[]).filter(f=>f.status!=="verified");
    for(const f of sinVerificar){await sb.auth.mfa.unenroll({factorId:f.id});}

    const{data,error:err}=await sb.auth.mfa.enroll({factorType:"totp",friendlyName:"Upco InsurGest"});
    setOcupado(false);
    if(err){setError(err.message);return;}
    setAlta({id:data.id,qr:data.totp.qr_code,secret:data.totp.secret});
  };

  const confirmar=async(e)=>{
    e.preventDefault();setError("");
    if(!/^[0-9]{6}$/.test(codigo)){setError("Escribe los 6 dígitos que muestra tu app.");return;}
    setOcupado(true);
    const{error:err}=await sb.auth.mfa.challengeAndVerify({factorId:alta.id,code:codigo});
    setOcupado(false);
    if(err){setError("Ese código no es válido. Revisa que tu reloj esté en hora.");return;}
    // Se activa y ya. Los códigos de respaldo quedan como opción para quien los quiera: si un
    // agente pierde su teléfono, la salida real es que nos escriba y se lo restablecemos en un
    // clic. Obligarlo aquí a guardar ocho códigos solo espantaría a quien queremos que active esto.
    setAlta(null);setCodigo("");
    cargar();
  };

  const desactivar=async()=>{
    if(!window.confirm("¿Quitar la verificación en dos pasos? Tu cuenta va a quedar protegida solo con tu contraseña."))return;
    setOcupado(true);setError("");
    const{error:err}=await sb.auth.mfa.unenroll({factorId:factor.id});
    setOcupado(false);
    if(err){setError(err.message);return;}
    cargar();
  };

  if(factor===undefined)return null;

  return <div style={{...est.card,maxWidth:420,marginTop:14}}>
    <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>Verificación en dos pasos</div>

    {alta
      ? <form onSubmit={confirmar}>
          {/* Estas instrucciones son el producto: nadie va a poder asistir a cada agente por
              teléfono. Si un agente no puede seguir estos pasos solo, el 2FA no se activa. */}
          <ol style={{fontSize:12.5,color:"#374151",lineHeight:1.6,paddingLeft:18,margin:"0 0 14px"}}>
            <li style={{marginBottom:8}}>
              <strong>Instala una app de autenticación</strong> en tu celular, si no tienes una. Cualquiera de estas sirve y son gratis:{" "}
              <a href="https://play.google.com/store/apps/details?id=com.google.android.apps.authenticator2" target="_blank" rel="noopener" style={{color:"#10284A",fontWeight:700}}>Google Authenticator</a>{" "}
              (<a href="https://apps.apple.com/app/google-authenticator/id388497605" target="_blank" rel="noopener" style={{color:"#10284A",fontWeight:700}}>iPhone</a>),{" "}
              <a href="https://www.microsoft.com/security/mobile-authenticator-app" target="_blank" rel="noopener" style={{color:"#10284A",fontWeight:700}}>Microsoft Authenticator</a>.
            </li>
            <li style={{marginBottom:8}}><strong>Ábrela</strong> y busca el botón <strong>+</strong> → <strong>Escanear código QR</strong>.</li>
            <li style={{marginBottom:8}}><strong>Apunta la cámara</strong> al cuadro de abajo.</li>
            <li><strong>Escribe aquí</strong> los 6 dígitos que te muestre. Cambian cada 30 segundos: si se te va, espera al siguiente.</li>
          </ol>
          <img src={alta.qr} alt="Código QR" style={{width:180,height:180,display:"block",margin:"0 auto 10px"}}/>
          <div style={{fontSize:11,color:"#8FA0B4",textAlign:"center",marginBottom:12,wordBreak:"break-all"}}>
            ¿Estás en el celular y no puedes escanearte a ti mismo? En tu app elige <strong>“Escribir clave manualmente”</strong> y captura: <strong>{alta.secret}</strong>
          </div>
          <input value={codigo} onChange={e=>setCodigo(e.target.value.replace(/\D/g,"").slice(0,6))}
            type="tel" inputMode="numeric" placeholder="••••••" style={campoNipAgente} name="codigo_2fa"/>
          {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
          <Boton type="submit" disabled={ocupado}>{ocupado?"Verificando...":"Activar"}</Boton>
          <button type="button" onClick={()=>{setAlta(null);setError("");}} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer",marginTop:10,padding:0}}>Cancelar</button>
        </form>
      : respaldo
        ? <div>
            <div style={{fontSize:13,fontWeight:800,color:"#10284A",marginBottom:6}}>Tus códigos de respaldo</div>
            <div style={{fontSize:12.5,color:"#374151",lineHeight:1.5,marginBottom:12}}>
              Cada uno sirve una sola vez para entrar si te quedas sin tu teléfono. Guárdalos donde no sea el mismo celular donde está tu app de códigos.
              <br/><br/>No los vas a volver a ver — pero no te preocupes: si los pierdes, escríbenos y te reactivamos el acceso.
            </div>
            <div style={{background:"#F4F7FB",border:"1px solid #DDE4EE",borderRadius:10,padding:14,marginBottom:12,
              display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontFamily:"ui-monospace,Consolas,monospace",fontSize:14,fontWeight:700,color:"#10284A",textAlign:"center"}}>
              {respaldo.map(c=><div key={c}>{c}</div>)}
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <Boton color="#53647D" onClick={()=>navigator.clipboard.writeText(respaldo.join("\n"))}>Copiarlos</Boton>
              <Boton color="#53647D" onClick={()=>{
                // Descarga sin servidor: el archivo se arma en el navegador, los códigos no
                // viajan a ningún lado.
                const a=document.createElement("a");
                a.href=URL.createObjectURL(new Blob([`Códigos de respaldo — Upco InsurGest\n\nCada uno sirve una sola vez.\n\n${respaldo.join("\n")}\n`],{type:"text/plain"}));
                a.download="codigos-respaldo-upco-insurgest.txt";a.click();URL.revokeObjectURL(a.href);
              }}>Descargarlos</Boton>
            </div>
            <Boton onClick={()=>setRespaldo(null)}>Ya los guardé</Boton>
          </div>
      : factor
        ? <div>
            <div style={{fontSize:12.5,color:"#16a34a",fontWeight:700,marginBottom:6}}>✅ Activada</div>
            <div style={{fontSize:12.5,color:"#6B7280",lineHeight:1.5,marginBottom:12}}>
              Aunque alguien se robe tu contraseña, sin el código de tu app no entra — ni por aquí ni por ningún otro lado.
            </div>
            <div style={{background:"#F4F7FB",border:"1px solid #DDE4EE",borderRadius:10,padding:12,marginBottom:12}}>
              <div style={{fontSize:12.5,color:"#374151",lineHeight:1.5,marginBottom:8}}>
                <strong>¿Y si pierdo o cambio de teléfono?</strong> Escríbenos y te lo quitamos en un momento para que puedas entrar. No te quedas fuera de tu cartera.
                {restantes>0&&<><br/><br/>También tienes <strong>{restantes} códigos de respaldo</strong> guardados por si prefieres resolverlo tú sin esperarnos.</>}
              </div>
              <button onClick={generarRespaldo} disabled={ocupado} style={est.linkBtn}>
                {ocupado?"Generando...":restantes>0?"Generar códigos nuevos":"Generar códigos de respaldo (opcional)"}
              </button>
              {restantes>0&&<div style={{fontSize:11.5,color:"#8FA0B4",marginTop:4}}>Los que tengas anotados dejan de servir.</div>}
            </div>
            {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
            <button onClick={desactivar} disabled={ocupado} style={est.linkBtn}>Quitar verificación en dos pasos</button>
          </div>
        : <div>
            <div style={{fontSize:12.5,color:"#6B7280",lineHeight:1.5,marginBottom:12}}>
              Hoy, quien tenga tu contraseña tiene la cartera de todos tus clientes. Con la verificación en dos pasos, entrar necesita además un código que solo aparece en tu teléfono y cambia cada 30 segundos.
              <br/><br/>Toma dos minutos y necesitas tu celular a la mano.
            </div>
            {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
            <Boton color="#53647D" onClick={empezar} disabled={ocupado}>{ocupado?"Preparando...":"Activar"}</Boton>
          </div>}
  </div>;
}

function BloqueoDispositivo({agente}){
  const[lock,setLock]=useState(()=>leerLock(agente.id));
  const quitar=()=>{
    if(!window.confirm("¿Quitar el bloqueo de este dispositivo? Cualquiera que lo tome desbloqueado va a poder ver tu cartera."))return;
    borrarLock(agente.id);
    localStorage.setItem(`upco_ig_lock_no_${agente.id}`,"1");
    setLock(null);
  };
  const poner=()=>{
    localStorage.removeItem(`upco_ig_lock_no_${agente.id}`);
    location.reload(); // la pantalla de configurarlo vive en el arranque de la app
  };

  return <div style={{...est.card,maxWidth:420,marginTop:14}}>
    <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>Bloqueo de este dispositivo</div>
    <div style={{fontSize:12.5,color:"#6B7280",lineHeight:1.5,marginBottom:12}}>
      {lock
        ? `Tu panel se abre con NIP${lock.credId?" o con tu huella":""} en este equipo. Es un candado local: protege tu pantalla, no tu cuenta — para entrar desde otro lado siempre se necesita tu correo y contraseña.`
        : "Sin bloqueo. Quien tome este equipo desbloqueado puede ver la cartera de tus clientes."}
    </div>
    {lock
      ? <button onClick={quitar} style={est.linkBtn}>Quitar bloqueo</button>
      : <Boton color="#53647D" onClick={poner}>Activar bloqueo</Boton>}
  </div>;
}

// ============ MI TARJETA DIGITAL ============

// La tarjeta es pública y para prospectos — no confundir con la liga mágica del cliente,
// que es privada y muestra pólizas de alguien que ya es cliente.
function MiTarjeta({agente,onAgenteCambiado}){
  const[alias,setAlias]=useState(agente.alias_publico||"");
  const[activa,setActiva]=useState(!!agente.tarjeta_activa);
  const[titulo,setTitulo]=useState(agente.tarjeta_titulo||"");
  const[bio,setBio]=useState(agente.tarjeta_bio||"");
  const[ramos,setRamos]=useState(agente.tarjeta_ramos||[]);
  const[whatsapp,setWhatsapp]=useState(agente.tarjeta_whatsapp||"");
  const[correoPub,setCorreoPub]=useState(agente.tarjeta_correo_publico||"");
  // Las que están en el catálogo van por checkbox; las que no, en un campo aparte separadas
  // por coma. Al guardar se juntan en un solo arreglo.
  const guardadas=agente.tarjeta_aseguradoras||[];
  const[aseguradoras,setAseguradoras]=useState(guardadas.filter(a=>ASEGURADORAS_MX.includes(a)));
  const[otrasAseg,setOtrasAseg]=useState(guardadas.filter(a=>!ASEGURADORAS_MX.includes(a)).join(", "));
  const[foto,setFoto]=useState(null);
  const[guardando,setGuardando]=useState(false);
  const[guardado,setGuardado]=useState(false);
  const[error,setError]=useState("");
  const[copiado,setCopiado]=useState(false);

  const url=agente.alias_publico?`https://insurgest.upco.app/a/${agente.alias_publico}`:null;

  const toggleRamo=(r)=>setRamos(prev=>prev.includes(r)?prev.filter(x=>x!==r):[...prev,r]);
  const toggleAseg=(a)=>setAseguradoras(prev=>prev.includes(a)?prev.filter(x=>x!==a):[...prev,a]);

  const guardar=async(e)=>{
    e.preventDefault();
    setError("");setGuardado(false);setGuardando(true);

    let fotoPath=null,fotoUrl=null;
    if(foto){
      fotoPath=`${agente.id}/foto.jpg`;
      const{error:errSubida}=await sb.storage.from("tarjetas").upload(fotoPath,foto,{upsert:true,contentType:foto.type});
      if(errSubida){setGuardando(false);setError("No se pudo subir la foto: "+errSubida.message);return;}
      const{data:pub}=sb.storage.from("tarjetas").getPublicUrl(fotoPath);
      // el nombre del archivo no cambia al reemplazarlo, así que sin esto el navegador
      // seguiría mostrando la foto vieja
      fotoUrl=`${pub.publicUrl}?v=${Date.now()}`;
    }

    const listaAseg=[...aseguradoras,...otrasAseg.split(",").map(s=>s.trim()).filter(Boolean)];

    const{error:err}=await sb.rpc("agente_guardar_tarjeta",{
      p_alias:alias,p_activa:activa,p_titulo:titulo||null,p_bio:bio||null,
      p_ramos:ramos.length?ramos:null,p_whatsapp:whatsapp||null,
      p_correo_publico:correoPub||null,p_foto_path:fotoPath,p_foto_url:fotoUrl,
      p_aseguradoras:listaAseg.length?listaAseg:null
    });
    if(err){setGuardando(false);setError(err.message);return;}

    const{data:fresco}=await sb.from("agentes").select("*").eq("id",agente.id).single();
    setGuardando(false);setGuardado(true);setFoto(null);
    if(fresco)onAgenteCambiado(fresco);
    setTimeout(()=>setGuardado(false),2000);
  };

  const copiar=()=>{navigator.clipboard.writeText(url);setCopiado(true);setTimeout(()=>setCopiado(false),1500);};

  return <div>
    <form onSubmit={guardar} style={{...est.card,maxWidth:520,marginBottom:14}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Mi tarjeta digital</div>
      <div style={{fontSize:13,color:"#6B7280",marginBottom:16}}>Una página tuya para compartir con prospectos por WhatsApp o redes. No muestra datos de tus clientes.</div>

      {/* El nombre no se captura aquí sino en Mi perfil; si está vacío la tarjeta saluda a los
          prospectos con un genérico y el agente no tiene cómo darse cuenta desde esta pantalla. */}
      {!agente.nombre&&<div style={{background:"#FEF3C7",border:"1px solid #F59E0B",borderRadius:10,padding:12,fontSize:13,color:"#92400E",marginBottom:16}}>
        Tu perfil no tiene nombre, así que tu tarjeta va a decir “Agente de seguros” en vez del tuyo. Cárgalo en la pestaña <strong>Mi perfil</strong>.
      </div>}

      <Campo label="Dirección de tu tarjeta">
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:13,color:"#8FA0B4"}}>insurgest.upco.app/a/</span>
          <input name="alias" value={alias} onChange={e=>setAlias(e.target.value.toLowerCase().replace(/[^a-z0-9-]/g,""))}
            placeholder="tu-nombre" style={{...est.input,flex:1}}/>
        </div>
      </Campo>
      <div style={{fontSize:12,color:"#8FA0B4",marginTop:-8,marginBottom:14}}>Solo minúsculas, números y guiones. Elígela bien: es la que vas a dictar por teléfono.</div>

      <Campo label="Foto (opcional)">
        <input name="foto" type="file" accept="image/*" onChange={e=>setFoto(e.target.files[0]||null)} style={{fontSize:14}}/>
      </Campo>
      {agente.tarjeta_foto_url&&!foto&&<div style={{marginBottom:14}}>
        <img src={agente.tarjeta_foto_url} alt="Tu foto" style={{width:70,height:70,borderRadius:"50%",objectFit:"cover",border:"2px solid #DDE4EE"}}/>
      </div>}

      <Campo label="Título">
        <input name="titulo" value={titulo} onChange={e=>setTitulo(e.target.value)} placeholder="Agente de seguros certificado" style={est.input}/>
      </Campo>
      <Campo label="Presentación">
        <textarea name="bio" value={bio} onChange={e=>setBio(e.target.value)} rows={3}
          placeholder="Dos o tres líneas sobre ti y cómo ayudas a tus clientes." style={{...est.input,resize:"vertical",fontFamily:"inherit"}}/>
      </Campo>

      <Campo label="Qué manejo">
        <div style={{display:"flex",flexWrap:"wrap",gap:"8px 14px",marginTop:4}}>
          {RAMOS_SUGERIDOS.map(r=><label key={r} style={{display:"flex",alignItems:"center",gap:5,fontSize:14,cursor:"pointer"}}>
            <input type="checkbox" checked={ramos.includes(r)} onChange={()=>toggleRamo(r)}/>{r}
          </label>)}
        </div>
      </Campo>

      <Campo label="Aseguradoras con las que trabajo">
        <div style={{display:"flex",flexWrap:"wrap",gap:"8px 14px",marginTop:4,marginBottom:10}}>
          {ASEGURADORAS_MX.map(a=><label key={a} style={{display:"flex",alignItems:"center",gap:5,fontSize:14,cursor:"pointer"}}>
            <input type="checkbox" checked={aseguradoras.includes(a)} onChange={()=>toggleAseg(a)}/>{a}
          </label>)}
        </div>
        <input name="otras_aseguradoras" value={otrasAseg} onChange={e=>setOtrasAseg(e.target.value)}
          placeholder="Otras, separadas por coma" style={est.input}/>
      </Campo>

      <Campo label="WhatsApp (si es distinto a tu teléfono)">
        <input name="whatsapp" value={whatsapp} onChange={e=>setWhatsapp(e.target.value)} placeholder="5512345678" style={est.input}/>
      </Campo>
      {/* Sin esto, un número mal escrito solo hace que el botón de WhatsApp no aparezca en la
          tarjeta, sin que el agente se entere nunca de por qué. */}
      {whatsapp.replace(/\D/g,"").length>0&&whatsapp.replace(/\D/g,"").length!==10&&whatsapp.replace(/\D/g,"").length!==12&&
        <div style={{fontSize:12,color:"#dc2626",marginTop:-8,marginBottom:14}}>
          Ese número lleva {whatsapp.replace(/\D/g,"").length} dígitos. Un celular mexicano lleva 10 (o 12 con el 52 al inicio). Si lo dejas así, el botón de WhatsApp no va a aparecer en tu tarjeta.
        </div>}
      <Campo label="Correo público">
        <input name="correo_publico" type="email" value={correoPub} onChange={e=>setCorreoPub(e.target.value)} placeholder="tu@correo.com" style={est.input}/>
      </Campo>
      <div style={{fontSize:12,color:"#8FA0B4",marginTop:-8,marginBottom:14}}>
        Es el correo que verán tus prospectos en la tarjeta. Los avisos de prospectos nuevos te seguimos mandando a {agente.correo}.
      </div>

      <label style={{display:"flex",alignItems:"center",gap:8,fontSize:14,marginBottom:14,cursor:"pointer"}}>
        <input type="checkbox" checked={activa} onChange={e=>setActiva(e.target.checked)}/>
        Publicar mi tarjeta (si la apagas, deja de abrirse para todos)
      </label>

      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <Boton type="submit" disabled={guardando}>{guardando?"Guardando...":guardado?"¡Guardado!":"Guardar tarjeta"}</Boton>
    </form>

    {url&&agente.tarjeta_activa&&<div style={{...est.card,maxWidth:520,marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:"#8FA0B4",marginBottom:8}}>TU TARJETA ESTÁ PUBLICADA</div>
      <div style={{fontSize:14,wordBreak:"break-all",marginBottom:10,color:"#10284A"}}>{url}</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Boton onClick={copiar}>{copiado?"¡Copiada!":"Copiar liga"}</Boton>
        <a href={url} target="_blank" rel="noopener"><Boton color="#F59E0B">Verla</Boton></a>
      </div>
    </div>}

    <ServicioUpco/>
  </div>;
}

// Cross-sell del negocio de sitios web / correos del fundador. Solo levanta el interés;
// el trato se cierra por fuera.
function ServicioUpco(){
  const[abierto,setAbierto]=useState(false);
  const[servicio,setServicio]=useState("ambos");
  const[notas,setNotas]=useState("");
  const[enviando,setEnviando]=useState(false);
  const[enviado,setEnviado]=useState(false);
  const[error,setError]=useState("");

  const enviar=async(e)=>{
    e.preventDefault();
    setError("");setEnviando(true);
    const{error:err}=await sb.rpc("solicitar_servicio",{p_servicio:servicio,p_notas:notas||null});
    setEnviando(false);
    if(err){setError(err.message);return;}
    setEnviado(true);
  };

  return <div style={{...est.card,maxWidth:520,background:"#10284A",border:"none"}}>

    <div style={{fontSize:13,color:"#C7D3E3",lineHeight:1.5,marginBottom:14}}>
      En Upco también hacemos sitios web y correos con tu dominio (tunombre.com, hola@tunombre.com). Déjanos saber y te contactamos.
    </div>
    {enviado
      ? <div style={{fontSize:14,color:"#F59E0B",fontWeight:700}}>¡Listo! Te vamos a contactar pronto.</div>
      : abierto
        ? <form onSubmit={enviar}>
            <select value={servicio} onChange={e=>setServicio(e.target.value)} name="servicio"
              style={{...est.input,marginBottom:10}}>
              <option value="ambos">Sitio web y correo</option>
              <option value="sitio_web">Solo sitio web</option>
              <option value="correo">Solo correo con mi dominio</option>
            </select>
            <textarea value={notas} onChange={e=>setNotas(e.target.value)} rows={2} name="notas"
              placeholder="¿Ya tienes dominio? ¿Algo en mente?" style={{...est.input,marginBottom:10,resize:"vertical",fontFamily:"inherit"}}/>
            {error&&<div style={{color:"#FCA5A5",fontSize:13,marginBottom:10}}>{error}</div>}
            <Boton type="submit" disabled={enviando} color="#F59E0B">{enviando?"Enviando...":"Me interesa"}</Boton>
          </form>
        : <Boton onClick={()=>setAbierto(true)} color="#F59E0B">Quiero saber más</Boton>}
  </div>;
}
