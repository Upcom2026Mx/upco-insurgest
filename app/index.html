const PLANES_AGENTE=[
  {periodo:"mensual",label:"Mensual",monto:"$299 MXN/mes"},
  {periodo:"trimestral",label:"Trimestral",monto:"$865 MXN cada 3 meses"},
  {periodo:"semestral",label:"Semestral",monto:"$1,670 MXN cada 6 meses"},
  {periodo:"anual",label:"Anual",monto:"$2,990 MXN/año"}
];

function PantallaSuscripcion({cuenta,bloqueado,estadoRed}){
  const[cargando,setCargando]=useState(null);
  const[error,setError]=useState("");

  const suscribirse=async(periodo)=>{
    setError("");setCargando(periodo);
    const{data,error:errFn}=await sb.functions.invoke("create-checkout-session",{body:{tipo:"agente",periodo}});
    setCargando(null);
    if(errFn||!data?.url){
      let detalle=(data&&data.error)||"";
      // supabase-js guarda la respuesta HTTP real en errFn.context — de ahí sacamos el motivo.
      if(!detalle&&errFn&&errFn.context&&typeof errFn.context.json==="function"){
        try{const cuerpo=await errFn.context.json();detalle=cuerpo&&cuerpo.error;}catch(e){}
      }
      setError(detalle?`No se pudo iniciar el pago: ${detalle}`:"No se pudo iniciar el pago. Intenta de nuevo.");
      return;
    }
    window.location.href=data.url;
  };

  // Manda al Portal de Cliente de Stripe: ahí cancela, cambia tarjeta y baja sus facturas.
  const administrar=async()=>{
    setError("");setCargando("portal");
    const{data,error:errFn}=await sb.functions.invoke("create-portal-session",{body:{tipo:"agente"}});
    setCargando(null);
    if(errFn||!data?.url){
      let detalle=(data&&data.error)||"";
      if(!detalle&&errFn&&errFn.context&&typeof errFn.context.json==="function"){
        try{const cuerpo=await errFn.context.json();detalle=cuerpo&&cuerpo.error;}catch(e){}
      }
      setError(detalle?`No se pudo abrir tu suscripción: ${detalle}`:"No se pudo abrir tu suscripción. Intenta de nuevo.");
      return;
    }
    window.location.href=data.url;
  };

  const suscripcionActiva=cuenta.estatus_suscripcion==="active"||cuenta.estatus_suscripcion==="trialing";
  const accesoGratisPorRed=!suscripcionActiva&&estadoRed&&estadoRed.acceso_gratis;
  const enRedSinGratis=!suscripcionActiva&&!accesoGratisPorRed&&estadoRed&&estadoRed.en_red;
  const ahora=new Date();
  const finPrueba=cuenta.aprobado_en?new Date(new Date(cuenta.aprobado_en).getTime()+30*86400000):null;
  const accesoExtendido=cuenta.acceso_extendido_hasta?new Date(cuenta.acceso_extendido_hasta):null;
  const diasPrueba=finPrueba?Math.ceil((finPrueba-ahora)/86400000):null;
  const diasExtendido=accesoExtendido?Math.ceil((accesoExtendido-ahora)/86400000):null;

  const contenido=<div style={{width:"100%",maxWidth:520}}>
    {bloqueado&&<div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:8}}>Tu prueba gratuita terminó</div>
      <div style={{fontSize:14,color:"#374151"}}>Elige un plan para seguir usando tu panel.</div>
    </div>}
    {!bloqueado&&<div style={{marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Mi suscripción</div>
      {suscripcionActiva&&<div style={{fontSize:13,color:"#16a34a"}}>Plan activo: {cuenta.plan_periodo||"—"} · estatus {cuenta.estatus_suscripcion}</div>}
      {!suscripcionActiva&&diasExtendido>0&&<div style={{fontSize:13,color:"#F59E0B"}}>Acceso extendido — quedan {diasExtendido} días</div>}
      {!suscripcionActiva&&!(diasExtendido>0)&&diasPrueba!=null&&<div style={{fontSize:13,color:diasPrueba<=5?"#F59E0B":"#8FA0B4"}}>Prueba gratuita — quedan {Math.max(diasPrueba,0)} días</div>}
    </div>}

    {accesoGratisPorRed&&<div style={{...est.card,background:"#f0fdf4",border:"1px solid #86efac"}}>
      <div style={{fontSize:14,fontWeight:700,color:"#16a34a",marginBottom:6}}>✅ Tu acceso está cubierto</div>
      <div style={{fontSize:13,color:"#374151"}}>Eres parte de la red de <strong>{estadoRed.promotoria_nombre||"tu promotoría"}</strong> — no tienes que pagar nada por separado mientras ella tenga su suscripción vigente.</div>
    </div>}

    {enRedSinGratis&&<div style={{...est.card,background:"#FFFBEB",border:"1px solid #FDE68A"}}>
      <div style={{fontSize:14,fontWeight:700,color:"#B45309",marginBottom:6}}>Tarifa de red — $249/mes</div>
      <div style={{fontSize:13,color:"#374151",marginBottom:12}}>Eres parte de la red de <strong>{estadoRed.promotoria_nombre||"tu promotoría"}</strong>, pero ya se ocuparon los primeros 5 lugares incluidos. Te toca la tarifa de agente adicional: $249/mes en vez de $299 — la activamos manual, todavía no está automatizada.</div>
      <a href="mailto:hola@upco.app?subject=Activar%20mi%20tarifa%20de%20red%20(%24249%2Fmes)" style={{textDecoration:"none"}}>
        <Boton color="#F59E0B">Escribir para activarla</Boton>
      </a>
    </div>}

    {!suscripcionActiva&&!accesoGratisPorRed&&!enRedSinGratis&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
      {PLANES_AGENTE.map(p=><div key={p.periodo} style={est.card}>
        <div style={{fontSize:11,fontWeight:700,color:"#8FA0B4",marginBottom:4}}>{p.label.toUpperCase()}</div>
        <div style={{fontSize:14,fontWeight:700,color:"#10284A",marginBottom:12}}>{p.monto}</div>
        <Boton onClick={()=>suscribirse(p.periodo)} disabled={cargando!==null}>{cargando===p.periodo?"Redirigiendo...":"Elegir"}</Boton>
      </div>)}
    </div>}

    {suscripcionActiva&&<div style={est.card}>
      <div style={{fontSize:13,color:"#374151",marginBottom:12}}>Desde Stripe puedes cambiar tu tarjeta, descargar tus facturas o cancelar tu suscripción.</div>
      <Boton onClick={administrar} disabled={cargando!==null}>{cargando==="portal"?"Abriendo...":"Administrar mi suscripción"}</Boton>
    </div>}

    {error&&<div style={{color:"#dc2626",fontSize:13,marginTop:14,textAlign:"center"}}>{error}</div>}
    {!suscripcionActiva&&!accesoGratisPorRed&&!enRedSinGratis&&<div style={{fontSize:11,color:"#8FA0B4",marginTop:14,textAlign:"center"}}>Precios +IVA. Se cobra por Stripe, cancela cuando quieras.</div>}
  </div>;

  if(!bloqueado)return contenido;
  return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>{contenido}</div>;
}

// ============ AVISOS A CLIENTES ============

function AvisosAgente({agenteId}){
  const[clientes,setClientes]=useState(null);
  const[seleccion,setSeleccion]=useState({});
  const[asunto,setAsunto]=useState("");
  const[mensaje,setMensaje]=useState("");
  const[viaCorreo,setViaCorreo]=useState(true);
  const[viaPush,setViaPush]=useState(true);
  const[enviando,setEnviando]=useState(false);
  const[resultado,setResultado]=useState(null);
  const[error,setError]=useState("");
  const[pushActivo,setPushActivo]=useState(false);
  const[activandoPush,setActivandoPush]=useState(false);

  useEffect(()=>{
    sb.from("clientes").select("id,nombre,correo").eq("agente_id",agenteId).order("nombre")
      .then(({data,error})=>{if(error){setError(error.message);return;}setClientes(data||[]);});
  },[agenteId]);

  const toggleCliente=(id)=>setSeleccion(prev=>({...prev,[id]:!prev[id]}));
  const seleccionarTodos=()=>{
    const todos={};
    (clientes||[]).forEach(c=>{if(c.correo)todos[c.id]=true;});
    setSeleccion(todos);
  };

  const activarMisPush=async()=>{
    setActivandoPush(true);
    const r=await suscribirPushAgente();
    setActivandoPush(false);
    setPushActivo(r==="ok");
  };

  const enviar=async(e)=>{
    e.preventDefault();
    const ids=Object.keys(seleccion).filter(id=>seleccion[id]);
    if(ids.length===0){setError("Selecciona al menos un cliente.");return;}
    if(!asunto.trim()||!mensaje.trim()){setError("Escribe un asunto y un mensaje.");return;}
    setError("");setEnviando(true);setResultado(null);
    const{data,error:errRpc}=await sb.rpc("agente_notificar_clientes",{
      p_cliente_ids:ids,p_asunto:asunto.trim(),p_mensaje:mensaje.trim(),p_via_correo:viaCorreo,p_via_push:viaPush
    });
    setEnviando(false);
    if(errRpc){setError(errRpc.message);return;}
    setResultado(data);setAsunto("");setMensaje("");setSeleccion({});
  };

  if(!clientes)return <div style={{color:"#6B7280",fontSize:14}}>Cargando...</div>;
  const seleccionados=Object.values(seleccion).filter(Boolean).length;

  return <div>
    <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Avisos a tus clientes</div>
    <div style={{fontSize:13,color:"#8FA0B4",marginBottom:16}}>Manda un correo y/o notificación push a los clientes que elijas.</div>

    <button type="button" onClick={activarMisPush} disabled={pushActivo||activandoPush} style={{background:pushActivo?"#EAF7EF":"#FEF3E2",border:"none",borderRadius:20,padding:"7px 14px",fontSize:12.5,fontWeight:700,color:pushActivo?"#16a34a":"#B45309",cursor:pushActivo?"default":"pointer",marginBottom:16}}>
      {pushActivo?"✓ Recibirás avisos push":activandoPush?"Activando...":"🔔 Activar mis notificaciones push"}
    </button>

    <form onSubmit={enviar} style={est.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <label style={est.label}>Destinatarios ({seleccionados} seleccionados)</label>
        <div style={{display:"flex",gap:10}}>
          <button type="button" onClick={seleccionarTodos} style={est.linkBtn}>Todos</button>
          <button type="button" onClick={()=>setSeleccion({})} style={est.linkBtn}>Ninguno</button>
        </div>
      </div>
      <div style={{maxHeight:200,overflowY:"auto",border:"1px solid #DDE4EE",borderRadius:10,padding:"6px 12px",marginBottom:14}}>
        {clientes.length===0&&<div style={{fontSize:13,color:"#8FA0B4",padding:"8px 0"}}>Todavía no tienes clientes registrados.</div>}
        {clientes.map(c=><label key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",fontSize:13,color:c.correo?"#374151":"#C4CDD9",cursor:c.correo?"pointer":"not-allowed"}}>
          <input type="checkbox" checked={!!seleccion[c.id]} disabled={!c.correo} onChange={()=>toggleCliente(c.id)}/>
          {c.nombre}{!c.correo&&" (sin correo)"}
        </label>)}
      </div>

      <input value={asunto} onChange={e=>setAsunto(e.target.value)} placeholder="Asunto" style={est.input}/>
      <textarea value={mensaje} onChange={e=>setMensaje(e.target.value)} placeholder="Mensaje" rows={4} style={est.input}/>

      <div style={{display:"flex",gap:16,marginBottom:14}}>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#374151",cursor:"pointer"}}>
          <input type="checkbox" checked={viaCorreo} onChange={e=>setViaCorreo(e.target.checked)}/> Por correo
        </label>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#374151",cursor:"pointer"}}>
          <input type="checkbox" checked={viaPush} onChange={e=>setViaPush(e.target.checked)}/> Por notificación push
        </label>
      </div>

      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      {resultado&&<div style={{color:"#16a34a",fontSize:13,marginBottom:10}}>Enviado: {resultado.correos_enviados} correos, {resultado.push_disparados} avisos push.</div>}
      <Boton type="submit" disabled={enviando||(!viaCorreo&&!viaPush)}>{enviando?"Enviando...":"Enviar aviso"}</Boton>
    </form>
  </div>;
}

// ============ PANEL / APP ============

function Panel({session,onSalir}){
  const[agente,setAgente]=useState(null);
  const[estadoRed,setEstadoRed]=useState(null);
  const[clienteActivo,setClienteActivo]=useState(null);
  const[vista,setVista]=useState("clientes"); // clientes | solicitudes | resumen | perfil
  const[pendientes,setPendientes]=useState(0);
  const[error,setError]=useState("");

  const cargarEstadoRed=()=>{sb.rpc("agente_estado_red").then(({data})=>setEstadoRed(data||null));};

  // Cualquier cambio al agente (afiliarse a una red, actualizar su tarjeta, su perfil...) puede
  // afectar su posición en la red, así que recarga los dos juntos en vez de dejar estadoRed viejo.
  const actualizarAgente=(nuevo)=>{setAgente(nuevo);cargarEstadoRed();};

  useEffect(()=>{
    (async()=>{
      const{data,error:errSel}=await sb.from("agentes").select("*").eq("id",session.user.id).maybeSingle();
      if(errSel){setError(errSel.message);return;}
      if(data){setAgente(data);return;}
      const meta=session.user.user_metadata||{};
      let promotoriaId=null;
      if(meta.codigo_promotoria){
        const{data:idResuelto}=await sb.rpc("resolver_codigo_promotoria",{p_codigo:meta.codigo_promotoria});
        promotoriaId=idResuelto||null;
      }
      const{data:nuevo,error:errIns}=await sb.from("agentes")
        .insert({
          id:session.user.id,correo:session.user.email,
          nombre:meta.nombre||null,nombre_negocio:meta.nombre_negocio||null,telefono:meta.telefono||null,
          rfc:meta.rfc||null,tiene_cedula:meta.tiene_cedula||false,tipos_cedula:meta.tipos_cedula||null,numero_cedula:meta.numero_cedula||null,
          acepto_terminos:meta.acepto_terminos||false,acepto_terminos_version:meta.acepto_terminos_version||null,acepto_terminos_fecha:meta.acepto_terminos_fecha||null,
          promotoria_id:promotoriaId
        })
        .select().single();
      if(errIns){
        if(errIns.code==="23505"){
          // ya se creó (carrera entre eventos de sesión) — solo lo volvemos a leer
          const{data:existente,error:errSel2}=await sb.from("agentes").select("*").eq("id",session.user.id).maybeSingle();
          if(errSel2){setError(errSel2.message);return;}
          if(existente){setAgente(existente);return;}
        }
        setError(errIns.message);return;
      }
      setAgente(nuevo);
    })();
  },[]);

  useEffect(()=>{
    if(agente)cargarEstadoRed();
  },[agente&&agente.id]);

  useEffect(()=>{
    if(!agente)return;
    sb.from("solicitudes").select("id",{count:"exact",head:true}).eq("estatus","nueva")
      .then(({count})=>setPendientes(count||0));
  },[agente,vista]);

  if(error)return <div style={{padding:40,textAlign:"center",color:"#dc2626"}}>Ocurrió un error: {error}</div>;
  if(!agente)return <div style={{padding:40,textAlign:"center",color:"#6B7280"}}>Cargando tu panel...</div>;

  if(agente.estatus_aprobacion==="pendiente")return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:420,boxShadow:"0 8px 30px rgba(0,0,0,.08)",textAlign:"center"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:12,color:"#10284A"}}>Cuenta pendiente de aprobación</div>
      <div style={{fontSize:14,color:"#374151",lineHeight:1.6,marginBottom:16}}>Te avisaremos por correo en cuanto puedas empezar a usar tu panel — arrancas con 30 días de prueba gratis.</div>
      <div style={{fontSize:13,color:"#8FA0B4",marginBottom:16}}><a href="../precios/" style={{color:"#8FA0B4"}}>Ver precios para después de la prueba</a></div>
      <button onClick={onSalir} style={est.linkBtn}>Salir</button>
    </div>
  </div>;

  if(agente.estatus_aprobacion==="rechazado")return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:420,boxShadow:"0 8px 30px rgba(0,0,0,.08)",textAlign:"center"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:12,color:"#10284A"}}>Solicitud no aprobada</div>
      <div style={{fontSize:14,color:"#374151",lineHeight:1.6,marginBottom:20}}>Tu solicitud de registro no fue aprobada. Si crees que es un error, contáctanos.</div>
      <button onClick={onSalir} style={est.linkBtn}>Salir</button>
    </div>
  </div>;

  if(!accesoVigente(agente,estadoRed&&estadoRed.acceso_gratis))return <div>
    <div style={{maxWidth:760,margin:"0 auto",padding:"16px 16px 0",display:"flex",justifyContent:"flex-end"}}>
      <button onClick={onSalir} style={{background:"none",border:"none",color:"#6B7280",fontSize:14,cursor:"pointer"}}>Salir ({agente.correo})</button>
    </div>
    <PantallaSuscripcion cuenta={agente} bloqueado={true} estadoRed={estadoRed}/>
  </div>;

  return <div style={{maxWidth:760,margin:"0 auto",padding:"24px 16px 60px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div style={{fontSize:16,fontWeight:700,color:"#10284A"}}>Hola, {agente.nombre||agente.correo}</div>
      <button onClick={onSalir} style={{background:"none",border:"none",color:"#6B7280",fontSize:14,cursor:"pointer"}}>Salir ({agente.correo})</button>
    </div>

    {!clienteActivo&&<div style={{display:"flex",gap:16,marginBottom:24,borderBottom:"1px solid #DDE4EE",flexWrap:"wrap"}}>
      <button onClick={()=>setVista("clientes")} style={tabStyle(vista==="clientes")}>Mis clientes</button>
      <button onClick={()=>setVista("solicitudes")} style={tabStyle(vista==="solicitudes")}>Solicitudes{pendientes>0?` (${pendientes})`:""}</button>
      <button onClick={()=>setVista("avisos")} style={tabStyle(vista==="avisos")}>Avisos</button>
      <button onClick={()=>setVista("tarjeta")} style={tabStyle(vista==="tarjeta")}>Mi tarjeta</button>
      <button onClick={()=>setVista("resumen")} style={tabStyle(vista==="resumen")}>Resumen</button>
      <button onClick={()=>setVista("suscripcion")} style={tabStyle(vista==="suscripcion")}>Suscripción</button>
      <button onClick={()=>setVista("perfil")} style={tabStyle(vista==="perfil")}>Mi perfil</button>
    </div>}

    {clienteActivo
      ?<ClienteDetalle cliente={clienteActivo} agenteId={agente.id}
          onVolver={()=>setClienteActivo(null)}
          onClienteCambiado={(actualizado)=>setClienteActivo(actualizado)}/>
      :vista==="solicitudes"
        ?<SolicitudesInbox onAbrirCliente={(c)=>{setClienteActivo(c);setVista("clientes");}}/>
        :vista==="avisos"
          ?<AvisosAgente agenteId={agente.id}/>
          :vista==="tarjeta"
            ?<MiTarjeta agente={agente} onAgenteCambiado={actualizarAgente}/>
          :vista==="resumen"
            ?<DashboardAgente/>
            :vista==="suscripcion"
              ?<PantallaSuscripcion cuenta={agente} bloqueado={false} estadoRed={estadoRed}/>
              :vista==="perfil"
                ?<MiPerfil agente={agente} onAgenteCambiado={actualizarAgente}/>
                :<ClientesList agenteId={agente.id} onAbrirCliente={setClienteActivo}/>}
  </div>;
}

// ============ BLOQUEO DEL DISPOSITIVO ============
// Alcance honesto: esto NO protege tu cuenta — quien tenga tu correo y contraseña entra desde
// cualquier otro dispositivo sin ver este NIP. Lo que protege es tu pantalla: que quien agarre
// tu celular o tu laptop desbloqueada no se ponga a leer la cartera de tus clientes. Es el mismo
// candado de Homey. Si lo olvidas, cierras sesión y vuelves a entrar: se borra y lo reconfiguras.

function CajaBloqueo({children}){
  return <div style={{minHeight:`calc(100vh - ${ALTO_HEADER}px)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#fff",borderRadius:16,padding:26,width:"100%",maxWidth:380,boxShadow:"0 8px 30px rgba(0,0,0,.08)"}}>{children}</div>
  </div>;
}

const campoNipAgente={width:"100%",padding:"14px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:26,
  letterSpacing:"12px",textAlign:"center",fontFamily:"inherit",marginBottom:10};

function ConfigurarBloqueo({session,onListo,onOmitir}){
  const[nip,setNip]=useState("");
  const[nip2,setNip2]=useState("");
  const[credId,setCredId]=useState(null);
  const[bioDisp,setBioDisp]=useState(false);
  const[error,setError]=useState("");

  useEffect(()=>{biometriaDisponible().then(setBioDisp);},[]);

  const activarBio=async()=>{
    setError("");
    try{setCredId(await registrarBiometria(session.user.id,session.user.email));}
    catch(e){setError("No se pudo activar la huella. Puedes usar solo el NIP.");}
  };

  const guardar=async(e)=>{
    e.preventDefault();setError("");
    if(!/^[0-9]{6}$/.test(nip)){setError("El NIP debe ser de 6 dígitos.");return;}
    if(nip!==nip2){setError("Los dos NIP no coinciden.");return;}
    guardarLock(session.user.id,{nipHash:await hashNip(nip),credId:credId||null});
    onListo();
  };

  return <CajaBloqueo>
    <form onSubmit={guardar}>
      <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:6}}>Protege tu panel</div>
      <div style={{fontSize:13.5,color:"#374151",lineHeight:1.5,marginBottom:16}}>
        Pon un NIP de 6 dígitos para que nadie que agarre este dispositivo pueda ver la cartera de tus clientes. Solo aplica aquí, en este equipo.
      </div>
      <input value={nip} onChange={e=>setNip(e.target.value.replace(/\D/g,"").slice(0,6))} type="tel" inputMode="numeric" placeholder="••••••" style={campoNipAgente} name="nip"/>
      <input value={nip2} onChange={e=>setNip2(e.target.value.replace(/\D/g,"").slice(0,6))} type="tel" inputMode="numeric" placeholder="Repítelo" style={campoNipAgente} name="nip2"/>
      {bioDisp&&<button type="button" onClick={activarBio}
        style={{width:"100%",background:credId?"#f0fdf4":"#F4F7FB",border:`1.5px solid ${credId?"#86efac":"#DDE4EE"}`,borderRadius:10,padding:13,fontSize:14,fontWeight:700,color:credId?"#16a34a":"#10284A",cursor:"pointer",marginBottom:12}}>
        {credId?"✅ Huella o rostro activado":"👆 Activar huella o rostro (opcional)"}
      </button>}
      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <Boton type="submit">Activar bloqueo</Boton>
      <button type="button" onClick={onOmitir} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer",marginTop:12,padding:0}}>Ahora no</button>
    </form>
  </CajaBloqueo>;
}

function PedirBloqueo({session,lock,onOk,onSalir}){
  const[nip,setNip]=useState("");
  const[error,setError]=useState("");
  const[intentando,setIntentando]=useState(false);

  const probarBio=async()=>{
    setError("");setIntentando(true);
    try{await verificarBiometria(lock.credId);onOk();}
    catch(e){setError("No se pudo leer tu huella. Escribe tu NIP.");}
    setIntentando(false);
  };

  const probarNip=async(e)=>{
    e.preventDefault();setError("");
    if(await hashNip(nip)===lock.nipHash)onOk();
    else setError("NIP incorrecto.");
  };

  return <CajaBloqueo>
    <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:16}}>Desbloquea tu panel</div>
    {lock.credId&&<button onClick={probarBio} disabled={intentando}
      style={{width:"100%",background:"#10284A",color:"#fff",border:"none",borderRadius:10,padding:14,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:14}}>
      {intentando?"Verificando...":"👆 Entrar con huella o rostro"}
    </button>}
    <form onSubmit={probarNip}>
      <input value={nip} onChange={e=>setNip(e.target.value.replace(/\D/g,"").slice(0,6))} type="tel" inputMode="numeric" placeholder="••••••" style={campoNipAgente} name="nip" autoFocus={!lock.credId}/>
      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <Boton type="submit">Entrar</Boton>
    </form>
    {/* La salida cuando olvidas el NIP: cerrar sesión borra el candado local y lo reconfiguras
        al volver a entrar con tu correo y contraseña, que es lo que de verdad te identifica. */}
    <button onClick={()=>{borrarLock(session.user.id);onSalir();}}
      style={{background:"none",border:"none",color:"#53647D",fontSize:12.5,cursor:"pointer",marginTop:14,padding:0}}>
      Olvidé mi NIP — cerrar sesión
    </button>
  </CajaBloqueo>;
}

// ============ SEGUNDO FACTOR (TOTP) ============
// A diferencia del bloqueo de arriba, esto SÍ protege la cuenta: la base rechaza cualquier
// sesión que no haya pasado el código, aunque alguien la use por fuera de esta app.

function PedirSegundoFactor({onOk,onSalir}){
  const[codigo,setCodigo]=useState("");
  const[respaldo,setRespaldo]=useState("");
  const[modo,setModo]=useState("totp"); // totp | respaldo
  const[error,setError]=useState("");
  const[verificando,setVerificando]=useState(false);

  const verificar=async(e)=>{
    e.preventDefault();setError("");
    if(!/^[0-9]{6}$/.test(codigo)){setError("Escribe los 6 dígitos de tu app.");return;}
    setVerificando(true);
    const{data:f}=await sb.auth.mfa.listFactors();
    const factor=(f&&f.totp&&f.totp[0])||null;
    if(!factor){setVerificando(false);setError("No encontramos tu método de verificación.");return;}
    const{error:err}=await sb.auth.mfa.challengeAndVerify({factorId:factor.id,code:codigo});
    setVerificando(false);
    if(err){setError("Ese código no es válido. Revisa que tu reloj esté en hora e inténtalo otra vez.");return;}
    onOk();
  };

  // El código de respaldo APAGA el segundo factor — no "entra con él". La marca de aal2 solo la
  // emite Supabase al verificar un TOTP real, así que esto es lo único honesto que puede hacer.
  const usarRespaldo=async(e)=>{
    e.preventDefault();setError("");
    if(respaldo.trim().length<8){setError("Escribe uno de tus códigos de respaldo completo.");return;}
    setVerificando(true);
    const{error:err}=await sb.rpc("usar_codigo_respaldo",{p_codigo:respaldo});
    setVerificando(false);
    if(err){setError(err.message);return;}
    alert("Listo. Te desactivamos la verificación en dos pasos para que puedas entrar. Vuelve a activarla desde Mi perfil con tu teléfono nuevo.");
    location.reload();
  };

  if(modo==="respaldo")return <CajaBloqueo>
    <form onSubmit={usarRespaldo}>
      <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:6}}>¿Perdiste tu teléfono?</div>
      <div style={{fontSize:13.5,color:"#374151",lineHeight:1.5,marginBottom:16}}>
        Escribe uno de los códigos de respaldo que guardaste cuando activaste la verificación. Vamos a <strong>desactivarte la verificación en dos pasos</strong> para que puedas entrar, y la vuelves a activar con tu teléfono nuevo.
      </div>
      <input value={respaldo} onChange={e=>setRespaldo(e.target.value.toUpperCase())}
        placeholder="XXXXX-XXXXX" name="respaldo" autoFocus
        style={{width:"100%",padding:"14px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:18,letterSpacing:2,textAlign:"center",fontFamily:"ui-monospace,Consolas,monospace",marginBottom:10}}/>
      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <Boton type="submit" disabled={verificando}>{verificando?"Verificando...":"Usar este código"}</Boton>
    </form>
    <button onClick={()=>{setModo("totp");setError("");}} style={{background:"none",border:"none",color:"#53647D",fontSize:12.5,cursor:"pointer",marginTop:14,padding:0}}>
      Sí tengo mi teléfono
    </button>
  </CajaBloqueo>;

  return <CajaBloqueo>
    <form onSubmit={verificar}>
      <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:6}}>Verificación en dos pasos</div>
      <div style={{fontSize:13.5,color:"#374151",lineHeight:1.5,marginBottom:16}}>
        Abre tu app de autenticación y escribe el código de 6 dígitos.
      </div>
      <input value={codigo} onChange={e=>setCodigo(e.target.value.replace(/\D/g,"").slice(0,6))}
        type="tel" inputMode="numeric" placeholder="••••••" style={campoNipAgente} name="codigo" autoFocus/>
      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <Boton type="submit" disabled={verificando}>{verificando?"Verificando...":"Entrar"}</Boton>
    </form>
    {/* La salida que de verdad va a usar la gente es escribirle al fundador, que lo resuelve con
        un clic desde /admin. El código de respaldo es para quien lo guardó, que serán pocos. */}
    <div style={{fontSize:12.5,color:"#374151",lineHeight:1.5,marginTop:16,paddingTop:14,borderTop:"1px solid #DDE4EE"}}>
      <strong>¿Perdiste o cambiaste de teléfono?</strong> Escríbenos a <a href="mailto:hola@upco.app?subject=Perdí mi teléfono — verificación en dos pasos" style={{color:"#10284A",fontWeight:700}}>hola@upco.app</a> y te lo quitamos para que puedas entrar.
      <div style={{marginTop:8}}>
        <button onClick={()=>{setModo("respaldo");setError("");}} style={{background:"none",border:"none",color:"#53647D",fontSize:12.5,cursor:"pointer",padding:0,textDecoration:"underline"}}>
          Tengo un código de respaldo
        </button>
      </div>
    </div>
    <div><button onClick={onSalir} style={{background:"none",border:"none",color:"#53647D",fontSize:12.5,cursor:"pointer",marginTop:14,padding:0}}>
      Cerrar sesión
    </button></div>
  </CajaBloqueo>;
}

function App(){
  const[sesion,setSesion]=useState(undefined); // undefined=cargando, null=sin sesión
  const[mfa,setMfa]=useState("revisando");     // revisando | pedir | ok
  const[bloqueo,setBloqueo]=useState("revisando"); // revisando | ofrecer | pedir | abierto
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSesion(data.session||null));
    const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSesion(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  // Se pregunta a Supabase, no a la pantalla: nextLevel dice si esta cuenta tiene 2FA activado.
  const revisarMfa=()=>{
    sb.auth.mfa.getAuthenticatorAssuranceLevel().then(({data})=>{
      if(data&&data.nextLevel==="aal2"&&data.currentLevel!=="aal2")setMfa("pedir");
      else setMfa("ok");
    }).catch(()=>setMfa("ok"));
  };

  useEffect(()=>{
    if(!sesion){setMfa("revisando");setBloqueo("revisando");return;}
    revisarMfa();
    const lock=leerLock(sesion.user.id);
    if(lock&&lock.nipHash)setBloqueo("pedir");
    else if(localStorage.getItem(`upco_ig_lock_no_${sesion.user.id}`))setBloqueo("abierto");
    else setBloqueo("ofrecer");
  },[sesion]);

  const salir=()=>sb.auth.signOut();
  const cargando=<div style={{padding:40,textAlign:"center",color:"#6B7280"}}>Cargando...</div>;

  return <>
    <HeaderBar/>
    {sesion===undefined
      ?cargando
      :!sesion
        ?<Login/>
        // El segundo factor va primero: es el que de verdad autentica. El NIP local viene después.
        :mfa==="revisando"
          ?cargando
          :mfa==="pedir"
            ?<PedirSegundoFactor onOk={()=>setMfa("ok")} onSalir={salir}/>
            :bloqueo==="ofrecer"
              ?<ConfigurarBloqueo session={sesion} onListo={()=>setBloqueo("abierto")}
                  onOmitir={()=>{localStorage.setItem(`upco_ig_lock_no_${sesion.user.id}`,"1");setBloqueo("abierto");}}/>
              :bloqueo==="pedir"
                ?<PedirBloqueo session={sesion} lock={leerLock(sesion.user.id)} onOk={()=>setBloqueo("abierto")} onSalir={salir}/>
                :bloqueo==="abierto"
                  ?<Panel session={sesion} onSalir={salir}/>
                  :cargando}
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
