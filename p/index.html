<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upco InsurGest — Tus pólizas</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="manifest" href="../manifest.webmanifest"/>
<link rel="icon" href="../icon-192.png"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#F4F7FB;color:#0a1c35}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../shared.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

function leerToken(){
  const porQuery=new URLSearchParams(location.search).get("t");
  if(porQuery)return porQuery;
  const m=location.pathname.match(/^\/p\/([^\/]+)\/?$/);
  return m?decodeURIComponent(m[1]):null;
}

const card={background:"#fff",borderRadius:14,padding:18,border:"1px solid #DDE4EE"};
const badge=(color)=>({display:"inline-block",fontSize:11,fontWeight:700,color,background:color+"1a",borderRadius:6,padding:"3px 8px"});
const campo={width:"100%",padding:"12px 14px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:15,marginBottom:10,fontFamily:"inherit"};
const TIPOS_CAMBIO=["Cambio de domicilio","Cambio de placas o vehículo","Agregar o quitar conductor","Cambio de beneficiario","Cambio de forma de pago","Otro"];

function Boton({children,onClick,disabled,color="#10284A",type="button"}){
  return <button type={type} onClick={onClick} disabled={disabled}
    style={{background:disabled?"#DDE4EE":color,color:disabled?"#9ca3af":"#fff",border:"none",borderRadius:10,padding:"12px 18px",fontSize:15,fontWeight:700,cursor:disabled?"not-allowed":"pointer"}}>
    {children}
  </button>;
}

function SolicitudEnviada({onCerrar}){
  return <div style={{...card,textAlign:"center",marginBottom:24,background:"#F4F7FB"}}>
    <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>¡Listo! Tu agente ya la recibió.</div>
    <div style={{fontSize:13,color:"#6B7280",marginBottom:14}}>Se va a poner en contacto contigo pronto.</div>
    <button onClick={onCerrar} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer"}}>Cerrar</button>
  </div>;
}

function FormularioEndoso({token,polizaId,polizaLabel,onEnviado,onCancelar}){
  const[tipoCambio,setTipoCambio]=useState(TIPOS_CAMBIO[0]);
  const[descripcion,setDescripcion]=useState("");
  const[foto,setFoto]=useState(null);
  const[enviando,setEnviando]=useState(false);
  const[error,setError]=useState("");

  const enviar=async(e)=>{
    e.preventDefault();
    setError("");setEnviando(true);
    let fotoPath=null;
    if(foto){
      fotoPath=`${token}/${crypto.randomUUID()}.jpg`;
      const{error:errSubida}=await sb.storage.from("solicitudes").upload(fotoPath,foto,{contentType:foto.type||"image/jpeg"});
      if(errSubida){setEnviando(false);setError("No se pudo subir la foto. Intenta de nuevo.");return;}
    }
    const{error:errRpc}=await sb.rpc("portal_crear_solicitud",{
      p_token:token,p_tipo:"endoso",p_tipo_cambio:tipoCambio,p_descripcion:descripcion.trim()||null,p_foto_path:fotoPath,p_poliza_id:polizaId||null
    });
    setEnviando(false);
    if(errRpc){setError("No se pudo enviar tu solicitud. Intenta de nuevo.");return;}
    onEnviado();
  };

  return <form onSubmit={enviar} style={{...card,marginBottom:24}}>
    <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>Solicitar cambio a mi póliza (endoso)</div>
    {polizaLabel&&<div style={{fontSize:12,color:"#8FA0B4",marginBottom:14}}>Sobre: {polizaLabel}</div>}
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>Tipo de cambio</label>
    <select value={tipoCambio} onChange={e=>setTipoCambio(e.target.value)} style={campo}>
      {TIPOS_CAMBIO.map(t=><option key={t} value={t}>{t}</option>)}
    </select>
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>Cuéntanos qué necesitas cambiar</label>
    <textarea value={descripcion} onChange={e=>setDescripcion(e.target.value)} rows={3} style={campo}/>
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>Foto (opcional)</label>
    <input type="file" accept="image/*" onChange={e=>setFoto(e.target.files[0]||null)} style={{...campo,padding:"8px 10px"}}/>
    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <div style={{display:"flex",gap:10}}>
      <Boton type="submit" disabled={enviando}>{enviando?"Enviando...":"Enviar solicitud"}</Boton>
      <button type="button" onClick={onCancelar} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer"}}>Cancelar</button>
    </div>
  </form>;
}

function FormularioCotizacion({token,onEnviado,onCancelar}){
  const[ramo,setRamo]=useState(RAMOS_SUGERIDOS[0]);
  const[descripcion,setDescripcion]=useState("");
  const[enviando,setEnviando]=useState(false);
  const[error,setError]=useState("");

  const enviar=async(e)=>{
    e.preventDefault();
    setError("");setEnviando(true);
    const{error:errRpc}=await sb.rpc("portal_crear_solicitud",{
      p_token:token,p_tipo:"cotizacion",p_ramo_interes:ramo,p_descripcion:descripcion.trim()||null
    });
    setEnviando(false);
    if(errRpc){setError("No se pudo enviar tu solicitud. Intenta de nuevo.");return;}
    onEnviado();
  };

  return <form onSubmit={enviar} style={{...card,marginBottom:24}}>
    <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>Solicitar una cotización</div>
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>¿Qué te interesa cotizar?</label>
    <select value={ramo} onChange={e=>setRamo(e.target.value)} style={campo}>
      {RAMOS_SUGERIDOS.map(r=><option key={r} value={r}>{r}</option>)}
      <option value="Otro">Otro</option>
    </select>
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>Cuéntanos más (opcional)</label>
    <textarea value={descripcion} onChange={e=>setDescripcion(e.target.value)} rows={3} style={campo}/>
    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <div style={{display:"flex",gap:10}}>
      <Boton type="submit" disabled={enviando}>{enviando?"Enviando...":"Enviar solicitud"}</Boton>
      <button type="button" onClick={onCancelar} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer"}}>Cancelar</button>
    </div>
  </form>;
}

function SeccionAcciones({token}){
  const[vista,setVista]=useState("botones"); // botones | cotizacion | flotilla | enviado
  if(vista==="enviado")return <SolicitudEnviada onCerrar={()=>setVista("botones")}/>;
  if(vista==="cotizacion")return <FormularioCotizacion token={token} onEnviado={()=>setVista("enviado")} onCancelar={()=>setVista("botones")}/>;
  if(vista==="flotilla")return <div style={{marginBottom:24}}>
    <button onClick={()=>setVista("botones")} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer",padding:0,marginBottom:12}}>‹ Volver</button>
    <SeccionFlotilla token={token}/>
  </div>;
  return <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:24}}>
    <Boton color="#F59E0B" onClick={()=>setVista("cotizacion")}>Solicitar cotización</Boton>
    <Boton color="#53647D" onClick={()=>setVista("flotilla")}>Mi flotilla</Boton>
  </div>;
}

function TarjetaPoliza({p,vehiculo,token}){
  const[vista,setVista]=useState("normal"); // normal | endoso | enviado
  const vig=vigenciaCalculada(p);

  if(vista==="enviado")return <div style={{...card,marginBottom:10,textAlign:"center",background:"#F4F7FB"}}>
    <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>¡Listo! Tu agente ya la recibió.</div>
    <button onClick={()=>setVista("normal")} style={{background:"none",border:"none",color:"#53647D",fontSize:12,cursor:"pointer"}}>Cerrar</button>
  </div>;

  if(vista==="endoso")return <div style={{marginBottom:10}}>
    <FormularioEndoso token={token} polizaId={p.id} polizaLabel={`${p.ramo} — ${p.aseguradora||"Sin aseguradora"}`}
      onEnviado={()=>setVista("enviado")} onCancelar={()=>setVista("normal")}/>
  </div>;

  return <div style={{...card,marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontWeight:700,fontSize:14}}>{p.ramo} — {p.aseguradora||"Sin aseguradora"}</div>
        <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>Póliza {p.numero_poliza||"—"} · {fecha(p.fecha_inicio)} a {fecha(p.fecha_fin)}</div>
        {vehiculo&&<div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>Vehículo: {vehiculo.placas||"Sin placas"}{vehiculo.marca?` — ${vehiculo.marca} ${vehiculo.modelo||""}`:""}</div>}
        {vig.dias!=null&&<div style={{fontSize:12,color:vig.dias<0?"#dc2626":vig.dias<=15?"#F59E0B":"#8FA0B4",marginTop:2,fontWeight:600}}>{textoDias(vig.dias)}</div>}
      </div>
      <span style={badge(colorEstatus[vig.label]||"#6b7280")}>{vig.label}</span>
    </div>
    <div style={{marginTop:10,fontSize:13,color:"#374151",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span>{pesos(p.prima)} {p.forma_pago?`· ${p.forma_pago}`:""}</span>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        {p.pdf_url&&<a href={p.pdf_url} target="_blank" rel="noopener" style={{color:"#10284A",fontSize:13,fontWeight:700,textDecoration:"none"}}>Descargar PDF ↓</a>}
        <button onClick={()=>setVista("endoso")} style={{background:"none",border:"none",color:"#53647D",fontSize:13,fontWeight:700,cursor:"pointer",padding:0}}>Solicitar cambio</button>
      </div>
    </div>
  </div>;
}

function TarjetaVehiculo({v,poliza}){
  const vig=poliza?vigenciaCalculada(poliza):null;
  return <div style={card}>
    <div style={{fontWeight:700,fontSize:14}}>{v.marca||"—"} {v.modelo||""} {v.anio||""}</div>
    <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>{v.placas||"Sin placas"}</div>
    {v.fecha_verificacion&&<div style={{fontSize:12,color:"#374151",marginTop:6}}>Verificación: {fecha(v.fecha_verificacion)}</div>}
    <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #f1f5f9"}}>
      {poliza
        ?<div>
          <span style={badge(colorEstatus[vig.label]||"#6b7280")}>{vig.label}</span>
          {vig.dias!=null&&<div style={{fontSize:12,color:vig.dias<0?"#dc2626":vig.dias<=15?"#F59E0B":"#8FA0B4",marginTop:4,fontWeight:600}}>{textoDias(vig.dias)}</div>}
        </div>
        :<div style={{fontSize:12,color:"#8FA0B4"}}>Sin póliza de auto vinculada</div>}
    </div>
  </div>;
}

const INTERVALOS_MANTENIMIENTO=[{value:10000,label:"cada 10,000 km"},{value:15000,label:"cada 15,000 km"}];

function FormularioFlotilla({token,polizasAuto,onGuardado,onCancelar}){
  const[placas,setPlacas]=useState("");
  const[estado,setEstado]=useState("");
  const[marca,setMarca]=useState("");
  const[modelo,setModelo]=useState("");
  const[anio,setAnio]=useState("");
  const[kilometraje,setKilometraje]=useState("");
  const[intervalo,setIntervalo]=useState(10000);
  const[polizaId,setPolizaId]=useState("");
  const[guardando,setGuardando]=useState(false);
  const[error,setError]=useState("");

  const guardar=async(e)=>{
    e.preventDefault();
    setError("");setGuardando(true);
    const{error:errRpc}=await sb.rpc("portal_flotilla_agregar",{
      p_token:token,p_placas:placas.trim()||null,p_estado:estado||null,p_marca:marca.trim()||null,
      p_modelo:modelo.trim()||null,p_anio:anio?parseInt(anio,10):null,
      p_kilometraje:kilometraje?parseInt(kilometraje,10):null,p_intervalo:intervalo,
      p_poliza_id:polizaId||null
    });
    setGuardando(false);
    if(errRpc){setError(errRpc.message||"No se pudo agregar el vehículo.");return;}
    onGuardado();
  };

  return <form onSubmit={guardar} style={{...card,marginBottom:16}}>
    <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>Agregar vehículo a mi flotilla</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <input value={marca} onChange={e=>setMarca(e.target.value)} placeholder="Marca" style={campo}/>
      <input value={modelo} onChange={e=>setModelo(e.target.value)} placeholder="Modelo" style={campo}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <input value={anio} onChange={e=>setAnio(e.target.value)} placeholder="Año" type="number" min="1980" max="2100" style={campo}/>
      <input value={placas} onChange={e=>setPlacas(e.target.value.toUpperCase())} placeholder="Placas" style={campo}/>
    </div>
    <select value={estado} onChange={e=>setEstado(e.target.value)} style={campo}>
      <option value="">Estado de las placas</option>
      {ESTADOS_MX.map(e=><option key={e} value={e}>{e}</option>)}
    </select>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <input value={kilometraje} onChange={e=>setKilometraje(e.target.value)} placeholder="Kilometraje actual" type="number" min="0" style={campo}/>
      <select value={intervalo} onChange={e=>setIntervalo(parseInt(e.target.value,10))} style={campo}>
        {INTERVALOS_MANTENIMIENTO.map(i=><option key={i.value} value={i.value}>{i.label}</option>)}
      </select>
    </div>
    {polizasAuto.length>0&&<select value={polizaId} onChange={e=>setPolizaId(e.target.value)} style={campo}>
      <option value="">Sin vincular a ninguna póliza</option>
      {polizasAuto.map(p=><option key={p.id} value={p.id}>Vincular a póliza {p.numero_poliza||"—"} ({p.aseguradora||"sin aseguradora"})</option>)}
    </select>}
    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <div style={{display:"flex",gap:10}}>
      <Boton type="submit" disabled={guardando}>{guardando?"Guardando...":"Agregar"}</Boton>
      <button type="button" onClick={onCancelar} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer"}}>Cancelar</button>
    </div>
  </form>;
}

function TarjetaFlotilla({v,token,onCambio}){
  const[kmNuevo,setKmNuevo]=useState("");
  const[guardando,setGuardando]=useState(false);

  const proximoServicioKm=v.km_ultimo_servicio!=null?v.km_ultimo_servicio+v.intervalo_mantenimiento_km:null;
  const kmFaltan=proximoServicioKm!=null&&v.kilometraje_actual!=null?proximoServicioKm-v.kilometraje_actual:null;

  const registrarKm=async()=>{
    if(!kmNuevo)return;
    setGuardando(true);
    await sb.rpc("portal_flotilla_actualizar",{p_token:token,p_vehiculo_id:v.id,p_kilometraje:parseInt(kmNuevo,10),p_fecha_ultimo_servicio:null,p_km_ultimo_servicio:null,p_fecha_verificacion:null,p_notificaciones_activas:null});
    setGuardando(false);setKmNuevo("");onCambio();
  };
  const marcarServicioHecho=async()=>{
    if(!v.kilometraje_actual)return;
    setGuardando(true);
    await sb.rpc("portal_flotilla_actualizar",{p_token:token,p_vehiculo_id:v.id,p_kilometraje:null,p_fecha_ultimo_servicio:new Date().toISOString().slice(0,10),p_km_ultimo_servicio:v.kilometraje_actual,p_fecha_verificacion:null,p_notificaciones_activas:null});
    setGuardando(false);onCambio();
  };
  const toggleNotificaciones=async()=>{
    setGuardando(true);
    await sb.rpc("portal_flotilla_actualizar",{p_token:token,p_vehiculo_id:v.id,p_kilometraje:null,p_fecha_ultimo_servicio:null,p_km_ultimo_servicio:null,p_fecha_verificacion:null,p_notificaciones_activas:!v.notificaciones_activas});
    setGuardando(false);onCambio();
  };
  const cotizar=async()=>{
    setGuardando(true);
    await sb.rpc("portal_flotilla_cotizar",{p_token:token,p_vehiculo_id:v.id});
    setGuardando(false);onCambio();
  };
  const eliminar=async()=>{
    if(!window.confirm(`¿Quitar ${v.marca||"este vehículo"} de tu flotilla?`))return;
    setGuardando(true);
    await sb.rpc("portal_flotilla_eliminar",{p_token:token,p_vehiculo_id:v.id});
    setGuardando(false);onCambio();
  };

  return <div style={{...card,marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontWeight:700,fontSize:14}}>{v.marca||"—"} {v.modelo||""} {v.anio||""}</div>
        <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>{v.placas||"Sin placas"}{v.estado?` · ${v.estado}`:""}</div>
      </div>
      {!v.poliza_id&&<button onClick={cotizar} disabled={guardando} style={{background:"none",border:"none",color:"#F59E0B",fontSize:12,fontWeight:700,cursor:"pointer"}}>Solicitar cotización</button>}
    </div>

    {v.requiere_verificacion&&<div style={{marginTop:8,fontSize:12,color:"#374151"}}>
      Tu estado requiere verificación vehicular{v.fecha_verificacion?` · próxima: ${fecha(v.fecha_verificacion)}`:" · agrégale fecha cuando la tengas"}
    </div>}

    <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #f1f5f9",fontSize:12.5,color:"#374151"}}>
      {v.kilometraje_actual!=null?`Último kilometraje: ${v.kilometraje_actual.toLocaleString("es-MX")} km`:"Sin kilometraje registrado"}
      {kmFaltan!=null&&<div style={{marginTop:2,fontWeight:600,color:kmFaltan<=500?"#F59E0B":"#8FA0B4"}}>
        {kmFaltan<=0?"Ya te toca servicio":`Faltan ~${kmFaltan.toLocaleString("es-MX")} km para tu próximo servicio`}
      </div>}
    </div>

    <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>
      <input value={kmNuevo} onChange={e=>setKmNuevo(e.target.value)} placeholder="Nuevo km" type="number" style={{...campo,width:110,marginBottom:0}}/>
      <button onClick={registrarKm} disabled={guardando||!kmNuevo} style={{...campo,width:"auto",marginBottom:0,background:"#F4F7FB",cursor:"pointer",fontSize:12,fontWeight:700,color:"#10284A",padding:"10px 12px"}}>Actualizar</button>
      <button onClick={marcarServicioHecho} disabled={guardando} style={{background:"none",border:"none",color:"#53647D",fontSize:12,cursor:"pointer"}}>Ya le hice servicio</button>
    </div>

    <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#374151",marginTop:10,cursor:"pointer"}}>
      <input type="checkbox" checked={v.notificaciones_activas} onChange={toggleNotificaciones} disabled={guardando}/>
      Avisarme por correo cuando se acerque el mantenimiento
    </label>

    <button onClick={eliminar} disabled={guardando} style={{background:"none",border:"none",color:"#dc2626",fontSize:11,cursor:"pointer",marginTop:8,padding:0}}>Quitar de mi flotilla</button>
  </div>;
}

function SeccionFlotilla({token}){
  const[datos,setDatos]=useState(null);
  const[formAbierto,setFormAbierto]=useState(false);
  const[error,setError]=useState("");

  const cargar=async()=>{
    const{data,error}=await sb.rpc("portal_flotilla_listar",{p_token:token});
    if(error||!data){setError("No se pudo cargar tu flotilla.");return;}
    setDatos(data);
  };
  useEffect(()=>{cargar()},[]);

  if(error)return null;
  if(!datos)return null;

  const limite=datos.flotilla.length>=5;

  return <div style={{marginTop:32}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:13,fontWeight:700,color:"#8FA0B4"}}>MI FLOTILLA ({datos.flotilla.length}/5)</div>
      {!formAbierto&&!limite&&<button onClick={()=>setFormAbierto(true)} style={{background:"none",border:"none",color:"#10284A",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Agregar vehículo</button>}
    </div>
    <div style={{fontSize:12,color:"#8FA0B4",marginBottom:12}}>Lleva el mantenimiento de tus autos, tengan o no póliza contigo — hasta 5 vehículos.</div>

    {formAbierto&&<FormularioFlotilla token={token} polizasAuto={datos.polizas_auto}
      onGuardado={()=>{setFormAbierto(false);cargar();}} onCancelar={()=>setFormAbierto(false)}/>}

    {datos.flotilla.length===0&&!formAbierto&&<div style={{...card,textAlign:"center",color:"#6B7280"}}>Todavía no tienes vehículos en tu flotilla.</div>}
    {datos.flotilla.map(v=><TarjetaFlotilla key={v.id} v={v} token={token} onCambio={cargar}/>)}
  </div>;
}

function Portal(){
  const[estado,setEstado]=useState("cargando"); // cargando | invalido | listo
  const[datos,setDatos]=useState(null);
  const[token,setToken]=useState(null);

  useEffect(()=>{
    const t=leerToken();
    if(!t){setEstado("invalido");return;}
    history.replaceState(null,"","/p/"+t);
    setToken(t);
    sb.rpc("portal_cliente",{p_token:t}).then(({data,error})=>{
      if(error||!data){setEstado("invalido");return;}
      setDatos(data);setEstado("listo");
    });
  },[]);

  if(estado==="cargando")return <div style={{padding:40,textAlign:"center",color:"#6B7280"}}>Cargando tus pólizas...</div>;

  if(estado==="invalido")return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{...card,maxWidth:380,textAlign:"center"}}>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Esta liga ya no es válida</div>
      <div style={{fontSize:14,color:"#6B7280"}}>Pídele a tu agente que te comparta la liga actualizada.</div>
    </div>
  </div>;

  const{cliente,agente,polizas,vehiculos}=datos;
  const vehiculosPorId={};
  vehiculos.forEach(v=>vehiculosPorId[v.id]=v);
  const polizaPorVehiculo={};
  polizas.forEach(p=>{
    if(!p.vehiculo_id)return;
    const actual=polizaPorVehiculo[p.vehiculo_id];
    if(!actual||(p.fecha_fin||"")>(actual.fecha_fin||""))polizaPorVehiculo[p.vehiculo_id]=p;
  });

  return <div style={{maxWidth:640,margin:"0 auto",padding:"24px 16px 60px"}}>
    <div style={{marginBottom:8}}>
      <div style={{fontSize:20,fontWeight:800}}>{agente.nombre_negocio||"Upco "}{!agente.nombre_negocio&&<span style={{color:"#F59E0B"}}>InsurGest</span>}</div>
      <div style={{fontSize:13,color:"#8FA0B4",marginTop:2}}>
        Tu agente: {agente.nombre||"—"}{agente.telefono?` · ${agente.telefono}`:""}{agente.correo?` · ${agente.correo}`:""}
      </div>
    </div>

    <div style={{fontSize:16,fontWeight:700,margin:"20px 0 12px"}}>Hola, {cliente.nombre.split(" ")[0]} 👋</div>

    <SeccionAcciones token={token}/>

    <div style={{fontSize:13,fontWeight:700,color:"#8FA0B4",marginBottom:10}}>TUS PÓLIZAS ({polizas.length})</div>
    {polizas.length===0&&<div style={{...card,textAlign:"center",color:"#6B7280",marginBottom:24}}>Todavía no tienes pólizas registradas.</div>}
    {polizas.map(p=><TarjetaPoliza key={p.id} p={p} vehiculo={p.vehiculo_id?vehiculosPorId[p.vehiculo_id]:null} token={token}/>)}

    {vehiculos.length>0&&<>
      <div style={{fontSize:13,fontWeight:700,color:"#8FA0B4",margin:"24px 0 10px"}}>TUS VEHÍCULOS ({vehiculos.length})</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:10}}>
        {vehiculos.map(v=><TarjetaVehiculo key={v.id} v={v} poliza={polizaPorVehiculo[v.id]}/>)}
      </div>
    </>}

    <div style={{textAlign:"center",fontSize:12,color:"#8FA0B4",marginTop:32}}>Upco InsurGest</div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Portal/>);
</script>
</body>
</html>
