<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upco InsurGest — Tus pólizas</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="manifest" href="../manifest.webmanifest"/>
<link rel="icon" href="../icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../estilos.css"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(180deg,#F8FAFC 0%,#F0F4F9 380px);color:#0a1c35;min-height:100vh}

  /* ── Pantalla de bienvenida ──
     "Insurance" y "Gestión" caen desde arriba y se les colapsa la terminación hasta formar
     "InsurGest". Mismo mecanismo que el splash de Homey ("Home"+"money" → "Homey"), en vertical. */
  #splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#10284A,#0a1c35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .6s ease;padding:24px}
  #splash.oculto{opacity:0;pointer-events:none}
  #splash .mono{border-radius:24px;box-shadow:0 16px 44px rgba(0,0,0,.45);line-height:0;opacity:0;transform:scale(.82) translateY(8px);animation:sLogo .9s cubic-bezier(.2,.7,.3,1) .1s forwards}
  #splash .marca{font-size:28px;font-weight:800;color:#fff;margin-top:8px;display:flex;align-items:baseline;gap:8px;white-space:nowrap}
  #splash .upco{opacity:0;animation:sFade .5s ease .4s forwards}
  #splash .ig{display:inline-flex;color:#F59E0B;animation:sGrow .5s ease 2.5s forwards}
  #splash .insur{display:inline-flex;opacity:0;transform:translateY(-28px);animation:sBaja .6s cubic-bezier(.2,.7,.3,1) 1s forwards}
  #splash .gest{display:inline-flex;opacity:0;transform:translateY(-28px);animation:sBaja .6s cubic-bezier(.2,.7,.3,1) 1.7s forwards}
  #splash .cae{display:inline-block;overflow:hidden;max-width:110px;animation:sColapsa .5s ease 2.5s forwards}
  #splash .esp{max-width:9px}
  #splash .sub{font-size:15px;font-weight:500;color:#8FA0B4;opacity:0;animation:sFade .5s ease 3.1s forwards;text-align:center}
  #splash .barra{width:120px;height:4px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden;opacity:0;animation:sFade .4s ease .3s forwards}
  #splash .barra i{display:block;height:100%;width:40%;border-radius:99px;background:#F59E0B;animation:sCarga 1.1s ease-in-out .3s infinite}
  @keyframes sLogo{to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes sFade{to{opacity:1}}
  @keyframes sCarga{0%{margin-left:-40%}100%{margin-left:120%}}
  @keyframes sBaja{to{opacity:1;transform:translateY(0)}}
  @keyframes sColapsa{to{max-width:0;opacity:0}}
  @keyframes sGrow{0%{transform:scale(1)}60%{transform:scale(1.15)}100%{transform:scale(1.05)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../shared.js"></script>
</head>
<body>
<div id="splash">
  <div class="mono"><svg width="84" height="84" viewBox="0 0 38 38"><rect width="38" height="38" rx="11" fill="#10284A"/><text x="19" y="25" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-weight="800" font-size="14" fill="#F59E0B">IG</text></svg></div>
  <div class="marca">
    <span class="upco">Upco</span>
    <span class="ig"><span class="insur">Insur<span class="cae">ance</span></span><span class="cae esp">&nbsp;</span><span class="gest">Gest<span class="cae">ión</span></span></span>
  </div>
  <div class="sub">Tus pólizas, siempre a la mano</div>
  <div class="barra"><i></i></div>
</div>
<script>
// Va aquí, junto al splash y no al final del archivo, para que corra mientras el navegador
// todavía está armando la página: si esperara al final, quien ya lo vio alcanzaría a ver un
// parpadeo antes de que lo quitemos.
(function(){
  var s=document.getElementById("splash");
  if(!s)return;
  var quieto=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  // Una sola vez por sesión: el cliente que entra a bajar un PDF y regresa no necesita ver la
  // animación otra vez.
  if(quieto||sessionStorage.getItem("upco_ig_splash")){s.remove();return;}
  try{sessionStorage.setItem("upco_ig_splash","1");}catch(e){}
  setTimeout(function(){s.classList.add("oculto");setTimeout(function(){s.remove();},700);},3800);
})();
</script>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

function leerToken(){
  const porQuery=new URLSearchParams(location.search).get("t");
  if(porQuery)return porQuery;
  const m=location.pathname.match(/^\/p\/([^\/]+)\/?$/);
  return m?decodeURIComponent(m[1]):null;
}

const card={background:"#fff",borderRadius:16,padding:22,border:"1px solid rgba(16,40,74,.08)",boxShadow:"0 3px 12px rgba(16,28,53,.07), 0 1px 3px rgba(16,28,53,.05)"};
const badge=(color)=>({display:"inline-block",fontSize:11,fontWeight:700,color,background:color+"1a",borderRadius:7,padding:"3px 9px"});
const campo={width:"100%",padding:"13px 15px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:15,marginBottom:10,fontFamily:"inherit"};
const TIPOS_CAMBIO=["Cambio de domicilio","Cambio de placas o vehículo","Agregar o quitar conductor","Cambio de beneficiario","Cambio de forma de pago","Otro"];

const VARIANTE_BOTON={"#10284A":"btn-navy","#F59E0B":"btn-amber","#53647D":"btn-neutral","#16a34a":"btn-good"};
function Boton({children,onClick,disabled,color="#10284A",type="button"}){
  return <button type={type} onClick={onClick} disabled={disabled} className={`btn ${VARIANTE_BOTON[color]||"btn-navy"}`}>
    {children}
  </button>;
}

function SolicitudEnviada({onCerrar}){
  return <div style={{...card,textAlign:"center",marginBottom:24,background:"#F4F7FB"}}>
    <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>¡Listo! Tu agente ya la recibió.</div>
    <div style={{fontSize:13,color:"#6B7280",marginBottom:14}}>Se va a poner en contacto contigo pronto.</div>
    <button onClick={onCerrar} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer"}}>Cerrar</button>
  </div>;
}

function FormularioEndoso({token,polizaId,polizaLabel,onEnviado,onCancelar}){
  const[tipoCambio,setTipoCambio]=useState(TIPOS_CAMBIO[0]);
  const[descripcion,setDescripcion]=useState("");
  const[foto,setFoto]=useState(null);
  const[enviando,setEnviando]=useState(false);
  const[error,setError]=useState("");

  const enviar=async(e)=>{
    e.preventDefault();
    setError("");setEnviando(true);
    let fotoPath=null;
    if(foto){
      fotoPath=`${token}/${crypto.randomUUID()}.jpg`;
      const{error:errSubida}=await sb.storage.from("solicitudes").upload(fotoPath,foto,{contentType:foto.type||"image/jpeg"});
      if(errSubida){setEnviando(false);setError("No se pudo subir la foto. Intenta de nuevo.");return;}
    }
    const{error:errRpc}=await sb.rpc("portal_crear_solicitud",{
      p_token:token,p_tipo:"endoso",p_tipo_cambio:tipoCambio,p_descripcion:descripcion.trim()||null,p_foto_path:fotoPath,p_poliza_id:polizaId||null
    });
    setEnviando(false);
    if(errRpc){setError("No se pudo enviar tu solicitud. Intenta de nuevo.");return;}
    onEnviado();
  };

  return <form onSubmit={enviar} style={{...card,marginBottom:24}}>
    <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>Solicitar cambio a mi póliza (endoso)</div>
    {polizaLabel&&<div style={{fontSize:12,color:"#8FA0B4",marginBottom:14}}>Sobre: {polizaLabel}</div>}
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>Tipo de cambio</label>
    <select value={tipoCambio} onChange={e=>setTipoCambio(e.target.value)} style={campo}>
      {TIPOS_CAMBIO.map(t=><option key={t} value={t}>{t}</option>)}
    </select>
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>Cuéntanos qué necesitas cambiar</label>
    <textarea value={descripcion} onChange={e=>setDescripcion(e.target.value)} rows={3} style={campo}/>
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>Foto (opcional)</label>
    <input type="file" accept="image/*" onChange={e=>setFoto(e.target.files[0]||null)} style={{...campo,padding:"8px 10px"}}/>
    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <div style={{display:"flex",gap:10}}>
      <Boton type="submit" disabled={enviando}>{enviando?"Enviando...":"Enviar solicitud"}</Boton>
      <button type="button" onClick={onCancelar} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer"}}>Cancelar</button>
    </div>
  </form>;
}

function FormularioCotizacion({token,onEnviado,onCancelar}){
  const[ramo,setRamo]=useState(RAMOS_SUGERIDOS[0]);
  const[descripcion,setDescripcion]=useState("");
  const[enviando,setEnviando]=useState(false);
  const[error,setError]=useState("");

  const enviar=async(e)=>{
    e.preventDefault();
    setError("");setEnviando(true);
    const{error:errRpc}=await sb.rpc("portal_crear_solicitud",{
      p_token:token,p_tipo:"cotizacion",p_ramo_interes:ramo,p_descripcion:descripcion.trim()||null
    });
    setEnviando(false);
    if(errRpc){setError("No se pudo enviar tu solicitud. Intenta de nuevo.");return;}
    onEnviado();
  };

  return <form onSubmit={enviar} style={{...card,marginBottom:24}}>
    <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>Solicitar una cotización</div>
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>¿Qué te interesa cotizar?</label>
    <select value={ramo} onChange={e=>setRamo(e.target.value)} style={campo}>
      {RAMOS_SUGERIDOS.map(r=><option key={r} value={r}>{r}</option>)}
      <option value="Otro">Otro</option>
    </select>
    <label style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4,display:"block"}}>Cuéntanos más (opcional)</label>
    <textarea value={descripcion} onChange={e=>setDescripcion(e.target.value)} rows={3} style={campo}/>
    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <div style={{display:"flex",gap:10}}>
      <Boton type="submit" disabled={enviando}>{enviando?"Enviando...":"Enviar solicitud"}</Boton>
      <button type="button" onClick={onCancelar} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer"}}>Cancelar</button>
    </div>
  </form>;
}

const GRUPOS_PRESUPUESTO={
  necesidad:{pct:.5,label:"Necesidades",color:"#10284A"},
  gusto:{pct:.3,label:"Gustos",color:"#F59E0B"},
  ahorro:{pct:.2,label:"Ahorro",color:"#16a34a"}
};

function cargarPresupuesto(token){
  try{
    const raw=localStorage.getItem(`insurgest_presupuesto_${token}`);
    return raw?JSON.parse(raw):{ingreso:0,categorias:[]};
  }catch(e){return{ingreso:0,categorias:[]};}
}
function guardarPresupuestoLocal(token,datos){
  try{localStorage.setItem(`insurgest_presupuesto_${token}`,JSON.stringify(datos));}catch(e){}
}

function ModalCategoria({categoria,onGuardar,onCerrar}){
  const c=categoria;
  const[nombre,setNombre]=useState(c?c.nombre:"");
  const[limite,setLimite]=useState(c?String(c.limite):"");
  const[grupo,setGrupo]=useState(c?c.grupo:"necesidad");

  const guardar=(e)=>{
    e.preventDefault();
    if(!nombre.trim()||!limite)return;
    onGuardar({id:c?c.id:crypto.randomUUID(),nombre:nombre.trim(),limite:parseFloat(limite),gastado:c?c.gastado:0,grupo});
  };

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:50}}>
    <form onSubmit={guardar} style={{...card,maxWidth:360,width:"100%"}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>{c?"Editar categoría":"Nueva categoría"}</div>
      <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre (ej. Renta, Comida)" style={campo}/>
      <input value={limite} onChange={e=>setLimite(e.target.value)} placeholder="Presupuesto mensual" type="number" min="0" style={campo}/>
      <select value={grupo} onChange={e=>setGrupo(e.target.value)} style={campo}>
        <option value="necesidad">Necesidad</option>
        <option value="gusto">Gusto</option>
        <option value="ahorro">Ahorro</option>
      </select>
      <div style={{display:"flex",gap:10}}>
        <Boton type="submit">Guardar</Boton>
        <button type="button" onClick={onCerrar} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer"}}>Cancelar</button>
      </div>
    </form>
  </div>;
}

function BarraCategoria({c,onEditarGastado,onEliminar}){
  const pct=c.limite>0?Math.min((c.gastado/c.limite)*100,100):0;
  const colorGrupo=(GRUPOS_PRESUPUESTO[c.grupo]||{}).color||"#10284A";
  const color=pct>=100?"#dc2626":pct>=80?"#F59E0B":colorGrupo;
  return <div style={{marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
      <span style={{fontWeight:600,color:"#374151"}}>{c.nombre}</span>
      <span style={{color:"#8FA0B4"}}>{pesos(c.gastado)} / {pesos(c.limite)}</span>
    </div>
    <div style={{height:8,background:"#F4F7FB",borderRadius:4}}>
      <div style={{height:"100%",width:`${Math.max(pct,3)}%`,background:color,borderRadius:4}}/>
    </div>
    <div style={{display:"flex",gap:10,marginTop:4}}>
      <button onClick={onEditarGastado} style={{background:"none",border:"none",color:"#53647D",fontSize:11,cursor:"pointer",padding:0}}>Registrar gasto</button>
      <button onClick={onEliminar} style={{background:"none",border:"none",color:"#dc2626",fontSize:11,cursor:"pointer",padding:0}}>Eliminar</button>
    </div>
  </div>;
}

function SeccionPresupuesto({token}){
  const[datos,setDatos]=useState(()=>cargarPresupuesto(token));
  const[editandoIngreso,setEditandoIngreso]=useState(false);
  const[ingresoTemp,setIngresoTemp]=useState("");
  const[modalCategoria,setModalCategoria]=useState(null); // null | "nueva" | categoria
  const[editandoGastado,setEditandoGastado]=useState(null);
  const[gastadoTemp,setGastadoTemp]=useState("");

  const guardar=(nuevo)=>{setDatos(nuevo);guardarPresupuestoLocal(token,nuevo);};

  const guardarIngreso=()=>{guardar({...datos,ingreso:parseFloat(ingresoTemp)||0});setEditandoIngreso(false);};
  const guardarCategoria=(cat)=>{
    const existe=datos.categorias.some(c=>c.id===cat.id);
    const categorias=existe?datos.categorias.map(c=>c.id===cat.id?cat:c):[...datos.categorias,cat];
    guardar({...datos,categorias});
    setModalCategoria(null);
  };
  const eliminarCategoria=(id)=>guardar({...datos,categorias:datos.categorias.filter(c=>c.id!==id)});
  const guardarGastado=()=>{
    guardar({...datos,categorias:datos.categorias.map(c=>c.id===editandoGastado?{...c,gastado:parseFloat(gastadoTemp)||0}:c)});
    setEditandoGastado(null);
  };

  const asignadoPorGrupo={necesidad:0,gusto:0,ahorro:0};
  datos.categorias.forEach(c=>{if(asignadoPorGrupo[c.grupo]!=null)asignadoPorGrupo[c.grupo]+=c.limite;});
  const presupuestado=datos.categorias.reduce((s,c)=>s+c.limite,0);
  const gastado=datos.categorias.reduce((s,c)=>s+c.gastado,0);
  const sinAsignar=Math.max(datos.ingreso-presupuestado,0);

  return <div style={{marginBottom:24}}>
    <div style={{...card,marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:4}}>INGRESO MENSUAL</div>
      {editandoIngreso
        ?<div style={{display:"flex",gap:8}}>
          <input value={ingresoTemp} onChange={e=>setIngresoTemp(e.target.value)} type="number" min="0" style={{...campo,marginBottom:0}}/>
          <Boton onClick={guardarIngreso}>OK</Boton>
        </div>
        :<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:24,fontWeight:800,color:"#10284A"}}>{pesos(datos.ingreso)}</div>
          <button onClick={()=>{setIngresoTemp(String(datos.ingreso||""));setEditandoIngreso(true);}} style={{background:"none",border:"none",color:"#53647D",fontSize:12,cursor:"pointer"}}>Editar</button>
        </div>}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
      <div style={{...card,textAlign:"center",padding:12}}>
        <div style={{fontSize:15,fontWeight:700,color:"#10284A"}}>{pesos(presupuestado)}</div>
        <div style={{fontSize:10.5,color:"#8FA0B4",marginTop:2}}>PRESUPUESTADO</div>
      </div>
      <div style={{...card,textAlign:"center",padding:12}}>
        <div style={{fontSize:15,fontWeight:700,color:"#374151"}}>{pesos(gastado)}</div>
        <div style={{fontSize:10.5,color:"#8FA0B4",marginTop:2}}>GASTADO</div>
      </div>
      <div style={{...card,textAlign:"center",padding:12}}>
        <div style={{fontSize:15,fontWeight:700,color:sinAsignar>0?"#16a34a":"#dc2626"}}>{pesos(sinAsignar)}</div>
        <div style={{fontSize:10.5,color:"#8FA0B4",marginTop:2}}>SIN ASIGNAR</div>
      </div>
    </div>

    {datos.ingreso>0&&<div style={{...card,marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:700,color:"#8FA0B4",marginBottom:10}}>REGLA 50/30/20</div>
      {Object.entries(GRUPOS_PRESUPUESTO).map(([key,g])=>{
        const sugerido=datos.ingreso*g.pct;
        const asignado=asignadoPorGrupo[key];
        const pct=sugerido>0?Math.min((asignado/sugerido)*100,100):0;
        return <div key={key} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
            <span style={{fontWeight:600,color:"#374151"}}>{g.label} ({Math.round(g.pct*100)}%)</span>
            <span style={{color:"#8FA0B4"}}>{pesos(asignado)} de {pesos(sugerido)} sugerido</span>
          </div>
          <div style={{height:8,background:"#F4F7FB",borderRadius:4}}>
            <div style={{height:"100%",width:`${Math.max(pct,3)}%`,background:g.color,borderRadius:4}}/>
          </div>
        </div>;
      })}
    </div>}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:13,fontWeight:700,color:"#8FA0B4"}}>CATEGORÍAS ({datos.categorias.length})</div>
      <button onClick={()=>setModalCategoria("nueva")} style={{background:"none",border:"none",color:"#10284A",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Nueva categoría</button>
    </div>
    {datos.categorias.length===0&&<div style={{...card,textAlign:"center",color:"#6B7280"}}>Agrega tu primera categoría de gasto.</div>}
    {datos.categorias.length>0&&<div style={card}>
      {datos.categorias.map(c=>
        editandoGastado===c.id
          ?<div key={c.id} style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:600,flex:1}}>{c.nombre}</span>
            <input value={gastadoTemp} onChange={e=>setGastadoTemp(e.target.value)} type="number" min="0" style={{...campo,width:100,marginBottom:0}}/>
            <button onClick={guardarGastado} style={{background:"none",border:"none",color:"#10284A",fontSize:12,fontWeight:700,cursor:"pointer"}}>OK</button>
          </div>
          :<BarraCategoria key={c.id} c={c}
              onEditarGastado={()=>{setGastadoTemp(String(c.gastado||""));setEditandoGastado(c.id);}}
              onEliminar={()=>eliminarCategoria(c.id)}/>
      )}
    </div>}

    {modalCategoria&&<ModalCategoria categoria={modalCategoria==="nueva"?null:modalCategoria} onGuardar={guardarCategoria} onCerrar={()=>setModalCategoria(null)}/>}

    <div style={{fontSize:11,color:"#8FA0B4",marginTop:14,textAlign:"center"}}>Se guarda solo en este dispositivo — nadie más puede verlo.</div>
  </div>;
}

function SeccionAcciones({token,tieneVida}){
  const[vista,setVista]=useState("botones"); // botones | cotizacion | presupuesto | enviado
  if(vista==="enviado")return <SolicitudEnviada onCerrar={()=>setVista("botones")}/>;
  if(vista==="cotizacion")return <FormularioCotizacion token={token} onEnviado={()=>setVista("enviado")} onCancelar={()=>setVista("botones")}/>;
  if(vista==="presupuesto")return <div style={{marginBottom:24}}>
    <button onClick={()=>setVista("botones")} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer",padding:0,marginBottom:12}}>‹ Volver</button>
    <SeccionPresupuesto token={token}/>
  </div>;
  return <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:24}}>
    <Boton color="#F59E0B" onClick={()=>setVista("cotizacion")}>Solicitar cotización</Boton>
    {tieneVida&&<Boton color="#53647D" onClick={()=>setVista("presupuesto")}>Mi presupuesto</Boton>}
  </div>;
}

function BotonNotificaciones({token}){
  const[estado,setEstado]=useState("inactivo"); // inactivo | activando | activado | solo-correo
  const activar=async()=>{
    setEstado("activando");
    await sb.rpc("portal_activar_notificaciones",{p_token:token});
    const resultadoPush=await suscribirPush(token);
    setEstado(resultadoPush==="ok"?"activado":"solo-correo");
  };
  const activado=estado==="activado"||estado==="solo-correo";
  const etiqueta=estado==="activando"?"Activando...":estado==="activado"?"✓ Notificaciones activadas":estado==="solo-correo"?"✓ Avisos por correo activados":"🔔 Activar notificaciones";
  return <button onClick={activar} disabled={activado||estado==="activando"} style={{background:activado?"#EAF7EF":"#FEF3E2",border:"none",borderRadius:20,padding:"7px 14px",fontSize:12.5,fontWeight:700,color:activado?"#16a34a":"#B45309",cursor:activado?"default":"pointer",whiteSpace:"nowrap"}}>
    {etiqueta}
  </button>;
}

const INTERVALOS_MANTENIMIENTO=[{value:10000,label:"cada 10,000 km"},{value:15000,label:"cada 15,000 km"}];

function TarjetaVehiculo({v,poliza,token,onCambio}){
  const[kmNuevo,setKmNuevo]=useState("");
  const[guardando,setGuardando]=useState(false);
  const vig=poliza?vigenciaCalculada(poliza):null;
  const incompleto=v.kilometraje_actual==null;
  const proximoServicioKm=v.km_ultimo_servicio!=null?v.km_ultimo_servicio+v.intervalo_mantenimiento_km:null;
  const kmFaltan=proximoServicioKm!=null&&v.kilometraje_actual!=null?proximoServicioKm-v.kilometraje_actual:null;

  const registrarKm=async()=>{
    if(!kmNuevo)return;
    setGuardando(true);
    await sb.rpc("portal_vehiculo_actualizar",{p_token:token,p_vehiculo_id:v.id,p_kilometraje:parseInt(kmNuevo,10),p_fecha_ultimo_servicio:null,p_km_ultimo_servicio:null,p_fecha_verificacion:null,p_notificaciones_activas:null});
    setGuardando(false);setKmNuevo("");onCambio();
  };
  const marcarServicioHecho=async()=>{
    if(!v.kilometraje_actual)return;
    setGuardando(true);
    await sb.rpc("portal_vehiculo_actualizar",{p_token:token,p_vehiculo_id:v.id,p_kilometraje:null,p_fecha_ultimo_servicio:new Date().toISOString().slice(0,10),p_km_ultimo_servicio:v.kilometraje_actual,p_fecha_verificacion:null,p_notificaciones_activas:null});
    setGuardando(false);onCambio();
  };
  const toggleNotificaciones=async()=>{
    setGuardando(true);
    await sb.rpc("portal_vehiculo_actualizar",{p_token:token,p_vehiculo_id:v.id,p_kilometraje:null,p_fecha_ultimo_servicio:null,p_km_ultimo_servicio:null,p_fecha_verificacion:null,p_notificaciones_activas:!v.notificaciones_activas});
    setGuardando(false);onCambio();
  };
  const cotizar=async()=>{
    setGuardando(true);
    await sb.rpc("portal_vehiculo_cotizar",{p_token:token,p_vehiculo_id:v.id});
    setGuardando(false);onCambio();
  };
  const eliminar=async()=>{
    if(!window.confirm(`¿Quitar ${v.marca||"este vehículo"}?`))return;
    setGuardando(true);
    const{error}=await sb.rpc("portal_vehiculo_eliminar",{p_token:token,p_vehiculo_id:v.id});
    setGuardando(false);
    if(error){alert(error.message);return;}
    onCambio();
  };

  return <div style={card}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontWeight:700,fontSize:14}}>{v.marca||"—"} {v.modelo||""} {v.anio||""}</div>
        <div style={{fontSize:12,color:"#8FA0B4",marginTop:2}}>{v.placas||"Sin placas"}{v.estado?` · ${v.estado}`:""}</div>
      </div>
      {!v.tiene_poliza&&<button onClick={cotizar} disabled={guardando} style={{background:"none",border:"none",color:"#F59E0B",fontSize:11,fontWeight:700,cursor:"pointer"}}>Cotizar</button>}
    </div>

    {incompleto&&<div style={{marginTop:8,fontSize:12,color:"#B45309",fontWeight:700}}>Termina de configurar este vehículo ↓</div>}

    {v.requiere_verificacion&&<div style={{marginTop:6,fontSize:12,color:"#374151"}}>
      Tu estado requiere verificación vehicular{v.fecha_verificacion?` · próxima: ${fecha(v.fecha_verificacion)}`:""}
    </div>}

    <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #f1f5f9"}}>
      {poliza
        ?<div>
          <span style={badge(colorEstatus[vig.label]||"#6b7280")}>{vig.label}</span>
          {vig.dias!=null&&<div style={{fontSize:12,color:vig.dias<0?"#dc2626":vig.dias<=15?"#F59E0B":"#8FA0B4",marginTop:4,fontWeight:600}}>{textoDias(vig.dias)}</div>}
        </div>
        :<div style={{fontSize:12,color:"#8FA0B4"}}>Sin póliza de auto vinculada</div>}
    </div>

    <div style={{marginTop:8,fontSize:12.5,color:"#374151"}}>
      {v.kilometraje_actual!=null?`Último kilometraje: ${v.kilometraje_actual.toLocaleString("es-MX")} km`:"Sin kilometraje registrado"}
      {kmFaltan!=null&&<div style={{marginTop:2,fontWeight:600,color:kmFaltan<=500?"#F59E0B":"#8FA0B4"}}>
        {kmFaltan<=0?"Ya te toca servicio":`Faltan ~${kmFaltan.toLocaleString("es-MX")} km para tu próximo servicio`}
      </div>}
    </div>

    <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
      <input value={kmNuevo} onChange={e=>setKmNuevo(e.target.value)} placeholder="Km actual" type="number" style={{...campo,width:90,marginBottom:0,padding:"8px 10px",fontSize:12.5}}/>
      <button onClick={registrarKm} disabled={guardando||!kmNuevo} style={{background:"#F4F7FB",border:"none",borderRadius:8,cursor:"pointer",fontSize:11.5,fontWeight:700,color:"#10284A",padding:"9px 10px"}}>Actualizar</button>
      <button onClick={marcarServicioHecho} disabled={guardando} style={{background:"none",border:"none",color:"#53647D",fontSize:11.5,cursor:"pointer"}}>Ya le hice servicio</button>
    </div>

    <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11.5,color:"#374151",marginTop:8,cursor:"pointer"}}>
      <input type="checkbox" checked={v.notificaciones_activas} onChange={toggleNotificaciones} disabled={guardando}/>
      Avisarme cuando se acerque el mantenimiento
    </label>

    {!v.tiene_poliza&&<button onClick={eliminar} disabled={guardando} style={{background:"none",border:"none",color:"#dc2626",fontSize:11,cursor:"pointer",marginTop:6,padding:0}}>Quitar</button>}
  </div>;
}

function FormularioVehiculoNuevo({token,onGuardado,onCancelar}){
  const[placas,setPlacas]=useState("");
  const[estado,setEstado]=useState("");
  const[marca,setMarca]=useState("");
  const[modelo,setModelo]=useState("");
  const[anio,setAnio]=useState("");
  const[kilometraje,setKilometraje]=useState("");
  const[intervalo,setIntervalo]=useState(10000);
  const[guardando,setGuardando]=useState(false);
  const[error,setError]=useState("");

  const guardar=async(e)=>{
    e.preventDefault();
    setError("");setGuardando(true);
    const{error:errRpc}=await sb.rpc("portal_vehiculo_agregar",{
      p_token:token,p_placas:placas.trim()||null,p_estado:estado||null,p_marca:marca.trim()||null,
      p_modelo:modelo.trim()||null,p_anio:anio?parseInt(anio,10):null,
      p_kilometraje:kilometraje?parseInt(kilometraje,10):null,p_intervalo:intervalo
    });
    setGuardando(false);
    if(errRpc){setError(errRpc.message||"No se pudo agregar el vehículo.");return;}
    onGuardado();
  };

  return <form onSubmit={guardar} style={{...card,marginBottom:10}}>
    <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>Agregar otro vehículo</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <input value={marca} onChange={e=>setMarca(e.target.value)} placeholder="Marca" style={campo}/>
      <input value={modelo} onChange={e=>setModelo(e.target.value)} placeholder="Modelo" style={campo}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <input value={anio} onChange={e=>setAnio(e.target.value)} placeholder="Año" type="number" min="1980" max="2100" style={campo}/>
      <input value={placas} onChange={e=>setPlacas(e.target.value.toUpperCase())} placeholder="Placas" style={campo}/>
    </div>
    <select value={estado} onChange={e=>setEstado(e.target.value)} style={campo}>
      <option value="">Estado de las placas</option>
      {ESTADOS_MX.map(e=><option key={e} value={e}>{e}</option>)}
    </select>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <input value={kilometraje} onChange={e=>setKilometraje(e.target.value)} placeholder="Kilometraje actual" type="number" min="0" style={campo}/>
      <select value={intervalo} onChange={e=>setIntervalo(parseInt(e.target.value,10))} style={campo}>
        {INTERVALOS_MANTENIMIENTO.map(i=><option key={i.value} value={i.value}>{i.label}</option>)}
      </select>
    </div>
    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <div style={{display:"flex",gap:10}}>
      <Boton type="submit" disabled={guardando}>{guardando?"Guardando...":"Agregar"}</Boton>
      <button type="button" onClick={onCancelar} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer"}}>Cancelar</button>
    </div>
  </form>;
}

// ============ NIP DEL PORTAL ============
// El NIP se valida en el SERVIDOR (bcrypt): la liga por sí sola ya no abre nada. Lo que vive en
// este dispositivo es solo un token de "recordarme", y la huella —si el cliente la activa— sirve
// para proteger ESE token localmente. Sin liga + (NIP o dispositivo recordado), no hay datos.
const dispKey=(t)=>`upco_ig_disp_${t}`;
const leerDisp=(t)=>{try{return JSON.parse(localStorage.getItem(dispKey(t))||"null");}catch(e){return null;}};
const guardarDisp=(t,cfg)=>{try{localStorage.setItem(dispKey(t),JSON.stringify(cfg));}catch(e){}};
const borrarDisp=(t)=>{try{localStorage.removeItem(dispKey(t));}catch(e){}};

const campoNip={width:"100%",padding:"14px",border:"1.5px solid #DDE4EE",borderRadius:10,fontSize:26,
  letterSpacing:"12px",textAlign:"center",fontFamily:"inherit",marginBottom:10};

function Caja({children}){
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{...card,maxWidth:380,width:"100%"}}>{children}</div>
  </div>;
}

// Crear el NIP exige un código que llega al correo del cliente. Así, tener la liga ya no basta
// ni siquiera la primera vez: quien se la tope no puede adelantarse a ponerle NIP.
function PantallaCrearNip({token,nombre,onListo}){
  const[via,setVia]=useState(null);        // null=pidiendo | "correo" | "agente"
  const[correoMostrado,setCorreoMostrado]=useState("");
  const[codigo,setCodigo]=useState("");
  const[nip,setNip]=useState("");
  const[nip2,setNip2]=useState("");
  const[error,setError]=useState("");
  const[guardando,setGuardando]=useState(false);
  const[reenviando,setReenviando]=useState(false);

  const pedirCodigo=async()=>{
    const{data,error:err}=await sb.rpc("portal_solicitar_codigo",{p_token:token});
    if(err){setError(err.message);setVia("agente");return;}
    setVia(data.via);
    if(data.correo)setCorreoMostrado(data.correo);
  };
  useEffect(()=>{pedirCodigo();},[]);

  const reenviar=async()=>{
    setReenviando(true);setError("");
    await pedirCodigo();
    setReenviando(false);
  };

  const crear=async(e)=>{
    e.preventDefault();setError("");
    if(!/^[0-9]{6}$/.test(codigo)){setError("Escribe el código de 6 dígitos que te mandamos.");return;}
    if(!/^[0-9]{6}$/.test(nip)){setError("Tu NIP debe ser de 6 dígitos.");return;}
    if(nip!==nip2){setError("Los dos NIP no coinciden.");return;}
    setGuardando(true);
    const{error:err}=await sb.rpc("portal_definir_nip",{p_token:token,p_nip:nip,p_codigo:codigo});
    setGuardando(false);
    if(err){setError(err.message);return;}
    onListo(nip);
  };

  if(!via)return <Caja><div style={{textAlign:"center",color:"#6B7280",fontSize:14}}>Un momento...</div></Caja>;

  return <Caja>
    <form onSubmit={crear}>
      <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:6}}>Hola{nombre?`, ${nombre}`:""} 👋</div>
      <div style={{fontSize:14,color:"#374151",lineHeight:1.5,marginBottom:16}}>
        Aquí vas a ver tus pólizas, así que vamos a protegerlas con un NIP tuyo de 6 dígitos. Te lo pediremos cada vez que entres.
      </div>

      <div style={{background:"#F4F7FB",borderRadius:10,padding:12,fontSize:13,color:"#374151",lineHeight:1.5,marginBottom:14}}>
        {via==="correo"
          ? <span>Te mandamos un código a <strong>{correoMostrado}</strong>. Escríbelo aquí para confirmar que la liga es tuya.</span>
          : <span>Pídele el código a tu agente — él lo tiene a la mano.</span>}
      </div>

      <input value={codigo} onChange={e=>setCodigo(e.target.value.replace(/\D/g,"").slice(0,6))}
        type="tel" inputMode="numeric" placeholder="Código" style={campoNip} name="codigo"/>
      {via==="correo"&&<button type="button" onClick={reenviar} disabled={reenviando}
        style={{background:"none",border:"none",color:"#53647D",fontSize:12.5,cursor:"pointer",padding:0,marginBottom:14}}>
        {reenviando?"Reenviando...":"No me llegó — reenviar"}
      </button>}

      <div style={{fontSize:12,fontWeight:700,color:"#8FA0B4",margin:"6px 0 8px"}}>AHORA TU NIP</div>
      <input value={nip} onChange={e=>setNip(e.target.value.replace(/\D/g,"").slice(0,6))}
        type="tel" inputMode="numeric" placeholder="••••••" style={campoNip} name="nip"/>
      <input value={nip2} onChange={e=>setNip2(e.target.value.replace(/\D/g,"").slice(0,6))}
        type="tel" inputMode="numeric" placeholder="Repítelo" style={campoNip} name="nip2"/>
      <div style={{fontSize:12,color:"#8FA0B4",marginBottom:14}}>No uses tu fecha de nacimiento ni 123456. Si lo olvidas, tu agente puede restablecerlo.</div>
      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <Boton type="submit" disabled={guardando}>{guardando?"Guardando...":"Crear mi NIP"}</Boton>
    </form>
  </Caja>;
}

function PantallaPedirNip({token,nombre,onListo}){
  const[nip,setNip]=useState("");
  const[error,setError]=useState("");
  const[cargando,setCargando]=useState(false);
  const[recordar,setRecordar]=useState(true);
  const[bioDisp,setBioDisp]=useState(false);
  const disp=leerDisp(token);

  useEffect(()=>{biometriaDisponible().then(setBioDisp);},[]);

  const entrarConHuella=async()=>{
    setError("");setCargando(true);
    try{
      await verificarBiometria(disp.credId);
      onListo({dispositivo:disp.dispositivo});
    }catch(e){
      setError("No se pudo leer tu huella. Escribe tu NIP.");
    }
    setCargando(false);
  };

  const entrar=async(e)=>{
    e.preventDefault();setError("");
    if(!/^[0-9]{6}$/.test(nip)){setError("Escribe tu NIP de 6 dígitos.");return;}
    setCargando(true);

    let dispositivo=null;
    if(recordar){
      const{data,error:errD}=await sb.rpc("portal_recordar_dispositivo",{p_token:token,p_nip:nip});
      if(errD){setCargando(false);setError(errD.message);return;}
      dispositivo=data;
    }
    setCargando(false);
    onListo({nip,dispositivo,ofrecerBio:!!dispositivo&&bioDisp});
  };

  // Dispositivo recordado y protegido con huella: no se muestra el teclado de NIP de entrada.
  if(disp&&disp.credId)return <Caja>
    <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:6}}>Hola{nombre?`, ${nombre}`:""}</div>
    <div style={{fontSize:14,color:"#374151",marginBottom:16}}>Usa tu huella o tu rostro para entrar.</div>
    <Boton onClick={entrarConHuella} disabled={cargando}>{cargando?"Verificando...":"👆 Entrar con huella o rostro"}</Boton>
    {error&&<div style={{color:"#dc2626",fontSize:13,marginTop:12}}>{error}</div>}
    <button onClick={()=>{borrarDisp(token);location.reload();}}
      style={{background:"none",border:"none",color:"#53647D",fontSize:12.5,cursor:"pointer",marginTop:14,padding:0}}>
      Mejor escribir mi NIP
    </button>
  </Caja>;

  return <Caja>
    <form onSubmit={entrar}>
      <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:6}}>Hola{nombre?`, ${nombre}`:""}</div>
      <div style={{fontSize:14,color:"#374151",marginBottom:16}}>Escribe tu NIP para ver tus pólizas.</div>
      <input value={nip} onChange={e=>setNip(e.target.value.replace(/\D/g,"").slice(0,6))}
        type="tel" inputMode="numeric" placeholder="••••••" style={campoNip} name="nip" autoFocus/>
      <label style={{display:"flex",alignItems:"center",gap:7,fontSize:13,color:"#374151",marginBottom:14,cursor:"pointer"}}>
        <input type="checkbox" checked={recordar} onChange={e=>setRecordar(e.target.checked)}/>
        Recordar este dispositivo por 30 días
      </label>
      {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
      <Boton type="submit" disabled={cargando}>{cargando?"Entrando...":"Entrar"}</Boton>
      <div style={{fontSize:12,color:"#8FA0B4",marginTop:14}}>¿Lo olvidaste? Pídele a tu agente que te lo restablezca.</div>
    </form>
  </Caja>;
}

function OfrecerHuella({token,dispositivo,nombre,onListo}){
  const[error,setError]=useState("");
  const activar=async()=>{
    setError("");
    try{
      const credId=await registrarBiometria(token,nombre||"cliente");
      guardarDisp(token,{dispositivo,credId});
      onListo();
    }catch(e){setError("No se pudo activar. Puedes seguir usando tu NIP.");}
  };
  return <Caja>
    <div style={{fontSize:18,fontWeight:800,color:"#10284A",marginBottom:6}}>¿Entrar con huella la próxima vez?</div>
    <div style={{fontSize:14,color:"#374151",lineHeight:1.5,marginBottom:16}}>
      En este dispositivo puedes usar tu huella o tu rostro en lugar de teclear tu NIP. Tu NIP sigue funcionando siempre.
    </div>
    {error&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{error}</div>}
    <Boton onClick={activar}>👆 Sí, activar</Boton>
    <button onClick={onListo} style={{background:"none",border:"none",color:"#53647D",fontSize:13,cursor:"pointer",marginTop:12,padding:0}}>Ahora no</button>
  </Caja>;
}

function Portal(){
  const[estado,setEstado]=useState("cargando"); // cargando | invalido | crear-nip | pedir-nip | ofrecer-bio | listo
  const[datos,setDatos]=useState(null);
  const[token,setToken]=useState(null);
  const[nombre,setNombre]=useState(null);
  const[llave,setLlave]=useState({});      // {nip} o {dispositivo} — con qué reabrir al refrescar
  const[bioPend,setBioPend]=useState(null);
  const[formVehiculoAbierto,setFormVehiculoAbierto]=useState(false);

  // Toda recarga de datos vuelve a pasar por el servidor con la misma llave: no guardamos
  // los datos "desbloqueados" en ningún lado.
  const cargar=(t,l)=>{
    const k=l||llave;
    sb.rpc("portal_cliente",{p_token:t,p_nip:k.nip||null,p_dispositivo:k.dispositivo||null})
      .then(({data,error})=>{
        if(error||!data){setEstado("invalido");return;}
        setDatos(data);setEstado("listo");
      });
  };

  useEffect(()=>{
    const t=leerToken();
    if(!t){setEstado("invalido");return;}
    history.replaceState(null,"","/p/"+t);
    setToken(t);

    sb.rpc("portal_estado",{p_token:t}).then(({data,error})=>{
      if(error||!data||!data.existe){setEstado("invalido");return;}
      setNombre(data.nombre);

      if(!data.tiene_nip){setEstado("crear-nip");return;}

      // Dispositivo recordado sin huella: entra solo. Con huella, se la pedimos primero.
      const d=leerDisp(t);
      if(d&&d.dispositivo&&!d.credId){
        const k={dispositivo:d.dispositivo};
        setLlave(k);
        sb.rpc("portal_cliente",{p_token:t,p_nip:null,p_dispositivo:d.dispositivo}).then(({data:dd,error:ee})=>{
          if(ee||!dd){borrarDisp(t);setEstado("pedir-nip");return;} // caducó
          setDatos(dd);setEstado("listo");
        });
        return;
      }
      setEstado("pedir-nip");
    });
  },[]);

  if(estado==="cargando")return <div style={{padding:40,textAlign:"center",color:"#6B7280"}}>Cargando...</div>;

  if(estado==="crear-nip")return <PantallaCrearNip token={token} nombre={nombre} onListo={(nip)=>{
    const k={nip};setLlave(k);setEstado("cargando");cargar(token,k);
  }}/>;

  if(estado==="pedir-nip")return <PantallaPedirNip token={token} nombre={nombre} onListo={({nip,dispositivo,ofrecerBio})=>{
    const k=dispositivo?{dispositivo}:{nip};
    setLlave(k);
    if(dispositivo)guardarDisp(token,{dispositivo,credId:null});
    if(ofrecerBio){setBioPend(dispositivo);setEstado("ofrecer-bio");}
    else{setEstado("cargando");}
    cargar(token,k);
  }}/>;

  if(estado==="ofrecer-bio")return <OfrecerHuella token={token} dispositivo={bioPend} nombre={nombre}
    onListo={()=>{setEstado(datos?"listo":"cargando");}}/>;

  if(estado==="invalido")return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{...card,maxWidth:380,textAlign:"center"}}>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Esta liga ya no es válida</div>
      <div style={{fontSize:14,color:"#6B7280"}}>Pídele a tu agente que te comparta la liga actualizada.</div>
    </div>
  </div>;

  const{cliente,agente,polizas,vehiculos}=datos;
  const vehiculosPorId={};
  vehiculos.forEach(v=>vehiculosPorId[v.id]=v);
  const polizaPorVehiculo={};
  polizas.forEach(p=>{
    if(!p.vehiculo_id)return;
    const actual=polizaPorVehiculo[p.vehiculo_id];
    if(!actual||(p.fecha_fin||"")>(actual.fecha_fin||""))polizaPorVehiculo[p.vehiculo_id]=p;
  });

  return <div style={{maxWidth:640,margin:"0 auto",padding:"24px 16px 60px"}}>
    <div style={{marginBottom:8}}>
      <div style={{fontSize:20,fontWeight:800}}>{agente.nombre_negocio||"Upco "}{!agente.nombre_negocio&&<span style={{color:"#F59E0B"}}>InsurGest</span>}</div>
      <div style={{fontSize:13,color:"#8FA0B4",marginTop:2}}>
        Tu agente: {agente.nombre||"—"}{agente.telefono?` · ${agente.telefono}`:""}{agente.correo?` · ${agente.correo}`:""}
      </div>
    </div>

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,margin:"20px 0 12px"}}>
      <div style={{fontSize:16,fontWeight:700}}>Hola, {cliente.nombre.split(" ")[0]} 👋</div>
      <BotonNotificaciones token={token}/>
    </div>

    <SeccionAcciones token={token} tieneVida={polizas.some(p=>p.ramo==="Vida")}/>

    {/* Solo aparece si el agente tiene su tarjeta activa — es la misma herramienta pública que
        usa para captar prospectos, aquí ofrecida también a quien ya es su cliente. */}
    {agente.alias_retiro&&<a href={`/r/${agente.alias_retiro}`} style={{textDecoration:"none"}}>
      <div className="tarjeta-accion" style={{...card,marginBottom:20,display:"flex",alignItems:"center",gap:12,background:"linear-gradient(160deg,#173863,#0a1c35)"}}>
        <div style={{fontSize:26}}>🌅</div>
        <div>
          <div style={{fontSize:14.5,fontWeight:700,color:"#fff"}}>¿Ya sabes cuánto necesitas para tu retiro?</div>
          <div style={{fontSize:12.5,color:"#C7D3E3",marginTop:2}}>Cotízalo gratis en 2 minutos →</div>
        </div>
      </div>
    </a>}

    <div style={{fontSize:13,fontWeight:700,color:"#8FA0B4",marginBottom:10}}>TUS PÓLIZAS ({polizas.length})</div>
    {polizas.length===0&&<div style={{...card,textAlign:"center",color:"#6B7280",marginBottom:24}}>Todavía no tienes pólizas registradas.</div>}
    {polizas.map(p=><TarjetaPoliza key={p.id} p={p} vehiculo={p.vehiculo_id?vehiculosPorId[p.vehiculo_id]:null} token={token}/>)}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"24px 0 10px"}}>
      <div style={{fontSize:13,fontWeight:700,color:"#8FA0B4"}}>TUS VEHÍCULOS ({vehiculos.length}/5)</div>
      {!formVehiculoAbierto&&vehiculos.length<5&&<button onClick={()=>setFormVehiculoAbierto(true)} style={{background:"none",border:"none",color:"#10284A",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Agregar vehículo</button>}
    </div>
    {formVehiculoAbierto&&<FormularioVehiculoNuevo token={token}
      onGuardado={()=>{setFormVehiculoAbierto(false);cargar(token);}} onCancelar={()=>setFormVehiculoAbierto(false)}/>}
    {vehiculos.length===0&&!formVehiculoAbierto&&<div style={{...card,textAlign:"center",color:"#6B7280"}}>Todavía no tienes vehículos registrados.</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10}}>
      {vehiculos.map(v=><TarjetaVehiculo key={v.id} v={v} poliza={polizaPorVehiculo[v.id]} token={token} onCambio={()=>cargar(token)}/>)}
    </div>

    <div style={{textAlign:"center",fontSize:12,color:"#8FA0B4",marginTop:32}}>Upco InsurGest</div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Portal/>);
</script>
</body>
</html>
