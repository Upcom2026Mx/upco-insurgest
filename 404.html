<!DOCTYPE html>
<html lang="es-MX">
<head><meta charset="UTF-8"/><title>Upco InsurGest</title></head>
<body>
<script>
// GitHub Pages no soporta rutas dinámicas como /p/{token} o /a/{alias} directamente.
// Cuando una URL así no coincide con ningún archivo, GitHub sirve este 404.html;
// aquí detectamos el patrón y redirigimos a la página real con el dato como parámetro.
// Cada index.html luego restaura la URL limpia con history.replaceState.
//   /p/{token} = liga privada del cliente (sus pólizas)
//   /a/{alias} = tarjeta pública del agente (para prospectos)
//   /r/{alias} = cotizador de retiro público del agente (para prospectos)
(function(){
  var p = location.pathname.match(/^\/p\/([^\/]+)\/?$/);
  if (p) {
    location.replace("/p/index.html?t=" + encodeURIComponent(p[1]));
    return;
  }
  var a = location.pathname.match(/^\/a\/([^\/]+)\/?$/);
  if (a) {
    location.replace("/a/index.html?u=" + encodeURIComponent(a[1]));
    return;
  }
  var r = location.pathname.match(/^\/r\/([^\/]+)\/?$/);
  if (r) {
    location.replace("/r/index.html?u=" + encodeURIComponent(r[1]));
    return;
  }
  location.replace("/");
})();
</script>
</body>
</html>
